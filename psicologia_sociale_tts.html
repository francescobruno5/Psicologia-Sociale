na reazione emotiva.\n\nL'aggressività come istinto innato: intesa come parte del bagaglio biologico della specie. McDougall parlava di «istinto pugnace», Freud ha teorizzato una pulsione di morte che governa il comportamento in dialettica con la pulsione erotica, e l'etologo Lorenz la descrive come un comportamento innato, specie-specifico, dal valore adattivo per la sopravvivenza.\n\nL'aggressività come comportamento appreso: sposta il focus sul ruolo delle istituzioni (famiglia, scuola) e dei mezzi di comunicazione di massa (come la televisione), capaci di diffondere modelli di comportamento antisociale che vengono successivamente imitati da adulti e bambini.\n\nL'aggressività come reazione emotiva: si concentra sui fattori interni che mediano l'elaborazione teorica ed empirica di fronte a vissuti emotivi negativi e stati di disagio derivanti da eventi frustranti."},{"title":"2. Le Basi Biologiche del Comportamento Aggressivo","content":"Tra gli studiosi vi è un generale accordo sul fatto che il comportamento aggressivo sia legato a una «preprogrammazione genetica» che consiste in schemi di condotta stereotipati e ripetitivi. Questo determinismo biologico si compenetra con i vincoli e i valori morali e sociali imposti dalla cultura, che permettono all'essere umano di riflettere e controllare il proprio comportamento modulando gli istinti."},{"title":"2.1 La Ricerca Genetica e i Primi Modelli Storici","content":"I tentativi di ricondurre il temperamento aggressivo a un'origine genetica e biologica hanno una storia clinica complessa, mossa dalla ricerca di fattori biologici determinanti."},{"title":"L'approccio antropologico di Cesare Lombroso","content":"Nella seconda metà dell'Ottocento, lo psichiatra Cesare Lombroso considerò il delitto come un fenomeno atavico e il delinquente come un «selvaggio perduto». Egli distinse due tipologie di criminali:\n\nIl delinquente nato: caratterizzato da anomalie di formazione e da un arresto dello sviluppo che lo rendevano incline al crimine per natura.\n\nIl delinquente occasionale: portato al delitto da fattori causali diversi e ambientali.\n\nLombroso cercò di dimostrare scientificamente l'esistenza di tratti subumani strutturali (misurando crani, facce e piedi), ma i suoi dati si rivelarono privi di reale validità metodologica."},{"title":"Anomalie dei Cromosomi Sessuali","content":"A partire dagli anni Sessanta, con lo sviluppo della genetica medica, l'attenzione si è spostata sulle disfunzioni legate alla codifica della differenziazione di genere sessuale, nello specifico sulle anomalie dei cromosomi sessuali derivanti da un imperfetto sdoppiamento del corredo cromosomico durante la meiosi.\n\nQueste anomalie determinano trisomie che non danno luogo a manifestazioni fisiche eclatanti, ma che sono state storicamente associate a difficoltà di apprendimento e disfunzioni cognitive:\n\nLa sindrome di Klinefelter ($47, XXY$).\n\nLa tripla X ($47, XXX$).\n\nLa sindrome di Jacobs ($47, XYY$).\n\nIl mito del \"cromosoma del criminale\": Nel 1965, Patricia Jacobs descrisse l'anomalia cromosomica $47, XYY$, ipotizzando che gli individui affetti possedessero maggiore aggressività e avessero, nell'età adulta, una probabilità significativamente più elevata di avere problemi con la legge. Sebbene studi successivi abbiano ridimensionato questo legame diretto, la ricerca ha continuato a indagare i correlati biologici e genetici senza giungere a risultati univoci."},{"title":"2.1 Verifiche Sperimentali su Genetica e Condotte Aggressive","content":"A partire dagli anni Settanta, ricerche epidemiologiche accurate hanno smentito il legame diretto tra la trisomia $47, XYY$ (sindrome di Jacobs) e la criminalità. Si è infatti riscontrato che il 96% degli individui affetti non ha alcun problema con la legge e che la loro percentuale all'interno della popolazione carceraria non varia in base alla gravità del reato (crimini violenti vs non violenti). La maggiore incidenza di questa alterazione tra i detenuti è spiegata invece dalle difficoltà di apprendimento, che costituiscono un fattore di rischio psicodosociale per la manifestazione di comportamenti devianti.\n\nPer scindere l'impatto dei geni (natura) da quello dell'ambiente (cultura), la ricerca si è concentrata sullo studio di gemelli e bambini adottati:\n\nStudi sulle adozioni: Mednick, Brennan e Kandel [1988] hanno rilevato una forte relazione genetica per i reati contro la proprietà, ma nessuna relazione statistica tra i reati violenti dei genitori biologici e quelli dei figli adottati cresciuti in famiglie diverse.\n\nStudi sui gemelli: Cloninger e Gottesman [1987] hanno confermato che l'ereditarietà è consistente sia per i crimini contro la proprietà ($r = 0,76$) sia per quelli contro la persona ($r = 0,50$), sebbene l'influenza ambientale sia decisamente più alta per i primi.\n\nIn sintesi, la delinquenza giovanile deriva principalmente da fattori ambientali. Tuttavia, il substrato che porta allo sviluppo di una criminalità adulta può essere legato a forme di responsabilità genetica indiretta, come i deficit cognitivi ereditari (es. il disturbo da deficit dell'attenzione)."},{"title":"2.2 Le Strutture Anatomiche dell'Aggressività","content":"Gli studi neuroanatomici condotti su aree cerebrali di pazienti lesionati e attraverso stimolazioni elettriche sugli animali indicano che i sistemi neuronali principalmente coinvolti nell'aggressività si localizzano nel sistema limbico e nel tronco dell'encefalo.\n\nL'amigdala: svolge un ruolo fondamentale. Le ricerche mostrano che l'asportazione chirurgica dell'amigdala (amigdalectomia) produce una drastica riduzione dei comportamenti d'attacco e delle risposte emotive di ansia e paura negli animali. Nell'essere umano, l'assenza di lesioni dei nuclei amigdalodei è stata associata a una riduzione dei comportamenti violenti.\n\nTuttavia, i dati sull'interazione sociale degli animali sani presentano problemi di interpretazione, suggerendo la necessità di valutare attentamente il legame tra ambiente e reazione comportamentale."},{"title":"2.3 Gli Studi sugli Ormoni e sui Neurotrasmettitori","content":"I sistemi neuroendocrini e biochimici esercitano un ruolo di primo piano nella modulazione delle condotte antisociali:"},{"title":"Il Ruolo degli Ormoni","content":"Testosterone: è l'ormone sessuale maschile che funge da importante modulatore dei comportamenti aggressivi, spiegandone la maggiore presenza negli uomini rispetto alle donne. Alti livelli di testosterone ematico correlano con tendenze antisociali, irascibilità e reazioni aggressive a seguito di una provocazione. L'aumento di questo ormone nel sangue rappresenta una risposta preparatoria a un eventuale comportamento d'attacco.\n\nEstradiolo: ritenuto responsabile, per via della sua attività inibitoria, della maggiore mitezza del sesso femminile."},{"title":"Il Ruolo dei Neurotrasmettitori","content":"Le ricerche condotte sugli animali collegano la facilitazione del comportamento aggressivo ad alterazioni di sostanze quali l'acetilcolina, la dopamina e la noradrenalina.\n\nLa serotonina: svolge un'importante azione inibente sul comportamento aggressivo. È stato riscontrato che una ipofunzionalità serotoninergica (bassi livelli di serotonina) correla con alterazioni del tono dell'umore e con una grave perdita del controllo degli impulsi in direzione sia autolesiva sia eterolesiva (aggressività verso sé stessi o verso gli altri).\n\nLimiti del determinismo biologico: La ricerca contemporanea sottolinea che i modelli puramente biologici sono limitati. Il comportamento aggressivo si manifesta essenzialmente in un contesto relazionale dove esistono norme e valori condivisi che veicolano e qualificano il significato delle azioni degli individui; l'indagine deve quindi focalizzarsi sull'interazione costante tra biologia e ambiente sociale."},{"title":"3.1 L'Aggressività come Istinto (La Tesi Freudiana)","content":"Sia l'approccio psicoanalitico sia quello etologico considerano l'aggressività come un istinto innato che induce l'uomo ad assalire e a distruggere gli altri esseri umani.\n\nNella psicoanalisi di Sigmund Freud si distinguono due accezioni storiche differenti:\n\nPrima fase (fino al 1915): l'aggressività è concepita come una reazione alla frustrazione sperimentata da una persona durante la ricerca del piacere. Il neonato impara progressivamente a dilazionare la soddisfazione dei propri bisogni primari in base alle esigenze e alle convenzioni della famiglia. Quando l'impulso alla soddisfazione immediata viene bloccato, l'assenza di gratificazione genera uno stato di frustrazione che innesca la condotta aggressiva."},{"title":"La Pulsione di Morte nella Tesi Freudiana","content":"Nella seconda fase della sua elaborazione teorica, Freud [1920] ridefinisce l'aggressività introducendo la pulsione di morte (Thanatos), antagonista dell'istinto di vita (Eros).\n\nIl suo obiettivo innato è ricondurre l'organismo allo stato inorganico di partenza.\n\nL'energia distruttiva prodotta da Thanatos deve essere guidata verso l'esterno per trovare una manifestazione, altrimenti condurrebbe all'autodistruzione dell'individuo. Il comportamento aggressivo ha quindi la funzione catartica di ridurre questa tensione pulsionale interna."},{"title":"La Prospettiva Etologica Classica (Konrad Lorenz)","content":"Anche l'approccio etologico si fonda sulla nozione di istinto primario, ma vi attribuisce una funzione adattiva al servizio della conservazione della specie (Lorenz, 1966). Negli animali, la condotta aggressiva (es. lotta per il cibo, difesa del territorio, competizione sessuale) è un istinto ereditariamente trasmissibile che favorisce l'evoluzione:\n\nSelezione naturale: gli esemplari più aggressivi affrontano con successo le sfide della sopravvivenza, riproducendosi maggiormente e trasmettendo il proprio corredo genetico.\n\nStruttura sociale: nei branchi, l'aggressività assicura il mantenimento di una gerarchia rigida, fondamentale per l'adattamento all'ambiente."},{"title":"Inibizione e ritualizzazione del conflitto","content":"Lorenz applica lo stesso modello istintuale all'uomo, evidenziando però una tragica asimmetria rispetto agli animali. Nella fauna selvatica il conflitto intraspecifico è ritualizzato e raramente letale, poiché i predatori hanno sviluppato filtri inibitori innati contro l'uccisione dei propri simili (es. il lupo che offre la gola si sottomette e blocca l'attacco dell'avversario).\n\nNell'uomo, la preistoria non ha sviluppato tali meccanismi inibitori perché la specie era biologicamente inoffensiva; tuttavia, l'improvvisa invenzione delle armi artificiali ha spezzato l'equilibrio tra la capacità omicida e i freni inibitori sociali, rendendo la violenza umana potenzialmente distruttiva per la specie stessa."},{"title":"L'Evoluzione Culturale dell'Aggressività (Irenäus Eibl-Eibesfeldt)","content":"Allievo di Lorenz, Eibl-Eibesfeldt [1979] corregge il pessimismo biologico del maestro. Nel volume Etologia della guerra, egli propone che la guerra non sia un mero esito istintuale, ma un fenomeno dell'evoluzione culturale.\n\nL'aggressività è sì innata, ma il modo in cui si esprime (territorialismi, guerre, diplomazia) è modellato dalla cultura e dalle strutture sociali. L'uomo possiede sia impulsi distruttivi sia un freno biologico all'uccisione; l'innesco della violenza bellica organizzata avviene quando le norme culturali impongono di uccidere, sovrapponendosi e disattivando i naturali freni inibitori della persona.\n\nSviluppi moderni (Lore e Schultz, 1993): L'interpretazione contemporanea rigetta l'idea di un uomo in balia di istinti incontrollabili. Tutti gli organismi (dai ratti agli esseri umani) hanno sviluppato sia potenti meccanismi inibitori per sopprimere l'aggressività quando non è vantaggiosa, sia strategie opzionali la cui attivazione dipende dalle esperienze sociali precedenti e dalle norme del contesto relazionale in cui si vive."},{"title":"3.2 La Dichiarazione di Siviglia sulla Violenza [1986]","content":"Per contrastare l'uso ideologico e distorto del pessimismo biologico (utilizzato storicamente per giustificare le guerre e la violenza come esiti naturali e inevitabili), un gruppo internazionale di scienziati (etologi, antropologi, sociologi) ha redatto la Dichiarazione di Siviglia, articolata in cinque proposizioni fondamentali:\n\nPrima Proposizione: È scientificamente scorretto dire che abbiamo ereditato la tendenza a fare la guerra dai nostri antenati animali. La guerra è un fenomeno tipicamente umano e non si ritrova nelle altre specie.\n\nSeconda Proposizione: È scientificamente scorretto dire che la guerra o qualsiasi altro comportamento violento sia geneticamente programmato nella natura umana. I geni forniscono solo un potenziale di sviluppo che si realizza nell'interazione con l'ambiente sociale.\n\nTerza Proposizione: È scientificamente scorretto dire che nel corso dell'evoluzione umana c'è stata una selezione del comportamento aggressivo rispetto ad altri comportamenti cooperativi. La dominanza e l'affiliazione coesistono, e la selezione naturale non ha premiato l'iperaggressività.\n\nQuarta Proposizione: È scientificamente scorretto dire che gli esseri umani hanno un «cervello violento». L'apparato neurale ci permette di agire violentemente, ma non ci costringe a farlo; il nostro modo di agire dipende da come siamo stati condizionati e socializzati.\n\nQuinta Proposizione: È scientificamente scorretto dire che la guerra è causata dall'«istinto» o da qualsiasi altra singola motivazione. La guerra moderna implica un uso istituzionale di caratteristiche personali come l'obbedienza, la suggestionabilità e il calcolo razionale dei costi.\n\nConclusione del Manifesto: La biologia non condanna l'umanità alla guerra. Così come «le guerre cominciano nella mente degli esseri umani», anche la pace comincia nella nostra mente; la stessa specie che ha inventato la guerra può inventare la pace."},{"title":"3.3 L'Aggressività Mediata da Fattori Interni","content":"Questa nuova sezione (introdotta a fine testo) segna il passaggio verso i modelli teorici che abbandonano il determinismo biologico per analizzare come l'aggressività sia mediata da stati interni psicologici ed emotivi, a partire dal celebre legame tra frustrazione e aggressività che analizzeremo nelle prossime pagine."},{"title":"3.2 La Teoria della Frustrazione-Aggressività (Ipotesi Freud-Yale)","content":"Nel 1939, un gruppo di ricercatori dell'Università di Yale coordinato da Dollard pubblicò il volume Frustrazione e Aggressività, proponendo una tesi radicale che risente dell'ipotesi iniziale di Freud.\n\nLa formulazione originaria [1939]: la frustrazione (intesa come la condizione psicologica di chi riscontra l'impossibilità di conseguire un obiettivo) genera sempre una istigazione ad aggredire. Specularmente, ciò che viene ipotizzato è che la manifestazione di un comportamento aggressivo sia causata unicamente dalla frustrazione. A differenza di Freud, l'idea di un istinto innato viene respinta: l'aggressività è vista solo come una reazione a uno stimolo ambientale.\n\nLa riformulazione [1962]: a fronte di evidenti eccezioni reali (es. plotoni di esecuzione o ufficiali giudiziari che pignorano beni senza essere in uno stato di frustrazione), gli stessi autori modificarono la teoria in termini meno radicali. La frustrazione viene ridefinita come una condizione sufficiente ma non necessaria al verificarsi di comportamenti aggressivi."},{"title":"Fattori di Modulazione della Frustrazione","content":"Nel corso degli anni, le ricerche hanno evidenziato che l'entità della frustrazione e la conseguente risposta violenta variano in base a precisi fattori psicologici e situazionali:\n\nLa sindrome da impotenza appresa (Seligman, 1975): esperimenti dimostrano che se un individuo subisce ripetute frustrazioni senza alcuna possibilità di opporsi, finisce per cadere in uno \"stato letargico\", reagendo con la totale passività invece che con l'aggressività.\n\nL'arbitrarietà della frustrazione: se l'ostacolo al raggiungimento dell'obiettivo viene percepito come non arbitrario, non intenzionale o legittimo, le reazioni aggressive si riducono drasticamente.\n\nIl livello di aspettativa (Berkowitz, 1989): la frustrazione è tanto più intensa quanto più il soggetto ha un'aspettativa elevata di raggiungere il proprio scopo.\n\nSintesi dell'esperimento di Kulik e Brown [1979]: I partecipanti dovevano effettuare telefonate per richiedere donazioni in denaro. I soggetti a cui era stato fatto credere che avrebbero ottenuto un'altissima percentuale di successo manifestavano un'aggressività verbale decisamente superiore verso i finti interlocutori (che rifiutavano la donazione seguendo le istruzioni dello sperimentatore) rispetto ai partecipanti a cui era stata prospettata una bassa aspettativa di successo.\n\nDirezione dell'aggressività e vulnerabilità del target: non sempre la violenza si indirizza verso la fonte della frustrazione, specie se questa è minacciosa o non punibile. Spesso l'aggressività viene deviata verso \"capri espiatori\" più deboli o verso bersagli appropriati a seconda della legittimità percepita."},{"title":"3.3 Il Modello Cognitivo-Neoassociazionista (Berkowitz)","content":"Per superare i limiti dell'ipotesi Freud-Yale, Leonard Berkowitz [1982; 1989; 1993] ha sviluppato un modello teorico più complesso in grado di descrivere le relazioni tra vissuti negativi e stati emotivi, con particolare riferimento alla rabbia."},{"title":"Il Ruolo degli Stimoli Aversivi","content":"Nel modello di Berkowitz, la frustrazione non è l'unica causa dell'aggressività, ma costituisce solo una delle tante varianti all'interno di un'ampia gamma di esperienze negative e stimoli aversivi.\n\nTra le situazioni spiacevoli e non necessariamente intenzionali in grado di determinare ostilità e comportamenti aggressivi, l'autore include:\n\nCattivi odori.\n\nTemperature eccessivamente elevate.\n\nContatto con l'acqua fredda.\n\nScene disgustose."},{"title":"Il Meccanismo della Rete Associativa","content":"Il nucleo centrale del modello JSM applicato all'aggressività risiede nel funzionamento del nostro sistema cognitivo, strutturato come una vera e propria rete associativa:\n\n             [ESPERIENZE NEGATIVE / STIMOLI AVERSIVI]\n\n              (Dolore, malessere, temperature calde)\n\n                                │\n\n                                ▼\n\n                     [EMOZIONI NEGATIVE PRIMITIVE]\n\n                                │\n\n          ┌─────────────────────┴─────────────────────┐\n\n          ▼                                           ▼\n\n [Pensieri associati alla RABBIA]           [Pensieri associati alla PAURA]\n\n (Tendenze psicomotorie d'attacco)          (Tendenze psicomotorie di fuga)\n\n          │                                           │\n\n          ▼                                           ▼\n\n  Sviluppo finale di:                         Sviluppo finale di:\n\n    RABBIA / AGGRESSIVITÀ                       PAURA / EVITAMENTO\n\nAttivazione Primitiva: Gli eventi negativi, i dolori o i malesseri attivano immediatamente e in modo automatico emozioni negative primitive.\n\nLegami Semantici: Nella memoria, pensieri, ricordi, reazioni psicomotorie e risposte fisiologiche esperite frequentemente assieme sono collegati tra loro. L'attivazione di uno di questi elementi si trasmette lungo i legami associativi semantici a tutte le risposte a cui in passato è stata associata.\n\nLe Due Tendenze Concorrenti: L'emozione negativa stimola simultaneamente due tipi di risposte:\n\nPensieri associati alla rabbia (connessi a reazioni psicomotorie di attacco).\n\nPensieri associati alla paura (connessi a reazioni psicomotorie di fuga).\n\nL'Esito Comportamentale Finale: Una varietà di fattori (genetici, appresi e situazionali) determinerà quale delle due tendenze prevarrà in un preciso istante.\n\nEsempio Pratico: Se veniamo fermati da un vigile urbano per eccesso di velocità, nel nostro sistema cognitivo si attiveranno i ricordi e le sensazioni negative legati a vecchie contravvenzioni. Se nell'insieme delle risposte attivate prevalgono quelle associate alla paura, tenteremo di sottrarci alla multa; se invece prevale la rabbia, inizieremo a inveire contro il vigile urbano mettendo in atto una condotta di attacco."},{"title":"L'Effetto Armi (Weapon Effect)","content":"Come evidenziato nel diagramma, la presenza nell'ambiente di oggetti o stimoli associati a comportamenti violenti (es. una pistola o un fucile) agisce come un facilitatore cognitivo. Questi stimoli, attivando i nodi semantici associati alla rabbia all'interno della rete associativa, aumentano l'accessibilità dei pensieri aggressivi e incrementano drasticamente la probabilità che l'individuo scelga una risposta di attacco violento rispetto a una di fuga."},{"title":"Dibattito Critico sulla Mediazione Cognitiva","content":"Mentre il modello di Berkowitz postula una reazione automatica agli stimoli aversivi, diversi critici ne evidenziano l'assenza di una mediazione cognitiva strutturata:\n\nWeiner [1985]: sostiene che la rabbia non insorga semplicemente a causa di condizioni spiacevoli, a meno che gli eventi biologici o ambientali all'origine non vengano attribuiti alla colpa di qualcuno e a un errore controllabile.\n\nLazarus, Averill e Opton [1970]: ritengono che, per scatenare l'aggressività, gli individui debbano prima percepire cognitivamente gli eventi negativi come minacce al proprio benessere.\n\nTuttavia, Berkowitz argomenta che attribuzioni causali e percezione di minaccia non sono fondamentali per generare una forma rudimentale di rabbia, ma possono semmai influenzarne l'intensità. A supporto di ciò, Stein e Levine [1989] hanno dimostrato che il 60% dei soggetti analizzati associava la rabbia a eventi descritti come puramente accidentali o provocati da cause naturali."},{"title":"La Costruzione degli Stati Emotivi Complessi","content":"Inizialmente, le connessioni della rete associativa risvegliano in parallelo tendenze alla fuga (paura) e all'attacco (rabbia) in proporzione variabile, agendo al di fuori della coscienza dell'individuo. Solo in un secondo momento entrano in gioco processi cognitivi meno automatici: il soggetto recupera e attribuisce un significato ai frammenti di informazione di cui dispone, \"costruendo\" stati emotivi derivati e più complessi (ansia, depressione, colpa, invidia) guidati da una concezione prototipica delle emozioni."},{"title":"Verifica Sperimentale: L'Effetto Pistola (Weapon Effect)","content":"Le previsioni di Berkowitz sulla capacità degli stimoli ambientali di orientare il comportamento sono state verificate nel classico esperimento di Berkowitz e LePage [1967]:\n\nIl paradigma: Dei partecipanti (divisi in condizioni di soggetti \"arrabbiati\" vs \"non arrabbiati\" tramite la somministrazione mirata di scosse elettriche da parte di un complice) dovevano a loro volta impartire scosse a un collaboratore. Nella stanza dell'esperimento veniva lasciato un oggetto: per metà dei soggetti era una racchetta da tennis, per l'altra metà una pistola.\n\nI risultati: I soggetti precedentemente arrabbiati che eseguivano il compito in presenza della pistola impartivano un numero significativamente più elevato di scosse elettriche rispetto a quelli esposti alla racchetta da tennis.\n\nBerkowitz coniò l'espressione effetto pistola: \"il dito preme il grilletto, ma il grilletto può anche premere il dito o istigare alla violenza\". Gli stimoli associati all'aggressività aumentano l'accessibilità immediata dei pensieri violenti attraverso la rete associativa semantica. Sebbene il paradigma soffra di una certa delicatezza procedurale (limiti nella replicabilità sistematica legati alla consapevolezza dei soggetti), il modello rappresenta un punto fermo nella comprensione dell'aggressività."},{"title":"3.4 Il Trasferimento dell'Eccitazione (Excitation Transfer)","content":"Sviluppata da Dolf Zillmann [1979], la teoria del trasferimento dell'eccitazione si integra con il modello di Berkowitz, riconoscendo l'interazione tra interpretazione cognitiva e attivazione fisiologica nel provocare condotte aggressive:\n\nIl principio: Le persone possono trasferire l'attivazione residua (eccitazione fisiologica) provocata da una situazione vissuta in precedenza a una nuova condizione attivante.\n\nDislocazione d'emozione: L'eccitazione emotiva determinatasi in una particolare circostanza (es. l'attivazione sessuale o l'eccitazione da sforzo) può alimentare una reazione aggressiva in una situazione completamente diversa se il soggetto interpreta e definisce l'attivazione residua in funzione del nuovo contesto aversivo.\n\nVerifica sperimentale (Zillmann, 1971): Soggetti maschi provocati da un coetaneo venivano esposti a tre tipi di filmati: neutrale, aggressivo o erotico. In linea con la tesi del trasferimento dell'eccitazione, i soggetti che avevano assistito al filmato erotico (e che mantenevano un residuo di eccitazione fisiologica più elevato rispetto al filmato neutrale) manifestavano un comportamento nettamente più aggressivo e violento verso il provocatore nel momento in cui venivano risvegliati i sentimenti di rabbia."},{"title":"3.5 Il Ruolo dei Modelli Sociali (Albert Bandura)","content":"La teoria dell'apprendimento sociale di Albert Bandura [1973] sposta radicalmente l'analisi sulle condizioni esterne e sui modelli sociali che regolano la condotta umana. Il postulato fondamentale è che il comportamento aggressivo non sia connotato biologicamente, ma venga acquisito tramite l'apprendimento per imitazione osservando i comportamenti degli altri.\n\nApprendimento per imitazione: I bambini possono apprendere una risposta comportamentale aggressiva semplicemente guardando gli altri (modelli reali o televisivi), senza aver mai ricevuto prima rinforzi diretti per quell'azione e senza che la condotta sia legata a uno stato di frustrazione preesistente.\n\nL'esperimento del pupazzo Bobo (Bandura, Ross e Ross, 1963): Un gruppo di bambini osservava un adulto (dal vivo o in televisione) aggredire violentemente una bambola gonfiabile (Bobo). Successivamente, i bambini esposti al modello violento riproducevano fedelmente i medesimi gesti e comportamenti d'attacco appresi dall'adulto, differenziando le risposte in base al fatto che il modello avesse ricevuto una punizione o un premio per la sua condotta."},{"title":"3.3.1 Sviluppi dell'Apprendimento Sociale: Il ruolo dei Mass Media","content":"Gli esperimenti basati sulla teoria di Bandura indicano che l'apprendimento di condotte aggressive si verifica sia tramite modelli in carne e ossa, sia quando il modello viene presentato simbolicamente attraverso filmati, fumetti, racconti o videogiochi. La vista della punizione del modello può inibire l'espressione dei comportamenti appresi, ma non ne impedisce l'acquisizione: non appena viene offerta una ricompensa diretta, i bambini tendono a riprodurre i gesti violenti osservati.\n\nNumerose ricerche evidenziano una forte correlazione tra la quantità di violenza vista in televisione e i comportamenti aggressivi dei bambini:\n\nL'esperimento di Liebert e Baron [1972]: Un gruppo di bambini esposto a un telefilm estremamente violento manifestava, in una successiva sessione di gioco comune, una durata media delle risposte aggressive nettamente superiore rispetto a un secondo gruppo esposto a un programma sportivo.\n\nIl dibattito metodologico: Gli studi correlazionali non permettono di stabilire un legame causale univoco; l'associazione riscontrata può indicare sia che i contenuti violenti aumentino l'aggressività, sia che gli individui intrinsecamente più aggressivi selezionino per preferenza programmi violenti. Gli studi sperimentali in laboratorio rilevano invece un incremento dell'aggressività a breve termine.\n\nStudi a lungo termine: Johnson e colleghi [2002] hanno seguito 707 bambini per un arco di 17 anni, confermando una significativa relazione tra le ore trascorse davanti alla TV durante l'adolescenza e le condotte violente in età adulta, indipendentemente da variabili come il reddito o disturbi pregressi."},{"title":"Conseguenze dell'Esposizione Prolungata alla Violenza","content":"Incutere paura: Chi osserva molta violenza mediatica sperimenta la costante paura di rimanere vittima di crimini violenti (Doob e MacDonald, 1979). In uno studio di laboratorio, i soggetti esposti a un filmato in cui l'aggressore rimaneva impunito manifestavano maggiore apprensione e timore rispetto a chi vedeva l'aggressore punito.\n\nDesensibilizzazione (Assuefazione alla violenza): L'esposizione ricorrente e continua a contenuti violenti produce una forma di desensibilizzazione, ovvero un aumento della tolleranza e un maggiore adattamento alla violenza reale.\n\nSintesi dello studio di Cline, Croft e Courrier [1973]: Misurando le risposte fisiologiche di giovani adulti durante la visione di un incontro di pugilato cruento, i ricercatori notarono che coloro che nel corso della propria vita passavano molte ore alla settimana davanti alla televisione mostravano una limitata attivazione fisiologica (assuefazione), a differenza di chi guardava la TV per poche ore, che registrava alti livelli di eccitazione emotiva.\n\nEffetti a breve termine sulle donne: Linz, Donnerstein e Penrod [1984] riscontrarono che l'esposizione prolungata a scene di violenza sessuale contro le donne portava gli spettatori maschi, nel corso dei giorni, a ridurre l'ansia iniziale e a mostrarsi più disponibili ad accettare questo genere di violenza."},{"title":"3.4 La Teoria degli Script (Huesmann)","content":"Gli script sono schemi cognitivi ordinati lungo una dimensione temporale, utilizzati per rappresentare in memoria eventi che si ripetono spesso con caratteristiche costanti (Schank e Abelson, 1977). Essi semplificano la visione del mondo e consentono di sviluppare capacità predittive e metacognitive.\n\nHuesmann [1986; 1998] ha proposto che i bambini, osservando la violenza nei contesti di vita reale o nei mass media, apprendano degli script di comportamenti aggressivi. Una volta assimilati, questi copioni vengono impiegati per dare significato alle situazioni e per guidare il comportamento in modo automatico:\n\nLa persona seleziona un ruolo all'interno dello script appreso e lo mette in atto.\n\nUn bambino che assiste ripetutamente a scene in cui si usa una pistola per risolvere un problema memorizzerà uno script altamente accessibile.\n\nL'alta frequenza di esposizione rende gli script aggressivi cronicamente accessibili e rapidamente recuperabili dalla memoria, facilitandone l'utilizzo automatico in situazioni minacciose o problematiche."},{"title":"3.5 Il Modello Generale di Aggressività - GMA (Anderson e Bushman)","content":"I modelli parziali illustrati nel capitolo si rivelano adatti a spiegare l'aggressività solo in ambiti d'elezione specifici (l'ipotesi Freud-Yale e il neoassociazionismo spiegano bene l'aggressività mossa da scoppi d'ira, mentre l'apprendimento sociale e gli script spiegano l'aggressività strumentale in situazioni problematiche).\n\nPer superare queste frammentazioni, Anderson e Bushman [2002a] hanno proposto il General Aggression Model (GMA), un quadro integrativo che riassume l'intera gamma delle proposte teoriche precedenti.\n\n                 [INPUT: Fattori personali e situazionali]\n\n                                    │\n\n                                    ▼\n\n                     [STATO INTERNO: Vie parallele]\n\n                (Cognizioni, Stati affettivi, Attivazione)\n\n                                    │\n\n                                    ▼\n\n                  [PROCESSO DI VALUTAZIONE E DECISIONE]\n\n                                    │\n\n          ┌─────────────────────────┴─────────────────────────┐\n\n          ▼                                                   ▼\n\n[PERCORSO AUTOMATICO]                             [PERCORSO CONTROLLATO]\n\nDettato sostanzialmente da                       Attivato da processi cognitivi\n\nrisposte emotive interne primitive.               di ordine superiore (se vi sono\n\n                                                  risorse e tempo per l'analisi).\n\nIl nodo chiave del modello GMA risiede nella possibilità di manifestare comportamenti aggressivi attraverso due percorsi parzialmente distinti nell'elaborazione della risposta a stimoli ambientali percepiti come minacce o provocazioni:\n\nIl percorso automatico: è dettato sostanzialmente dalla risposta emotiva interna e immediata dell'individuo. Il comportamento che ne consegue è direttamente legato allo stato emotivo in cui il soggetto è caduto. Sintetizza i modelli di risposta aggressiva diretta.\n\nIl percorso controllato: è regolato da processi cognitivi di ordine superiore. Viene intrapreso solo se l'individuo dispone di una quantità sufficiente di risorse cognitive e di tempo da destinare all'analisi consapevole della situazione; in questo caso, la persona valuterà le alternative possibili e sceglierà consapevolmente la risposta che ritiene più appropriata. Sintetizza i modelli basati sull'apprendimento sociale."},{"title":"4. Il Ruolo del Contesto Immediato","content":"Negli studi riassunti da Piero Bocchiaro in Psicologia del male [2009], emerge come l'aggressività possa essere l'esito della situazione contingente in cui ci si trova ad agire. Persone del tutto nella norma, inserite in contesti estremi e insoliti, possono dimostrarsi capaci di torturare e uccidere vittime innocenti a causa di potenti dinamiche situazionali che orientano la condotta."},{"title":"1. La Deindividuazione (Deindividuation)","content":"La deindividuazione è una sensazione psicologica indotta da una situazione di folla o di gruppo, caratterizzata da una riduzione del senso di individualità e della responsabilità personale avvertita dal singolo.\n\nIl meccanismo: L'anonimato riduce la capacità di considerare sé stessi come individui singoli, allentando i divieti che abitualmente inibiscono gli atti impulsivi e socialmente proibiti, come la violenza. L'autocontrollo non è più coordinato dai valori interni, dalle considerazioni sulle reazioni altrui o dai sentimenti di vergogna e colpa.\n\nStudio crossculturale (Watson, 1973): Analizzando i combattimenti in 23 culture primitive, Watson riscontrò che le torture, le violenze e le mutilazioni dei prigionieri erano significativamente più frequenti nelle culture in cui i guerrieri avevano l'usanza di alterare la propria identità prima della battaglia (es. dipingendosi il viso o indossando maschere). L'anidato e la minore identificabilità aumentavano la deindividuazione.\n\nL'esperimento di Zimbardo [1970]: Alcune studentesse universitarie dovevano somministrare finta come punizione delle scosse elettriche a una ragazza che commetteva errori in un compito.\n\nLe partecipanti nella condizione di deindividuazione (indossavano cappucci e camici bianchi, non venivano chiamate per nome e operavano in una stanza buia per non essere identificate) somministrarono scosse più intense e più numerose.\n\nLe partecipanti nella condizione di controllo (vestite normalmente, identificate da tessere di riconoscimento e collocate in una stanza ben illuminata) impartirono scosse nettamente minori."},{"title":"2. L'Obbedienza all'Autorità","content":"Rappresenta una forza psicosociale radicale in grado di spingere chiunque a infliggere dolore a un altro uomo. Negli storici esperimenti di Milgram [1963], il 65% dei partecipanti infliggeva scosse elettriche fino al valore massimale di 450 volt a una vittima innocente unicamente perché costretto dagli ordini di una figura di autorità competente. Di fronte a un'autorità, le persone tendono a obbedire in automatico, compiendo azioni crudeli anche laddove gli ordini risultino palesemente immorali.\n\nLe condizioni situazionali che incrementano la probabilità di obbedire sono:\n\nLa distanza dalla vittima: rende astratto il dolore altrui, riducendo l'imbarazzo e il senso di colpa del carnefice.\n\nLa sequenzialità dell'azione: inserisce la persona in un meccanismo perverso in cui diventa difficile disobbedire poiché l'atto distruttivo è l'estensione di un'azione compiuta un istante prima; interrompere il compito significherebbe ammettere la scorrettezza delle proprie azioni precedenti.\n\nLa legittimità dell'autorità: gli ordini impartiti da una persona priva dello status di autorità perdono immediatamente la loro capacità coercitiva, riducendo il livello di obbedienza dei soggetti."},{"title":"3. La Deumanizzazione (Dehumanization)","content":"Deumanizzare significa categorizzare un altro individuo o un gruppo sociale al di fuori della sfera umana, assimilandolo a un «essere inferiore» o a un oggetto.\n\nQuesto processo determina un totale cedimento degli standard morali personali: agire in modo crudele su un bersaglio deumanizzato non fa più sperimentare alcun senso di colpa. È una dinamica ampiamente utilizzata nei genocidi (es. i nazisti che raffiguravano gli ebrei come «topi» o gli Hutu che definivano i Tutsi «scarafaggi»).\n\nNel celebre esperimento carcerario di Stanford (Zimbardo, 1971), le guardie (normali studenti universitari) misero in atto comportamenti estremamente crudeli e violenti sui detenuti solo in seguito a un sistematico processo di etichettamento e riduzione a categorie subumane (i prigionieri erano privati del nome e identificati solo da un numero), che permise di allentare i freni morali e giustificare le brutalità."},{"title":"4. Il Conformismo","content":"Consiste nell'allineare il proprio comportamento, in maniera più o meno consapevole, ai criteri stabiliti da altri, specialmente quando tali criteri si declinano in norme emergenti violente.\n\nL'influenza esterna si manifesta con forza nelle situazioni nuove e ambigue, in cui il soggetto non sa come muoversi e teme l'esclusione dal proprio gruppo di riferimento. Nell'esperimento di Stanford, le guardie si adeguarono alla condotta violenta dei colleghi per convenienza, al fine di non inimicarsi il resto del gruppo, pur conoscendone l'effettiva scorrettezza."},{"title":"5. La Diffusione della Responsabilità","content":"La presenza di altre persone di fronte a una scena drammatica o violenta riduce la pressione individuale ad agire e a prestare aiuto, poiché la responsabilità viene idealmente divisa tra tutti i presenti (effetto testimone o bystander effect).\n\nCiascuno presume che sia l'altro a dover intervenire, e di conseguenza il singolo resta passivo nell'indifferenza. Questo fenomeno regola i casi di cronaca quotidiana delle nostre città (es. il celebre omicidio di Kitty Genovese). Come dimostrato da Darley e Latané [1968], minore è il numero di persone che assiste all'emergenza, maggiore è la probabilità statistica che la persona riceva soccorso."},{"title":"Riepilogo Generale del Capitolo","content":"Gli approcci esaminati nel testo descrivono l'aggressività muovendosi lungo prospettive teoriche differenti:\n\nL'etologia: considera l'aggressività come una caratteristica delle specie animali legata alla sopravvivenza.\n\nLa psicologia sociale: ha un maggiore interesse a evidenziare gli antecedenti emotivi, cognitivi e situazionali della condotta aggressiva, integrando i fattori biologici con il contesto relazionale e con lo studio dei neurotrasmettitori nel sistema nervoso centrale.\n\n CAP 11"},{"title":"1. Definire l'Altruismo e il Comportamento Prosociale","content":"In ambito psicosociale, il perno della trattazione risiede nell'analisi delle motivazioni che spingono un individuo ad agire, piuttosto che nell'esito dell'azione stessa. È fondamentale distinguere teoricamente due concetti chiave:\n\nComportamento Prosociale: Una categoria ampia che include qualsiasi azione volta ad aiutare gli altri, ma che può essere guidata sia da motivazioni altruistiche sia da un tornaconto personale o da una giustificazione egoistica.\n\nAltruismo: Un comportamento mirato ad aiutare il prossimo senza che ciò comporti immediati benefici personali. Il dibattito scientifico si concentra sul confronto tra i modelli che ammettono una genuina motivazione altruistica e quelli che ipotizzano che il vero altruismo non esista, vedendo nel prestare aiuto sempre un vantaggio personale celato."},{"title":"2. Altruismo ed Evoluzione: I Modelli Biologici","content":"Qualunque comportamento altruistico sembra inizialmente contrastare con la teoria della selezione naturale di Charles Darwin [1859], secondo cui chi si sacrifica per gli altri penalizza le proprie probabilità di sopravvivenza e di riproduzione a favore di quelle altrui (comportamento disadattivo).\n\nNegli anni Sessanta e Settanta, la sociobiologia ha tentato di sanare questa contraddizione applicando le conoscenze biologiche ai modelli di comportamento sociale."},{"title":"1. Il Concetto di Selezione di Gruppo (Wynne-Edwards, 1962)","content":"Wynne-Edwards ha ipotizzato che nessun comportamento entrerebbe a far parte del corredo genetico ereditabile se non favorisse, anche alla lontana, l'esemplare altruista o il suo gruppo di appartenenza.\n\nIl principio: La selezione di gruppo si basa su un egoismo collettivo. L'atto altruistico individuale è in realtà un sacrificio compiuto nell'interesse superiore della conservazione della specie.\n\nI limiti del modello: Questa teoria è biologica e concettualmente fragile. All'interno di ogni gruppo esisteranno sempre individui inclini a sfruttare la bontà dei propri simili senza fare altrettanto. Questi soggetti egoisti avranno una maggiore probabilità di riprodursi, tramandando il proprio corredo genetico e portando, nel corso delle generazioni, alla drastica riduzione o alla scomparsa degli esemplari altruisti."},{"title":"2. La Teoria della Selezione Parentale (Hamilton, 1964)","content":"Spostando il livello della selezione dall'individuo o dal gruppo al singolo gene, William Hamilton ha introdotto il concetto di selezione parentale (kin selection).\n\nIl principio: Gli individui tendono a mettere in atto comportamenti altruistici prevalentemente nei confronti dei consanguinei (figli, nipoti, cugini), ossia soggetti che condividono quote del loro stesso patrimonio genetico.\n\nIl vantaggio evolutivo: L'altruismo aumenta la probabilità di sopravvivenza dei consanguinei e, di conseguenza, assicura la trasmissione del pool genetico che contiene il gene dell'altruismo stesso alla generazione successiva. Il successo riproduttivo non dipende esclusivamente dal singolo individuo, ma è legato alla sopravvivenza del nucleo familiare."},{"title":"Il gene egoista (Dawkins, 1976)","content":"Richard Dawkins ha estremizzato questa prospettiva nel volume Il gene egoista, sostenendo che i comportamenti altruistici siano biologicamente determinati da un sottofondo genetico mosso da una programmata urgenza dei geni di perpetuare sé stessi.\n\nUna madre che si getta nel fuoco per salvare il proprio figlio compie un gesto apparentemente d'amore puro ma che, in realtà, risponde a un imperativo categorico iscritto nel suo DNA: fare qualsiasi cosa, anche a costo della vita, pur di garantire la salvaguardia e la trasmissione dei propri cromosomi."},{"title":"3. L'Altruismo Reciproco (Trivers, 1971)","content":"Robert Trivers ha introdotto una spiegazione utilitaristica applicabile anche alle interazioni tra individui privi di legami di parentela o estranei, definita altruismo reciproco.\n\nLa teoria dello scambio: Un individuo compie un atto altruistico nei confronti di un estraneo se i potenziali benefici futuri dell'azione superano il rischio o il costo immediato. Il modello si basa sull'aspettativa di ricevere un aiuto analogo a parti invertite, prima o poi, secondo la norma della reciprocità.\n\nConsolidamento evolutivo: Se la ricompensa e la restituzione dell'aiuto sono superiori al costo sostenuto, il comportamento si rinforza, si consolida e si diffonde nella specie.\n\nIn questa prospettiva, la generosità umana risponde a motivazioni razionali di ponderazione tra costi e benefici, interpretando l'altruismo non come una forza utopica, ma come un raffinato meccanismo biologico di cooperazione e adattamento sociale volto alla sopravvivenza."},{"title":"1. Le Basi Neurali dell'Altruismo Reciproco","content":"Un celebre esperimento condotto alla Emory University di Atlanta ha indagato l'attività neuronale di 36 giovani donne impegnate nel gioco di laboratorio noto come \"Il dilemma del prigioniero\". Lo studio ha rivelato dati significativi sui correlati neurobiologici della cooperazione:\n\nAttivazione del circuito del piacere: Quando le giocatrici scelgono la via della collaborazione reciproca (rispetto alla competizione), i loro circuiti mentali si riempiono di gioia e piacere.\n\nCoinvolgimento della dopamina: Le scansioni di risonanza magnetica funzionale hanno evidenziato l'attivazione di due specifiche aree cerebrali ricche di neuroni reattivi alla dopamina (lo strato antero-ventrale nella zona centrale del cervello e la corteccia orbito-frontale).\n\nConclusione biologica: L'impulso a collaborare è innato negli esseri umani e viene rinforzato da una piacevole sensazione cerebrale di benessere; le persone collaborano anche perché così facendo si sentono meglio."},{"title":"2. L'Evoluzionismo Culturale e i Modelli Sociologici","content":"Per superare i limiti dei modelli sociobiologici rigidi, le teorie dell'evoluzionismo culturale postulano che l'altruismo sia un valore e una norma sociale trasmessa di generazione in generazione e interiorizzata mediante i processi di apprendimento sociale."},{"title":"La Docilità (Herbert Simon)","content":"Il premio Nobel Herbert Simon definisce la docilità come la tendenza innata ad apprendere dagli altri che emerge evolutivamente nelle popolazioni umane.\n\nValore adattivo: La docilità consente di dipendere dai consigli e dalle informazioni provenienti dalle persone con cui si interagisce, permettendo l'acquisizione di schemi di comportamento utili alla sopravvivenza.\n\nVantaggio per l'altruismo: Poiché la razionalità individuale è limitata, l'imitazione degli altri permette di approdare a una conoscenza più ampia. La tendenza ad apprendere dai membri del gruppo porta all'acquisizione di comportamenti prosociali e schemi altruistici in cui i benefici complessivi eccedono i costi individuali."},{"title":"La Coesione di Gruppo e la Trasmissione Conformista (Boyd e Richerson)","content":"Boyd e Richerson sostengono che gli individui possiedano degli istinti tribali prosociali innati, ossia meccanismi emotivi e cognitivi che danno origine alla coesione di gruppo e al legame soggettivo con la propria comunità.\n\nLa trasmissione conformista: È il meccanismo mediante il quale le persone apprendono il patrimonio culturale della società, tendendo a far proprie le opinioni e le credenze della maggioranza.\n\nIl contrasto ai free riders: La trasmissione conformista riduce la variazione all'interno del gruppo e protegge la diffusione dell'altruismo, impedendo ai potenziali \"free riders\" (i liberi battitori che sfruttano l'aiuto altrui senza ricambiare) di deviare dalla norma sociale. Nelle competizioni tra gruppi, le comunità che sviluppano strutture più coese e solidali prevalgono nell'accesso alle risorse."},{"title":"3. Il Contesto: La Natura delle Situazioni","content":"I modelli biologici e sociologici non chiariscono i processi di pensiero e le emozioni immediate che spingono un individuo ad aiutare un'altra precisa persona in un dato momento. A partire dagli anni Sessanta, la psicologia sociale ha spostato l'attenzione sulla natura delle situazioni, analizzando le circostanze esterne che incidono sulle condotte prosociali."},{"title":"L'Omicidio di Kitty Genovese (New York, 1964)","content":"Il punto di partenza di questo filone di studi fu il brutale omicidio di Kitty Genovese nel quartiere del Queens. Nonostante le urla della giovane donna prolungatesi per oltre mezz'ora, nessuno dei numerosi passanti e vicini che si accorsero dell'evento intervenne direttamente o chiamò tempestivamente i soccorsi. L'opinione pubblica e i mass media parlarono di disumanizzazione delle metropoli e di totale apatia dei cittadini."},{"title":"L'Effetto Testimone (Bystander Effect)","content":"Per spiegare scientificamente questo fenomeno evitando giudizi moralistici e semplificazioni sull'egoismo umano, gli psicologi sociali Bibb Latané e John Darley avviarono un ampio progetto di ricerca volto a esplorare l'effetto testimone.\n\nDefinizione: L'effetto testimone descrive la dinamica secondo cui la probabilità che una persona in una situazione di emergenza riceva aiuto diminuisce drasticamente in presenza di altri testimoni occasionali.\n\nL'obiettivo dei ricercatori divenne quindi comprendere i meccanismi psicosociali che spingono individui assolutamente normali a non prestare aiuto a persone che si trovano in una palese situazione di difficoltà e pericolo."},{"title":"2.1 Il Modello Stadiale di Intervento (Latané e Darley)","content":"Per comprendere le ragioni dell'omissione di soccorso senza ricorrere a semplificazioni sull'insensibilità delle persone, Latané e Darley [1970] hanno elaborato un modello stadiale. Questo modello prevede cinque condizioni distinte che devono verificarsi in sequenza prima che un soggetto intraprenda un comportamento di aiuto in una situazione di emergenza:\n\n  [EMERGENZA] ──► 1. Accorgersi ──► 2. Interpretare ──► 3. Assumersi la ──► 4. Sapere ──► 5. Decidere di\n\n                    dell'evento        come emergenza      responsabilità      cosa fare       intervenire\n\nSe il percorso cognitivo si interrompe in uno qualsiasi di questi cinque stadi, il testimone non presterà aiuto."},{"title":"1. Accorgersi dell'evento","content":"Per prima cosa è necessario che le persone percepiscano che qualcosa sta accadendo. Fattori situazionali apparentemente banali, come il fatto di andare di fretta, possono limitare i canali percettivi e impedire di cogliere un segnale d'allarme.\n\nL'esperimento del \"Buon Samaritano\" (Darley e Batson, 1973): I ricercatori chiesero ad alcuni seminaristi di spostarsi in un altro edificio per tenere una relazione. Lungo il tragitto, i soggetti incontravano un uomo a terra in evidente stato di bisogno.\n\nI risultati: La tipologia di argomento su cui dovevano riflettere (la parabola del Buon Samaritano vs l'impegno pastorale) non ebbe alcuna influenza sull'aiuto. Al contrario, il fattore tempo fu determinante: i seminaristi indotti a credere di essere in ritardo tendevano a prestare aiuto in misura significativamente minore rispetto agli altri, spesso non accorgendosi nemmeno della presenza della vittima."},{"title":"2. Interpretare l'evento come situazione di emergenza","content":"Di fronte a circostanze ambigue, l'osservazione del comportamento altrui diventa una fonte di informazione cruciale per comprendere la realtà (influenza sociale informazionale). Quando nessuno coglie immediatamente l'allarme, si verifica il fenomeno dell'ignoranza collettiva: le persone non intervengono perché stanno cercando di comprendere la situazione, diventando reciprocamente un esempio di passività e indifferenza. Ciascuno valuterà l'evento come non drammatico e il comportamento collettivo si bloccherà."},{"title":"3. Assumersi la responsabilità di fare qualcosa","content":"Di regola, interveniamo solo quando ci assumiamo direttamente la responsabilità di farlo. Gli studi in condizioni controllate evidenziano che la disponibilità a prestare soccorso diminuisce nelle situazioni di pericolo in cui sono presenti diversi testimoni.\n\nDiffusione di responsabilità: La presenza di altri spettatori genera una frammentazione della responsabilità individuale; ognuno pensa che sarà un altro ad assumersi l'onere di intervenire. Questo effetto diventa via via più evidente con l'aumentare del numero dei presenti di fronte alla situazione critica.\n\nL'esperimento della crisi epilettica (Darley e Latané, 1968): Dei partecipanti, isolati in stanze adiacenti, comunicavano tramite un citofono. Durante la sessione, uno dei soggetti (un complice) simulava un attacco epilettico ad alta voce. I dati evidenziarono che la propensione a intervenire e la rapidità del soccorso erano massime nei soggetti che credevano di essere gli unici testimoni, mentre crollavano drasticamente nei partecipanti che pensavano di far parte di un gruppo formato da più persone."},{"title":"4. Sapere cosa fare (Conoscenza della forma di assistenza)","content":"Una condizione fondamentale per poter agire in una situazione di emergenza consiste nel sapere come aiutare e nel conoscere le modalità di soccorso adeguate. La mancanza di conoscenze e di competenze specifiche impedisce l'attuazione di un aiuto efficace."},{"title":"5. Decidere di intervenire","content":"Anche se si sono superati i quattro stadi precedenti, l'impulso altruistico può essere frenato nella fase decisionale finale da valutazioni situazionali immediate. I testimoni tendono a non intervenire se percepiscono una minaccia per la propria incolumità o se temono il giudizio negativo altrui (timore della valutazione), specialmente se l'azione si prospetta rischiosa o faticosa."},{"title":"2.2 Un'Analisi in Termini di Costi-Benefici","content":"Per perfezionare il modello stadiale spiegando i fattori che influenzano gli stadi decisionali, gli psicologi sociali hanno sviluppato modelli basati sul bilancio dei costi e dei benefici (Piliavin et al., 1981)."},{"title":"La Teoria dello Scambio Sociale","content":"Questo approccio assume che, a lungo termine, il comportamento volto ad aiutare gli altri sia guidato da una sorta di \"economia sociale\". Nelle interazioni umane gli individui scambiano beni materiali e beni sociali (assistenza, informazioni, status), mirando a conseguire il massimo piacere al minimo costo (strategia del minimax).\n\nSecondo questa visione utilitaristica, i costi e i benefici vengono monitorati consapevolmente o meno, lasciando un margine di prevedibilità al nostro comportamento (Thibaut e Kelley, 1959). Le persone sostengono l'onere dell'azione solo quando i benefici attesi superano i costi complessivi."},{"title":"La Natura dei Benefici nell'Altruismo","content":"Nello scambio sociale, i vantaggi del prestare aiuto non si limitano a ricompense materiali, ma abbracciano un'ampia gamma di beni sociali e psicologici:\n\nLa norma della reciprocità: la consapevolezza e la certezza che il comportamento generoso possa indurre il beneficiario (o la comunità) a restituire l'aiuto in futuro.\n\nInnalzamento dell'autostima: l'approvazione sociale e il senso di gratificazione personale.\n\nMassimizzazione dei benefici relazionali: l'acquisizione di amore, approvazione, gratitudine, rispetto e stima da parte del proprio gruppo sociale (Deutsch e Lamberti, 1986; Johnson et al., 2002)."},{"title":"Il Senso di Colpa come Beneficio Emotivo","content":"Il dare aiuto viene valutato anche in base a benefici di natura puramente psicologica, come la possibilità di alleviare il senso di colpa derivante da azioni riprovevoli commesse nel passato o da un eventuale non intervento.\n\nIl meccanismo psicologico: Il senso di colpa è un'emozione dolorosa che spinge le persone ad agire in diversi modi pur di evitarne l'oppressione.\n\nEvidenze sperimentali: In studi psicologici in cui i soggetti venivano indotti a compiere azioni biasimevoli (es. mentire, somministrare scosse, rompere oggetti), l'opportunità successiva di confessare, denigrare la vittima o compiere una buona azione riparatoria ha dimostrato che le persone fanno qualsiasi cosa pur di cancellare la colpa, trovare sollievo e ripristinare un'immagine di sé positiva (personale e pubblica). Il senso di colpa, dunque, può condurre al bene reintegrando lo stato d'animo alterato."},{"title":"I Fattori Situazionali legati ai Costi","content":"I ricercatori hanno isolato diversi fattori situazionali che aumentano il costo percepito del prestare soccorso, condizionando o inibendo l'intervento:\n\nAndare di fretta: Limita fortemente la motivazione a donare il proprio tempo a un estraneo (come dimostrato nell'esperimento del Buon Samaritano).\n\nTimore di conseguenze negative: La paura di avere a che fare con qualcuno ritenuto fastidioso (es. un ubriaco).\n\nFattori emotivo-visivi: La paura di assistere a scene cruente con presenza di sangue.\n\nTimore del giudizio sociale: La preoccupazione che il proprio intervento possa essere socialmente disapprovato."},{"title":"2. L'Effetto Testimone Implicito","content":"L'effetto testimone implicito rappresenta uno sviluppo del classico effetto testimone. Alcuni studi dimostrano che il comportamento altruistico può essere influenzato negativamente anche solo attivando nella memoria la presenza di un gruppo di persone, senza che queste siano fisicamente presenti."},{"title":"Il Ruolo del Priming Cognitivo","content":"Il priming consiste nell'attivazione casuale di strutture di conoscenza (tratti o stereotipi). Stimoli impercettibili presenti nell'ambiente fisico e sociale sono in grado di modificare il modo di agire individuale senza la mediazione di processi di giudizio consapevoli.\n\nIl meccanismo dell'apatia implicita: La semplice attivazione mentale del costrutto di un gruppo genera un effetto di \"apatia del testimone\" su un compito successivo.\n\nVerifica sperimentale (Garcia e colleghi, 2002): Presentando ai soggetti stimoli prime relativi a situazioni in cui si trovavano insieme ad altre persone (una folla o una situazione di gruppo), si riscontrava una minor propensione al comportamento d'aiuto rispetto a chi riceveva prime relativi a una situazione in cui era presente una sola persona o contesti neutri. Di fatto, le persone che immaginano semplicemente la presenza di altri (attraverso un prime) palesano in misura minore un comportamento d'aiuto su un compito successivo del tutto slegato."},{"title":"Il Moderatore dell'Effetto: Il Focus dell'Attenzione","content":"Ricerche successive (Garcia et al., 2009) hanno individuato un importante moderatore di questa dinamica nel livello di attenzione da parte del gruppo:\n\nCondizione di semplice presenza: Quando i partecipanti immaginano di essere in un gruppo in cui sono semplici componenti generici, l'intervento d'aiuto si riduce (coerentemente con la diffusione della responsabilità).\n\nCondizione di centralità dell'attenzione: Quando il soggetto immagina di essere in un cinema o in un gruppo ma con l'attenzione del pubblico completamente rivolta su di lui, si verifica l'effetto contrario: il livello di aiuto fornito nel compito successivo aumenta."},{"title":"Spiegazioni teoriche della centralità","content":"Gestione dell'impressione (Autopresentazione): Sentirsi al centro dell'attenzione attiva norme sociali salienti legate ai comportamenti prosociali (aiutare è un valore apprezzato e condiviso). Il percepirsi sotto osservazione stimola il desiderio di gestire la propria impressione pubblica positiva, attivando i meccanismi di autopresentazione anche in modo automatico.\n\nLivello di Arousal (Attivazione Fisiologica): Essere al centro dell'attenzione incrementa il livello di attivazione fisiologica (arousal). Secondo il modello costi-benefici dell'attivazione, la sofferenza di un'altra persona genera nel testimone un'attivazione empatica spiacevole (emozione fastidiosa); l'aumento dell'arousal fornisce l'energia necessaria per agire, spingendo il soggetto a prestare aiuto come modo efficace per ridurre il proprio stato di malessere interno."},{"title":"3. Gruppo di Appartenenza e Comportamento d'Aiuto","content":"Le condizioni di appartenenza categoriale possiedono un peso specifico notevole nell'alterare il bilancio tra costi e benefici del soccorso:\n\nLa percezione di similarità: Le persone sono maggiormente inclini ad aiutare chi avvertono come simile a loro. La somiglianza percepita aumenta l'attrazione interpersonale, la quale a sua volta accresce la disponibilità ad agire positivamente.\n\nL'identità sociale e l'autocategorizzazione (Tajfel e Turner): Vedere gli altri come membri del proprio gruppo (ingroup) ha un effetto profondo sul comportamento. Le persone ricordano meglio le informazioni relative ai membri dell'ingroup, pensano a essi in modo più positivo, li valutano più favorevolmente e sono più generose nel mettere a disposizione le proprie risorse rispetto a quanto facciano con i membri dell'outgroup.\n\nIl senso di «noi» condiviso: La percezione di un'identità di gruppo condivisa attiva un senso di appartenenza che aumenta la propensione a mettere in atto comportamenti prosociali. Le persone si mostrano sensibilmente più disponibili ad aiutare gli individui appartenenti a un gruppo a cui si sentono legati da un profondo destino comune.\n\nEsempio storico-sociale: Durante eventi bellici o minacce esterne, gli appartenenti a una medesima comunità (es. gli americani che scoprono di essere sotto attacco) sperimentano un incremento immediato del senso di identità condivisa, riscoprendosi fondamentalmente più generosi gli uni con gli altri ed esibendo un aumento considerevole dei comportamenti di aiuto reciproco."},{"title":"2.4.1 Strategie di Ricategorizzazione: L'Identità Comune","content":"In linea con i modelli di risoluzione del conflitto intergruppi, indurre un'identità di gruppo comune aumenta considerevolmente la disponibilità a prestare aiuto a individui inizialmente percepiti come membri di un gruppo esterno (outgroup)."},{"title":"L'Esperimento delle tifoserie calcistiche (Levine et al., 2005)","content":"Gli sperimentatori hanno analizzato la rivalità esistente in Inghilterra tra i sostenitori di squadre diverse di calcio attraverso due differenti studi basati sul medesimo scenario: un podista palesemente dolorante con la caviglia ferita lungo il tragitto dei partecipanti.\n\nPrimo esperimento (Salienza dell'identità specifica): Veniva resa saliente l'appartenenza alla propria squadra del cuore tramite un questionario iniziale. I partecipanti prestavano aiuto in misura maggiore se il ferito indossava la maglia della propria squadra (92%), rispetto al caso in cui portasse la maglia della squadra rivale (30%) o una maglia neutra (33%).\n\nSecondo esperimento (Salienza dell'identità comune): Gli autori hanno accentuato l'identità comune di \"tifosi di calcio\" in generale, piuttosto che quella di sostenitori di team differenti. I risultati mostrarono una forte disponibilità ad aiutare il corridore sia che vestisse la maglia della propria squadra (80%) sia quella della squadra rivale (70%). La percentuale crollava vistosamente solo se il ferito indossava una maglia sportiva generica priva di simboli calcistici.\n\nL'appartenenza ha un impatto flessibile: le persone sono pronte a prestare soccorso se colui che ha bisogno condivide l'identità di gruppo che in quel momento specifico è resa saliente."},{"title":"2.4.2 Relazioni di Status e Dinamiche di Aiuto","content":"Le relazioni intergruppi sono spesso sbilanciate in termini di status e potere; il favoritismo verso l'ingroup e la svalutazione dell'outgroup variano in base a questa gerarchia:\n\nI membri di gruppi con status superiore o equivalente mostrano un orientamento a favore del proprio gruppo (ingroup).\n\nI membri di gruppi con status inferiore tendono paradossalmente a favorire l'outgroup. Secondo la teoria dell'identità sociale, i gruppi subordinati adottano strategie di avvicinamento o di mobilità verso i gruppi superiori per superare l'incoerenza e ottenere un'identità positiva."},{"title":"La Minaccia del Ricevere Aiuto: Autonomia vs Dipendenza","content":"Le relazioni d'aiuto sono asimmetriche per natura: chi porge aiuto ha risorse, chi riceve dipende dalla sua volontà. Questo squilibrio può portare il beneficiario a vivere l'aiuto come un'esperienza di minaccia del Sé, spingendolo talvolta a rifiutarlo o a preferire il prosieguo del proprio stato di bisogno. Nadler [2002] distingue due tipologie di aiuto:"},{"title":"L'effetto della stabilità dello Status","content":"Quando le differenze di status sono percepite come instabili e illegittime (situazione fluida), i comportamenti cambiano radicalmente:\n\nI gruppi superiori avvertono minacciata la propria posizione e tentano di riaffermarla offrendo unicamente aiuto orientato alla dipendenza.\n\nI gruppi subordinati – motivati a conseguire uno status paritetico – reagiscono negativamente a questo aiuto e cercano esclusivamente un aiuto orientato all'autonomia."},{"title":"Identificazione e Minaccia all'Identità di Gruppo","content":"Le reazioni della persona sono fortemente condizionate dal suo livello di identificazione con l'ingroup:\n\nAlti identificati: Coloro che si identificano molto con il proprio gruppo sono più resistenti, si pongono sulla difensiva quando l'identità è minacciata e mostrano un favoritismo e atteggiamenti stereotipici compensatori molto più marcati. Avvertono inoltre una maggiore omogeneità interna al gruppo.\n\nBassi identificati: Mostrano molta più ritrosia ed elasticità nel difendere i confini del gruppo di appartenenza."},{"title":"2.4.3 L'Effetto Testimone all'Interno dei Gruppi","content":"L'effetto testimone tradizionale risente fortemente delle dinamiche di appartenenza: l'inibizione e la passività del testimone di fronte ad altri spettatori si verificano soprattutto quando gli spettatori appartengono allo stesso gruppo del testimone.\n\nInoltre, l'appartenenza categoriale altera la scelta di fare volontariato o prestare aiuto interindividuale:\n\nStudio sull'orientamento sessuale (Simon, Stürmer e Steffens, 2000): Gli omosessuali esprimono un maggiore desiderio di aiutare quando è saliente la loro identità comune rispetto a malati di AIDS della medesima categoria (aiuto intra-gruppo). Al contrario, se l'aiuto è rivolto a membri dell'outgroup (eterosessuali), la decisione si basa sull'attrattività personale del target o su valutazioni individuali.\n\nMeccanismi cognitivi differenziati:\n\nSe l'identità comune è saliente, si sviluppa un legame empatico che spinge ad aiutare indipendentemente dal fatto che l'altro sia simpatico o meno; conta solo la comune appartenenza.\n\nSe appartengono a gruppi differenti, l'aiuto è mediato dall'attrazione interpersonal (si aiuta solo se il target è percepito come una persona piacevole)."},{"title":"2.4.4 Peculiarità Cross-Culturali: Individualismo vs Collettivismo","content":"La propensione e la motivazione ad aiutare all'interno dei gruppi varia in modo significativo in base alla macro-struttura culturale della società:\n\nSocietà Collettiviste (es. Cina, Giappone): Gli individui imparano a valorizzare e ad apprezzare l'appartenenza e i successi del gruppo rispetto a quelli del singolo. L'interesse del singolo è strettamente subordinato all'interesse della collettività. In queste culture, l'effetto testimone implicito è ridotto e si registra una disponibilità ad aiutare in misura nettamente maggiore coloro che appartengono al proprio gruppo rispetto alle società individualiste.\n\nSocietà Individualiste (es. Italia, Stati Uniti): Si esaltano continuamente le caratteristiche individuali e il successo personale. L'aiuto interpersonale risente maggiormente dei costi e dei benefici del singolo e delle variabili situazionali contingenti."},{"title":"2.5 Gruppi Etnici e Comportamento Altruistico","content":"Le caratteristiche etniche e le differenze culturali tra il testimone e chi chiede aiuto esercitano un peso notevole sul comportamento d'aiuto:\n\nNella prospettiva intergruppi (es. italiani e marocchini), la differenza etnica attiva pregiudizi e barriere cognitive che rendono il testimone meno disponibile a fornire sostegno a qualcuno appartenente a un gruppo etnico differente dal proprio.\n\nI gruppi stigmatizzati o minoritari nel nostro Paese sono spesso bersaglio di forti biases, avendo statisticamente meno probabilità di ricevere soccorso in situazioni di emergenza rispetto ai membri appartenenti a gruppi non stigmatizzati. Tuttavia, le ricerche classiche (Piliavin et al., 1969) evidenziano che di fronte a emergenze primarie o gravi, se il focus si sposta sulla comune umanità, il comportamento d'aiuto può superare i confini imposti dalla razza."},{"title":"2.5.1 Identità Etnica e Razzismo Aversivo (Gaertner e Dovidio)","content":"La relazione tra altruismo e differenze etniche è complessa e presenta risultati apparentemente contraddittori in letteratura: alcuni studi indicano una minore propensione ad aiutare persone di gruppi etnici differenti, altri non rilevano differenze, e altri ancora evidenziano una maggiore disponibilità dei bianchi nell'aiutare i neri. Per spiegare queste dinamiche, Samuel Gaertner e John Dovidio [1986] hanno introdotto il costrutto di razzismo riluttante (o pregiudizio aversivo)."},{"title":"Caratteristiche del Razzista Riluttante","content":"Valori dichiarati: Approva interamente i valori di solidarietà, giustizia sociale e tolleranza.\n\nSentimenti latenti: Avverte, in modo non sempre consapevole, sentimenti negativi quali avversione e disagio in presenza dei neri.\n\nAmbivalenza: Vive un profondo conflitto interiore tra i suoi valori egalitari e liberali da un lato, e i sentimenti contrari verso le minoranze dall'altro.\n\nModalità di espressione: La discriminazione non avviene apertamente, ma in modo indiretto e con modalità non rischiose per l'immagine pubblica di sé."},{"title":"L'Impatto delle Norme Sociali sulla Condotta di Aiuto","content":"La discriminazione del razzista riluttante si manifesta prevalentemente in base alla chiarezza delle norme sociali che regolano la situazione:\n\nNorme sociali chiare e appropriate: Nelle situazioni in cui i criteri di condotta sono evidenti, il razzista riluttante non mette in atto comportamenti discriminatori e si dimostra disponibile a prestare aiuto anche di fronte a un'emergenza. Violare le norme in questo caso minaccerebbe la sua immagine di persona tollerante.\n\nNorme sociali deboli o ambigue: Quando la situazione è confusa, i sentimenti negativi emergono poiché diventa facile razionalizzare un'eventuale reazione sfavorevole, descrivendola in termini diversi da un comportamento discriminatorio."},{"title":"L'Esperimento della percezione extrasensoriale (Gaertner e Dovidio, 1977)","content":"In un compito di telepatia di laboratorio, i partecipanti dovevano decifrare messaggi inviati da un \"emittente\" (bianco o nero) posto in una cabina vicina, dalla quale a un certo punto provenivano urla di sofferenza. Veniva manipolato il numero di testimoni presenti.\n\nCondizione \"Soli con l'emittente\" (Norma potente, nessun capro espiatorio): I partecipanti intervenivano in massa (90%) senza distinzioni di razza, poiché l'assenza di altri testimoni impediva la diffusione di responsabilità.\n\nCondizione \"In compagnia di altri testimoni\" (Norma ambigua): La presenza di altri consentiva di diffondere la responsabilità e di evitare il riconoscimento del proprio pregiudizio. In questa circostanza, i partecipanti aiutarono la vittima bianca il 75% delle volte rispetto alla vittima nera (38%)."},{"title":"Bilancio di Costi e Benefici per il Razzista Riluttante","content":"L'effetto della razza sulla condotta d'aiuto è mediato da una specifica valutazione dei costi legati all'immagine di sé:\n\nSe la discriminazione è evidente (il soggetto è l'unico testimone), non aiutare comporta un costo elevatissimo per la propria rappresentazione interna. Aiutare i neri diventa in questo caso una gratificazione per riaffermare l'immagine di sé come persona priva di pregiudizio.\n\nSe il razzista riluttante può razionalizzare il mancato aiuto basandosi su altri fattori (es. credere che intervenga qualcun altro), il costo specifico del non aiutare viene meno, e i bianchi si mostrano meno propensi a soccorrere i neri.\n\nNota metodologica: La rassegna di Saucier, Miller e Doucet [2005] su 31 studi ha confermato che i bianchi aiutano meno i neri soprattutto nelle situazioni che offrono scuse e razionalizzazioni apparentemente non legate alla razza. Inoltre, i bianchi faticano maggiormente a intervenire in favore dei neri laddove la situazione richieda rapidità d'azione e intervento immediato, condizioni che inibiscono i processi di controllo consapevole del comportamento."},{"title":"3. Le Motivazioni del Comportamento d'Aiuto","content":"La psicologia sociale analizza le ragioni che spingono le persone ad aiutare gli altri muovendosi lungo una corrispondenza con le scienze biologiche e psicologiche. L'impulso può essere letto attraverso due lenti principali:\n\nLente Egoistica: Chi aiuta lo fa per migliorare il proprio benessere personale.\n\nLente Altruistica: Chi aiuta ha come unico desiderio quello di migliorare il benessere dell'altra persona.\n\nGli studiosi affrontano la questione seguendo tre differenti approcci che enfatizzano l'apprendimento, le norme sociali e le emozioni."},{"title":"3.1 L'Approccio dell'Altruismo Appreso","content":"Questo filone teorico spiega il comportamento prosociale come l'esito dei medesimi processi di condizionamento e socializzazione che regolano le altre condotte umane."},{"title":"1. La Legge dell'Effetto (Thorndike) e il Condizionamento Operante","content":"Un principio base delle teorie comportamentiste è la legge dell'effetto di Thorndike: un atto si verifica tanto più spesso quanto più ad esso è associata una ricompensa.\n\nNel condizionamento operante, le persone imparano a prestare aiuto perché questa azione è stata rinforzata positivamente nel passato attraverso lodi, approvazioni o ricompense materiali.\n\nI rinforzi possono consistere anche nel sollievo da circostanze negative (es. cessazione di una punizione o di un malessere). Al contrario, le persone evitano le condotte d'aiuto se in passato queste hanno determinato conseguenze negative."},{"title":"2. L'Apprendimento Sociale (Albert Bandura)","content":"Oltre alle esperienze dirette di premio e punizione, le persone acquisiscono comportamenti prosociali per via indiretta, attraverso le informazioni che provengono dall'ambiente. Il processo cardine è l'apprendimento sociale, secondo cui le risposte altruistiche possono essere imparate per imitazione osservando il comportamento degli altri (modelli stabili). I bambini assimilano una condotta prosociale guardando i pari o gli adulti, anche senza aver mai ricevuto rinforzi diretti.\n\nVerifica Sperimentale dell'imitazione sociale: In un esperimento, i partecipanti camminavano lungo una strada e vedevano una persona (in realtà un complice dei ricercatori) restituire un portafoglio smarrito che aveva appena rinvenuto. La persona che restituiva il portafoglio si mostrava contenta del proprio gesto. Successivamente, i partecipanti si imbattevano a loro volta in un portafoglio a terra. Coloro che avevano assistito al comportamento del modello positivo ripetevano lo stesso gesto con molto più entusiasmo rispetto ai soggetti inseriti in una condizione di controllo con modello fastidioso o assente.\n\nIn conclusione: Sia il rinforzo sia l'apprendimento sociale influenzano la disponibilità ad aiutare, portando gli individui ad apprendere l'altruismo allo stesso modo in cui si interiorizzano risposte aggressive o egoistiche."},{"title":"3.2 Norme Sociali e Altruismo","content":"Le norme sociali sono regole implicite che prescrivono quali siano i comportamenti, i valori e le credenze accettabili, apprezzati e condivisi all'interno di un gruppo. Esse fungono da determinanti fondamentali dell'intenzione di aiutare. Attraverso di esse, gli individui comprendono come dovrebbero comportarsi e cosa gli altri si aspettano da loro.\n\nLe teorie normative sul comportamento d'aiuto sostengono che le persone soccorrono il prossimo per due ragioni:\n\nPossiedono delle aspettative interiorizzate durante il processo di socializzazione.\n\nIl comportamento del momento di coloro che hanno di fronte suggerisce che l'aiuto sia la risposta sociale più appropriata.\n\nNon riuscire a soddisfare queste guide sociali può generare uno stato di amarezza o indurre le persone a diventare ipercritiche e severe verso gli altri. Mentre alcune norme inibiscono l'altruismo, quelle che lo favoriscono si dividono in criteri basati sulla correttezza relazionale (reciprocità ed equità) e standard universali (responsabilità sociale)."},{"title":"1. La Norma della Reciprocità","content":"La norma della reciprocità prescrive di restituire i favori ricevuti. Essa impone di aiutare (e non danneggiare) chi in precedenza ci ha favoriti e, al contempo, garantisce a chi aiuta che verrà probabilmente ricambiato in futuro con uguale attenzione. Questo principio, profondamente interiorizzato, spinge a tentare di mantenere relazioni stabili e paritetiche, poiché uno sbilanciamento prolungato genera disagio.\n\nInterazione futura ed efficacia: La norma ha un peso cruciale quando ci si aspetta di incontrare nuovamente la persona, ma opera anche in assenza di interazioni future. Inquadrare una richiesta d'aiuto in termini di reciprocità o scambio è particolarmente efficace quando la persona in difficoltà affronta un problema concreto o reiterato, poiché circoscrive la relazione e frena la sensazione di dover aiutare all'infinito nel futuro.\n\nGeneralizzazione del favore: La reciprocità influenza il comportamento anche in modo generalizzato.\n\nL'esperimento di Berkowitz e Daniels [1964]: In un setting di laboratorio, degli studenti che avevano precedentemente ricevuto un favore da un complice offrivano assistenza in un compito successivo a una terza persona completamente diversa (anch'essa in difficoltà) molto più volentieri rispetto a quegli studenti che non avevano ricevuto alcun favore iniziale.\n\nLa copertura psicologica dei donatori: Quando i potenziali donatori ricevono una richiesta d'aiuto considerevole (es. soccorrere bambini rimasti senza tetto), sono più propensi a donare se in cambio dell'elargizione viene offerto loro un piccolo regalo. Lo \"scambio\" formale fornisce una copertura psicologica che legittima la loro azione compassionevole."},{"title":"2. La Norma dell'Equità","content":"La norma dell'equità si basa sui principi di correttezza e di equilibrio nella ripartizione di ricompense e costi. Se ognuno cercasse ciecamente di massimizzare solo il proprio profitto individuale, l'intero sistema sociale verrebbe danneggiato dal comportamento altrui. Solo giungendo a un compromesso è possibile evitare il conflitto.\n\nIl bilancio percepito: L'equità esiste quando le persone, all'interno di una relazione, credono che vi sia un giusto equilibrio tra ciò che danno e ciò che ricevono. Quando avvertono uno squilibrio (un'ingiustizia), sperimentano un disagio e sono motivate a compiere azioni per ripristinare l'equità.\n\nPromozione dell'altruismo: Numerose evidenze empiriche mostrano che la percezione di essere stati ricompensati più del dovuto in modo ingiusto spinge le persone a mettere in atto comportamenti altruistici (es. devolvere spontaneamente parte del proprio compenso a chi si trova in svantaggio) per bilanciare la relazione. Al contrario, se le persone ritengono di aver ricevuto meno di quanto meritato, tendono a sovrastimare il proprio contributo e sono meno inclini ad aiutare."},{"title":"3. La Credenza in un Mondo Giusto","content":"La credenza in un mondo giusto è la radicata convinzione secondo cui il mondo sia un luogo equo dove le cose positive accadono alle persone buone e le cose negative accadono alle persone cattive. Di conseguenza, si presume che le persone ottengano esattamente ciò che meritano.\n\nL'aiuto come ripristino della giustizia: Se un individuo incontra una persona che subisce un torto o si trova in una condizione di sofferenza ingiusta, sperimenta una minaccia alla propria visione del mondo equo. Per ripristinare il senso di giustizia, si sente motivato ad aiutare la vittima sfortunata, a patto che l'aiuto non richieda un impegno o costi eccessivi.\n\nLa colpevolizzazione della vittima (Victim Blaming): Se la persona
