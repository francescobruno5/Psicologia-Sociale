<style>

<body>

<div class="header">
  <div class="brain-icon">🧠</div>
  <div>
    <h1>Psicologia Sociale</h1>
    <div class="subtitle">Lettore con sintesi vocale — 408 sezioni</div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      Indice
      <span class="section-count" id="sec-count">408</span>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Cerca sezione..." id="search-input" oninput="filterSections(this.value)">
    </div>
    <div class="section-list" id="section-list"></div>
  </div>

  <div class="content-area">
    <div class="text-display" id="text-display">
      <div class="section-title" id="section-title">Seleziona una sezione</div>
      <div id="text-content"><p style="color:#6b7a9e;font-size:0.9rem;">Scegli una sezione dall'indice o premi ▶ per iniziare dall'inizio.</p></div>
    </div>

    <div class="controls">
      <div class="controls-top">
        <div class="progress-text" id="progress-text">0 / 408</div>
        <div class="progress-bar-container" id="progress-bar" onclick="seekProgress(event)">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="status-bar">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Pronto</span>
        </div>
      </div>

      <div class="controls-bottom">
        <div class="btn-group">
          <button class="btn-icon" onclick="prevSection()" title="Sezione precedente">⏮</button>
          <button class="btn-icon btn-play" id="btn-play" onclick="togglePlay()">▶</button>
          <button class="btn-icon" onclick="nextSection()" title="Sezione successiva">⏭</button>
          <button class="btn-icon" onclick="stopReading()" title="Stop">⏹</button>
        </div>

        <div class="control-group">
          <div class="control-label">Velocità</div>
          <div class="control-row">
            <input type="range" class="slider" id="rate-slider" min="0.5" max="2" step="0.1" value="0.95" oninput="updateRate(this.value)">
            <span class="slider-val" id="rate-val">0.95×</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">Tono</div>
          <div class="control-row">
            <input type="range" class="slider" id="pitch-slider" min="0.5" max="1.5" step="0.05" value="1.0" oninput="updatePitch(this.value)">
            <span class="slider-val" id="pitch-val">1.0</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">Volume</div>
          <div class="control-row">
            <input type="range" class="slider" id="vol-slider" min="0" max="1" step="0.05" value="1" oninput="updateVol(this.value)">
            <span class="slider-val" id="vol-val">100%</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">Voce</div>
          <select id="voice-select" onchange="changeVoice(this.value)">
            <option>Caricamento...</option>
          </select>
        </div>

        <div class="btn-group" style="margin-left:auto;">
          <button class="btn" id="btn-auto" onclick="toggleAutoNext()">⏩ Auto-avanti</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SECTIONS = [{"title":"Psicologia Sociale","content":"La psicologia sociale è lo studio scientifico del comportamento degli individui in tutti i contesti sociali, e procede attraverso metodi di ricerca propri delle scienze empiriche. Due convinzioni basilari caratterizzano la psicologia sociale:\n\nNell’ambiente sociale agisce un individuo che elabora le informazioni provenienti dall’esterno e, in base a queste, genera inferenze, aspettative sul comportamento altrui e piani per la propria azione.\n\nL’attività della mente umana non è sempre svolta in modo consapevole.\n\nLa psicologia sociale può essere descritta come lo studio sistematico dei fenomeni sociali centrato sul comportamento dell’uomo in quanto componente di una collettività organizzata.\n\nGli psicologi sociali si avvalgono del metodo scientifico, che prevede: la formulazione della teoria, l'esplicitazione delle ipotesi, la raccolta dei dati empirici, l'analisi dei dati e il confronto fra i risultati ottenuti e la teoria stessa. La caratteristica essenziale di una teoria, ovvero quella che le conferisce il carattere di scientificità, consiste nella possibilità di essere confutata. Uno psicologo sociale verifica un’ipotesi tramite l’operazionalizzazione, ossia la sua trasformazione in un’affermazione empiricamente osservabile."},{"title":"L'evoluzione dei modelli di individuo nella psicologia sociale","content":"La psicologia sociale ha mantenuto la convinzione diffusa dell'individuo immaginato come un essere pensante, capace di generare ragionamenti, valutazioni e inferenze. Questa concezione assume diverse interpretazioni a seconda dei vari orientamenti teorici:\n\nIl ricercatore di coerenza (Anni '50 - '60): La teoria della dissonanza cognitiva di Festinger (1957) e la teoria dell’equilibrio di Heider (1958) vengono ispirate da una concezione dell’individuo come ricercatore di coerenza, motivato a ricercare l’equilibrio tra le credenze che possiede, e tra il proprio sistema di credenze e il comportamento messo in atto. Secondo questa prospettiva, l’individuo che avverte un’incongruenza tra un suo atteggiamento e un suo comportamento sperimenta una sgradevole attivazione fisiologica, che funge da spinta motivazionale per recuperare l’equilibrio.\n\nLo scienziato ingenuo (Anni '70): Negli anni '70 il modello di uomo razionale che cerca la coerenza entra in crisi. La ricerca psicosociale si concentra soprattutto sul modo in cui l’individuo elabora l’informazione che proviene dal suo mondo sociale: sul modo in cui percepisce se stesso e gli altri, sui processi di pensiero coinvolti nella categorizzazione della realtà, sulla rappresentazione mentale che ne scaturisce e sul modo in cui queste rappresentazioni influenzano giudizi e comportamenti. In questo periodo vengono elaborate le teorie dell’attribuzione e le teorie implicite di personalità: le prime si interessano delle modalità con cui gli individui si raffigurano i nessi causali degli eventi sociali e dei comportamenti; le seconde guidano lo sviluppo e l’elaborazione delle impressioni complesse sugli altri. L’individuo non è più un ricercatore di coerenza, bensì uno \"scienziato ingenuo\" che, se ha tempo e risorse cognitive disponibili, si impegna a elaborare razionalmente le informazioni e vuole arrivare a una definizione della realtà, anche se questa può non essere corretta. Il bisogno dello scienziato ingenuo è poter fare delle previsioni riguardo alle situazioni e ai comportamenti per giungere a un controllo sugli eventi. Seguendo una serie di passaggi razionali per arrivare a una spiegazione, l’individuo sarà in grado di interpretare correttamente gli eventi e trovare i validi nessi di causalità tra questi e i comportamenti. Eventuali errori nella spiegazione degli eventi sono essenzialmente procedurali, imputabili cioè a un’errata esecuzione dei passaggi razionali necessari. In questo senso, non sono tanto i fattori motivazionali dell’individuo a determinare l’esito dei suoi processi mentali, bensì la precisione della sua analisi cognitiva. \n\nL'economizzatore di risorse cognitive: Questo modo di concepire l’individuo ha i propri limiti, poiché lo scienziato ingenuo non si pone allo stesso modo nei confronti di tutte le informazioni che riguardano un dato evento. Alcune informazioni sono elaborate in modo dettagliato e attento, altre invece vengono prese in carico dal sistema cognitivo senza un grosso dispendio di energia. L’individuo non ha la capacità di elaborare in modo dettagliato tutti i dati che gli organi sensoriali rendono disponibili; perciò, deve mettere in atto strategie di elaborazione che gli consentano di risparmiare tempo e sforzi e, contemporaneamente, di poter ottenere comunque informazioni sufficientemente attendibili su quanto sta accadendo intorno a lui. Il modello di uomo che ne deriva è quello dell’\"economizzatore di risorse cognitive\", che cerca costantemente un compromesso tra un’elaborazione accurata ed esaustiva e un’elaborazione più sommaria e imprecisa, ma più rapida. L’individuo spesso adotta strategie di pensiero conosciute come euristiche, che riducono al minimo il peso dei processi cognitivi e sono comunque in grado di fornire risposte utili e pianificare il proprio comportamento. In questo caso, eventuali errori dell’individuo sono dovuti proprio alle limitazioni del suo sistema cognitivo e all’utilizzo di euristiche nel ragionamento. \n\nLo stratega motivato: In anni più recenti, le ricerche psicosociali hanno messo in evidenza che l’individuo, nell’elaborare le informazioni, sceglie le strategie che preferisce in base alle sue necessità e ai suoi obiettivi. Se è motivato a dare un giudizio sociale accurato, allora preferirà elaborare attentamente tutte le informazioni, affinché il giudizio sia preciso e ponderato; al contrario, se non ha alcun motivo per spendere troppe energie, allora impiegherà dei ragionamenti rapidi e cognitivamente economici. Il modello di uomo come economizzatore di risorse si perfeziona così in un modello di \"stratega motivato\", cioè un individuo che sceglie le strategie cognitive che meglio si adattano ai suoi scopi e alle sue motivazioni."},{"title":"I modelli duali","content":"La visione dell’essere umano sintetizzata nei più recenti sviluppi della psicologia sociale ha portato a formulare una classe di modelli generalmente conosciuti come modelli duali. Da un lato l’individuo viene descritto come un tattico che gestisce le risorse di elaborazione disponibili sulla base delle proprie motivazioni; dall’altro viene riconosciuta la possibilità che processi routinari iperappresi possano essere messi in atto senza un cospicuo investimento attenzionale.\n\nLa combinazione di questi due principi porta a considerare che gran parte delle azioni in cui siamo impegnati ogni giorno possa essere portata a termine in due modi diversi: pianificando consapevolmente il nostro operato, oppure lasciando che l’azione venga prodotta in modo automatico e inconsapevole dal nostro sistema cognitivo. La scelta di una delle due modalità dipende da due parametri distinti: la disponibilità delle risorse di elaborazione e la motivazione a destinarle alla programmazione ed esecuzione del compito. Quindi, in presenza di una motivazione e di un'alta attenzione, l’individuo sarà portato ad eseguire un’elaborazione in modo consapevole.\n\nI modelli duali permettono di rendere conto di una varietà di dati apparentemente contraddittori; d’altra parte, rischiano di essere eccessivamente esplicativi e, pertanto, poco predittivi. Per avanzare un modello esplicativo duale, la spiegazione di un fenomeno richiede alcune precauzioni:\n\nOccorre specificare a priori, in modo non ambiguo, le condizioni che indirizzano verso un tipo di elaborazione consapevole anziché automatica, in modo da formulare ipotesi specifiche a riguardo.\n\nI meccanismi basilari di elaborazione e il suo substrato neuropsicologico devono essere compatibili con il modello proposto.\n\nA tal proposito, lo studio sui sistemi di memoria ha rivelato l’esistenza di due diversi sistemi di codifica e recupero delle informazioni: uno che apprende velocemente da stimoli unici o comunque nuovi, e un altro che invece apprende più lentamente a partire da regolarità generali nei pattern di stimolazione. Il primo sarebbe coinvolto nei processi di elaborazione consapevole, il secondo nei processi cognitivi automatici."},{"title":"L'attore attivato (XXI secolo)","content":"Nel XXI secolo le concezioni del pensatore sociale mutano ancora. La figura dello stratega motivato non è più considerata così deliberata. Oggi si pone molta enfasi su quelle associazioni automatiche e implicite che si innescano in un tempo brevissimo, e l’individuo viene considerato come un attore attivato. Ciò significa che l’ambiente sociale attiva velocemente i concetti nella mente dell’individuo senza che egli ne sia consapevole; tali concetti attivati innescano a loro volta cognizioni, valutazioni, affetti e comportamenti associati. È una concezione che pone attenzione alle risposte immediate, definite a seconda dei casi come indicatori impliciti, spontanei o automatici: risposte che non dipendono dall’intenzionalità e dalla volontà dell’individuo che percepisce gli stimoli sociali e ambientali."},{"title":"Attenzione, Consapevolezza e Processi Cognitivi","content":"Quando la quantità di attenzione destinata a un compito non raggiunge un livello soglia, l’individuo rimane all’oscuro di quella particolare attività della propria mente. Nel campo della percezione e in quello della memoria, l’elaborazione delle informazioni può avvenire secondo modalità di cui gli individui non sono consapevoli.\n\nEsempio empirico: Marcel, utilizzando un compito di priming semantico, ha messo in luce come una parola che compariva su uno schermo per pochi millisecondi fosse in grado di influenzare il tempo di elaborazione di uno stimolo successivo.\n\nMolti comportamenti sociali richiedono la messa in atto di procedure ordinarie, come ad esempio i processi di categorizzazione o di giudizio sociale, oppure l’attivazione di aspettative in seguito all’incontro con esponenti di gruppi sociali che ci sono ben noti.\n\nI processi automatici sono quei processi cognitivi che avvengono al di fuori della consapevolezza, sono involontari ed eseguiti senza sforzo cognitivo. In questo caso, i comportamenti espressi dipendono in larga misura dalle caratteristiche percettive delle persone con cui veniamo in contatto (lunghezza dei capelli, foggia degli abiti, colore della pelle, ecc.) e la possibilità di controllare l’azione è limitata dalla quantità di risorse attentive disponibili. \n\nI processi controllati, al contrario, richiedono una partecipazione attiva dell’individuo. In questo caso, il processo attivato comporta riflessione e un carico cognitivo."},{"title":"La percezione sociale (Capitolo due)","content":"L’impressione iniziale spesso altera l’interpretazione delle informazioni successive. Fin dal primo incontro vengono messi in atto processi psicologici tesi a costruire una rappresentazione della persona che abbiamo di fronte. Sarà proprio la rappresentazione che abbiamo costruito a fungere da modello per inferire cosa ci si deve aspettare da questa persona, cosa è opportuno dire e cosa invece è meglio tacere. Formarsi un'impressione delle persone con cui entriamo in contatto, quindi, è un nodo cruciale della relazione interpersonale, senza il quale sarebbe impossibile regolare il nostro comportamento a seconda di chi ci sta di fronte. L’insieme di sistemi che ci portano alla costruzione di questa rappresentazione viene identificato con il termine percezione sociale. \n\nIn termini generali, il modo in cui ci regoliamo nell’ambiente sociale in cui viviamo non differisce di molto da come ci regoliamo nel mondo fisico. Il sistema che ci orienta nel mondo sociale ci mette velocemente in grado di operare nei contesti relazionali. Per fare questo, è necessario che i sistemi preposti alla percezione sociale rispettino alcune caratteristiche fondamentali:\n\nEfficacia: In molte situazioni il modo in cui ci comportiamo di fronte agli altri è di importanza cruciale per il nostro benessere o per il nostro successo; pertanto, abbiamo bisogno di un insieme di procedure sufficientemente affidabili. \n\nFunzionamento euristico: Il sistema di formazione delle impressioni di personalità deve operare in modo euristico, vale a dire che deve fornirci delle risposte anche in assenza di informazioni complete. Dobbiamo necessariamente trarre inferenze da ciò che vediamo e utilizzarle per formarci il più velocemente possibile un sistema di aspettative che ci permetta di pianificare il nostro comportamento nei confronti della persona che abbiamo di fronte.\n\nFlessibilità: La percezione sociale deve essere in grado di valutare uomini e donne, bambini e persone anziane, persone simili a noi e persone molto diverse. Deve tener conto delle caratteristiche della situazione in cui avviene l’interazione sociale ed essere in grado di riconoscere quando sta costruendo rappresentazioni inadatte a spiegare e ad anticipare il comportamento di chi ha davanti, sapendo correggere, di conseguenza, l’eventuale impressione iniziale erronea.\n\nIn realtà, quando parliamo di percezione sociale intendiamo un insieme di processi psicologici che non sono stati descritti dagli autori con un linguaggio univoco. In tempi recenti sono apparsi modelli articolati che prevedono esplicitamente che la formazione di impressioni di personalità possa seguire percorsi diversi a seconda delle condizioni contestuali in cui il processo ha luogo e/o delle condizioni interne all’individuo."},{"title":"Il modello sequenziale di Gilbert","content":"Il modello sequenziale proposto da Gilbert e colleghi descrive tre diversi stadi sequenziali di elaborazione delle informazioni nella formazione delle impressioni di personalità:\n\n1.Categorizzazione:Fase automatica.\n\nVengono prese in considerazione le caratteristiche percettive dell’individuo e il suo comportamento.\n\n2.Caratterizzazione:Fase automatica.\n\nVengono inferite le caratteristiche disposizionali (i tratti di personalità) capaci di aver generato ed esercitato il comportamento osservato.\n\n3.Correzione:Fase controllata (richiede risorse).\n\nVengono prese in esame le caratteristiche della situazione in cui il comportamento si è manifestato. Si valuta la possibilità che la persona abbia agito spinta da vincoli situazionali piuttosto che da disposizioni interne.\n\nSecondo Gilbert, l’ultimo stadio del processo (la correzione) è meno automatico dei primi due; pertanto, per correggere l’impressione iniziale è necessario destinare a questo processo una discreta quantità di risorse cognitive. Ciò è possibile solo se non siamo distratti da qualche altra incombenza: se vengono a mancare le risorse di elaborazione, si tende a interpretare ogni comportamento osservabile come frutto esclusivo di disposizioni interne dell’individuo osservato.\n\nDefinizione: La tendenza a inserire tratti disposizionali corrispondenti ai comportamenti osservati, ignorando le influenze ambientali, prende il nome di errore fondamentale di attribuzione (Heider, 1958; Jones e Harris, 1967; Ross, 1977).\n\nL’operazione di correzione è alquanto complessa dal punto di vista dei processi mentali coinvolti, perché l’individuo deve essere in grado di considerare contemporaneamente due ipotesi sull’origine del comportamento: quella disposizionale (interna) e quella situazionale (esterna). Questa operazione può essere compiuta solo dopo che è avvenuto lo sviluppo del pensiero logico formale.\n\nQuesta ipotesi è stata testata da Blumberg e Silvera (1998) in un esperimento in cui i partecipanti dovevano valutare il reale atteggiamento di un individuo che era stato spinto a scrivere e poi a leggere ad alta voce un testo contro-attitudinale (cioè contrario alle proprie reali opinioni). Per compiere questa operazione, i soggetti inferiscono l’atteggiamento dal comportamento osservato in modo automatico: attribuiscono inizialmente alla persona un atteggiamento coerente con i contenuti del brano e poi, in un secondo momento, considerano i vincoli della situazione per correggere in modo strategico e volontario la prima impressione. Nell'esperimento, solo i soggetti che avevano raggiunto lo stadio di sviluppo del pensiero logico formale risultarono in grado di valutare correttamente il reale atteggiamento dell'individuo, superando l'errore sistematico."},{"title":"Il processo di categorizzazione","content":"Gilbert parla esplicitamente di categorizzazione intendendo con questo termine l’inclusione del dato percettivo in una più ampia categoria astratta di giudizio. In questo senso, il termine è utilizzato in modo aspecifico: si tratta sostanzialmente di interpretare ciò che osserviamo alla luce delle conoscenze che ciascuno di noi possiede sul proprio mondo.\n\nPer alcuni autori si tratta più specificamente di categorizzazione sociale, vale a dire l’inclusione di un individuo in un gruppo noto di cui si possiede una qualche forma di conoscenza astratta, ovvero uno stereotipo. Un modello specifico della categorizzazione sociale prevede proprio l’uso di queste conoscenze astratte relative a gruppi o categorie come strumento di giudizio primario nella formazione dell’impressione di personalità di uno specifico individuo."},{"title":"Dagli indizi percettivi alla percezione di una persona: Asch vs Anderson","content":"La psicologia sociale ha visto storicamente il confronto tra due modelli principali riguardo a come gli elementi informativi si uniscono per formare un'impressione coerente."},{"title":"Il modello configurazionale di Asch","content":"Il primo approccio organico allo studio della percezione sociale è legato al contributo di Solomon Asch. L’impostazione gestaltista di questo autore lo portò a concepire il funzionamento dei meccanismi della percezione sociale in modo analogo a quanto avviene nella percezione visiva. Ogni persona che incontriamo viene vista come un’unità, un insieme di caratteristiche che danno luogo a un percetto complesso. Costruire un’impressione complessa a partire da pochi elementi informativi risulta un compito assolutamente naturale; inoltre, le persone non si limitano a rievocare i tratti menzionati dallo sperimentatore, ma traggono inferenze da quanto udito e completano la descrizione della persona. L’impressione suscitata dallo stesso insieme di tratti può essere molto diversa da soggetto a soggetto, a testimonianza del fatto che si tratta di un processo attivo in cui ognuno arricchisce gli elementi disponibili sulla base della propria esperienza. \n\nNel modello di Asch l’interazione dinamica fra i tratti fa emergere le caratteristiche centrali della personalità, attorno alle quali si organizzano tutte le informazioni che via via si rendono disponibili, così come le inferenze che da queste vengono tratte. Uno dei risultati più suggestivi è l’effetto prodotto dall'ordine in cui vengono fornite le informazioni (effetto primacy): l’impressione che ci formiamo di una persona quando scopriamo che è \"intelligente, affettuosa e tirchia\" non è la stessa che avremmo scoprendo che è \"tirchia, affettuosa e intelligente\". Nel primo caso l’impressione sarà marcatamente più positiva rispetto al secondo."},{"title":"Il modello algebrico di Anderson","content":"Norman Anderson la pensa diversamente. Negli studi di Anderson la variabile cruciale riguarda il giudizio sul valore di ogni singolo tratto che i soggetti forniscono prima che i tratti stessi vengano utilizzati per descrivere una persona. L’autore dimostra come il giudizio complessivo lungo la dimensione favorevole/sfavorevole possa essere calcolato con precisione a partire dalla media matematica del valore attribuito a ciascuna caratteristica. Gli effetti di interazione tra i tratti evidenziati da Asch sarebbero, secondo Anderson, soltanto il frutto di un'errata valutazione dei soggetti sul modo in cui sono giunti a formarsi l'impressione. Nel suo modello l'integrazione avviene in modo automatico e matematico, mentre i soggetti, se chiamati a spiegare il lavoro della propria mente, farebbero ricorso a una teoria implicita, diffusa e condivisa su come generalmente si pensa di conoscere un altro individuo.\n\nNota di confronto: È impossibile stabilire in assoluto quale dei due modelli sia quello corretto, poiché sono stati formulati partendo da paradigmi e approcci di ricerca completamente differenti, il che rende impossibile un confronto diretto sul piano empirico."},{"title":"Il modello del continuum di Fiske e Neuberg","content":"Il modello del continuum prevede esplicitamente che non vi sia un’unica modalità di analisi delle informazioni disponibili per formulare un giudizio sulle persone che incontriamo. Piuttosto, la valutazione viene costruita utilizzando strategie diversificate che si muovono lungo un continuum (da un'elaborazione basata su categorie sociali a una basata sui singoli tratti individuali), a seconda di due parametri fondamentali:\n\nLa motivazione all'accuratezza da parte di chi percepisce.\n\nLa quantità di risorse di elaborazione cognitiva disponibili in quel momento."},{"title":"Il funzionamento del modello del continuum (Fiske e Neuberg)","content":"Il modello del continuum prevede che il giudizio sociale si muova tra due polarità: si va da un estremo in cui il giudizio è basato sull’integrazione delle informazioni individuali (lato sinistro), fino a un estremo opposto in cui queste vengono completamente tralasciate in favore di conoscenze stereotipate e categoriali (lato destro).\n\nIl processo di formazione delle impressioni di personalità si articola in una sequenza di fasi:\n\nCategorizzazione automatica: La persona che incontriamo viene inizialmente categorizzata sulla base dei suoi tratti percettivi. Questa operazione è del tutto automatica e inevitabile. Le categorie coinvolte in questa fase sono definite dagli autori come privilegiate (genere, età, razza), vale a dire di uso comune in quanto applicabili a tutti gli individui.\n\nArresto o approfondimento: Se la persona di fronte è legata a un contatto occasionale o non suscita il nostro interesse, il processo si arresta all'elaborazione automatica. In questo caso si formula un giudizio superficiale, che si colloca sul lato destro del continuum.\n\nConfronto categoriale: Se la persona suscita il nostro interesse, dedicheremo delle risorse cognitive per confrontare le sue caratteristiche con categorie di giudizio appositamente attivate (più specifiche). Se queste categorie risultano adatte a descrivere la persona, il processo può arrestarsi e il giudizio si colloca al centro del continuum.\n\nIntegrazione individualizzata: Se le caratteristiche della persona non combaciano con le categorie attivate, abbiamo bisogno di un ulteriore approfondimento. Il giudizio diventa pienamente consapevole e individualizzato, spostandosi sulla parte sinistra del continuum.\n\nParagone teorico: I giudizi formulati con largo impiego di informazioni stereotipiche sono valutazioni olistiche, che avvengono in modo molto simile a quanto Asch immaginava nel suo modello configurazionale. I giudizi individualizzati, invece, sono ottenuti aggregando fra loro le informazioni specifiche di un singolo individuo, così come previsto dal modello algebrico di Anderson.\n\nIl modello del continuum stabilisce che maggiore è la motivazione ad avere una rappresentazione dettagliata di una persona, più elevata sarà la quantità di risorse che il sistema cognitivo è disposto a dedicare al compito. Al crescere della motivazione, quindi, il giudizio tende a spostarsi verso sinistra.\n\nTuttavia, quotidianamente ci ritroviamo spesso in una situazione di multitasking; pertanto, la sola motivazione all'accuratezza non è una condizione sufficiente per intraprendere un'analisi dettagliata. Se le risorse cognitive non sono disponibili, il giudizio viene formulato facendo comunque appello alle informazioni categoriali. Al diminuire delle risorse, il giudizio sociale tende a muoversi verso la destra del continuum. Infine, un altro prerequisito importante per l'individualizzazione è la presenza di una quantità di informazioni sufficienti su cui lavorare (un esperimento dimostra, ad esempio, che le persone ricordano meglio i tratti di un individuo con cui sanno di dover interagire a breve)."},{"title":"Problemi metodologici e il concetto di salienza","content":"Sembra innegabile che ciascuno di noi possieda conoscenze astratte relative a gruppi o categorie sociali. Lo psicologo sociale deve però chiedersi in che misura le evidenze aneddotiche implichino necessariamente l’esistenza di una rappresentazione astratta di certe categorie.\n\nTipicamente, nei disegni sperimentali, l’esistenza di un effetto sistematico nei dati empirici viene attribuita all’intervento di un processo di categorizzazione che rende disponibili informazioni indifferenziate sui membri di un gruppo. In questi studi, le rappresentazioni astratte che si suppone siano coinvolte nel processo di giudizio sociale sono selezionate a priori e manipolate come variabili indipendenti; questa impostazione pone evidenti problemi di generalizzazione.\n\nSia nel modello di Fiske e Neuberg, sia in quello di Brewer, si sottolinea come le categorie utilizzate frequentemente (genere o razza) entrino in gioco automaticamente nella percezione sociale, mentre le categorie di uso meno frequente vengano richiamate da fattori contestuali e situazionali. Se sono presenti più categorie applicabili, il peso di ognuna dipende dalla salienza percettiva: più una categoria è visivamente o contestualmente saliente, maggiore sarà il suo contributo nel giudizio complessivo.\n\nDal punto di vista teorico ed epistemologico, tuttavia, l’introduzione del concetto di salienza rischia di rendere i modelli eccessivamente esplicativi e poco predittivi: a posteriori è sempre possibile giustificare un risultato inatteso imputandolo alla mancata salienza di una categoria o all’eccessiva salienza di una categoria concorrente."},{"title":"Il modello di giudizio sociale basato su esemplari","content":"Eliot R. Smith e Michael A. Zarate hanno proposto un modello alternativo noto come modello di giudizio sociale basato su esemplari, il quale parte da assunzioni estremamente semplici:\n\nOgni persona che incontriamo lascia una traccia nella nostra memoria.\n\nPer le persone incontrate frequentemente questa traccia è ricca, articolata e complessa.\n\nPer le persone incontrate occasionalmente o una sola volta, la traccia è decisamente scarna.\n\nGli autori definiscono queste tracce mnestiche come esemplari. Anche i personaggi storici o fittizi (della letteratura o della televisione) lasciano un ricordo in noi e possono diventare esemplari di giudizio sociale.\n\nSe a una festa incontriamo uno sconosciuto con tratti somatici molto simili a quelli di una persona a noi cara, la nostra impressione iniziale sarà subito positiva. Secondo questo modello, la variabile cruciale nella formazione delle impressioni non è l'attivazione di una categoria astratta, ma la somiglianza con specifici individui conosciuti in passato.\n\nA seconda delle caratteristiche della situazione e delle motivazioni che guidano l’interazione, alcune dimensioni di somiglianza diventano più importanti di altre. Se incontriamo una persona in spiaggia o in biblioteca, utilizzeremo dimensioni diverse per selezionare gli esemplari in memoria a cui associarla. Allo stesso modo, presteremo attenzione a caratteristiche differenti a seconda che con quella persona si debba collaborare, competere o non fare nulla.\n\nEvidenza empirica: Uno degli esperimenti più convincenti a supporto è quello di Pawel Lewicki, in cui degli studenti in un'aula universitaria venivano invitati a compilare un questionario consegnato da uno sperimentatore che poteva rivolgersi a loro in modo formale e sgarbato oppure gentile. [Nota: Il testo originale si interrompe qui sul disegno sperimentale di Lewicki]."},{"title":"Le teorie implicite di personalità","content":"Siamo generalmente convinti che le persone si comportino in funzione delle proprie caratteristiche personali stabili, ma la realtà psicologica dimostra che la situazione ambientale influisce enormemente. Nonostante ciò, ognuno di noi persiste nel compiere l'errore fondamentale di attribuzione. La spiegazione di questa persistenza ha a che fare con il bisogno di razionalizzazione e semplificazione: per riuscire a formulare delle aspettative stabili sugli altri, abbiamo l'esigenza di ridurre l'apparente variabilità dei comportamenti a un numero ridotto di cause.\n\nPer rendere prevedibile il comportamento del partner nell'interazione sociale, abbiamo sempre a disposizione una preziosa fonte di conoscenze: le teorie implicite di personalità.\n\nQueste teorie descrivono il modo relativamente stabile di reagire delle persone nelle diverse situazioni e rendono conto sia di una certa costanza sul piano cognitivo-affettivo, sia di una coerenza nei comportamenti. Si tratterebbe di una sorta di euristica che descrive il modo in cui i vari tratti della personalità e i comportamenti a essi conseguenti tendono a covariare (cioè a presentarsi insieme). Se, ad esempio, durante i primi scambi comunicativi una ragazza ci sembra \"simpatica\", tendiamo a inferire automaticamente che sia anche \"estroversa\" e \"gentile\", poiché nella nostra mente queste caratteristiche spesso si accompagnano.\n\nTuttavia, non tutti i tratti di personalità sono ugualmente evocativi. Già gli esperimenti di Asch avevano mostrato che l'effetto primacy si manifesta soprattutto con i tratti definiti centrali, capaci di ancorare l'intera percezione, mentre la posizione in cui compaiono le informazioni periferiche non è rilevante per la definizione dell’impressione globale."},{"title":"L'origine delle teorie implicite","content":"Esistono due filoni di pensiero sull'origine di queste mappe cognitive:\n\nOrigine semantica: I legami associativi tra le parole del lessico della lingua parlata porterebbero gli individui a pensare che termini descrittivi semanticamente vicini tendano a coesistere anche nelle persone reali. In quest'ottica, le teorie implicite di personalità sarebbero più il riflesso di regole linguistiche e aspettative culturali che un'euristica derivata dall'osservazione.\n\nOrigine empirica (da esperienza diretta): Una seconda prospettiva descrive queste teorie come il risultato sintetico delle nostre innumerevoli passate esperienze di interazione sociale. Ciascuno di noi farebbe tesoro delle associazioni reali osservate nei propri interlocutori nel corso della vita.\n\nOltre a tener traccia di queste associazioni, siamo in grado di compiere inferenze dimensionali complesse. Riconosciamo, ad esempio, che socievolezza e timidezza sono negativamente correlate, pur ricadendo entrambe lungo lo stesso continuum di introversione-estroversione. Possiamo inoltre creare dei veri e propri raggruppamenti tipologici e immaginare, ad esempio, il profilo del \"collega permaloso\" come qualcuno che è simultaneamente suscettibile, irascibile, che perdona difficilmente e ricorda a lungo gli sgarbi subiti.\n\nSe le teorie implicite di personalità fossero basate esclusivamente sull'esperienza diretta, le impressioni che formuliamo dovrebbero coincidere perfettamente con le reali rilevazioni oggettive di personalità degli individui osservati. Pur con i loro limiti, le teorie implicite di personalità risultano uno strumento estremamente efficace: il risultato del loro intervento è un costrutto sufficientemente ricco, rapido e affidabile da permetterci di regolare con successo i primi scambi sociali con uno sconosciuto.\n\nEcco la revisione completa del testo sull'Attribuzione Causale, la Profezia che si autoavvera e l'introduzione al capitolo terzo sul Sé. Ho ripulito la sintassi parlata, corretto tutti i refusi di dettatura (come \"ho un esame\" in a un esame, \"auto vera\" in autoavvera, \"li danno di più intelligenti\" in additati come più intelligenti, \"il problema volto migliore\" in il proprio volto migliore, ecc.) e strutturato i modelli teorici in modo chiaro e scannabile."},{"title":"L'attribuzione causale","content":"Formuliamo costantemente delle aspettative sul corso degli eventi e regoliamo il nostro comportamento in funzione di ciò che succede intorno a noi. Quando le cose non filano lisce e si verifica una violazione delle nostre aspettative, ci chiediamo il perché: ogni spiegazione che ci viene in mente è, di fatto, un’attribuzione causale. Gli eventi improvvisi e inattesi sono le occasioni principali in cui siamo portati a cercare una spiegazione. In questi contesti ci comportiamo come \"psicologi ingenui\" che tentano di rintracciare l’origine dei comportamenti osservati. Questa ricerca di senso è ciò che Fritz Heider definisce psicologia del senso comune.\n\nQuando cerchiamo la causa di un comportamento, la nostra analisi si muove lungo precise dimensioni:\n\nLocus di causalità (Interno vs Esterno): Facciamo un’attribuzione interna (o disposizionale) quando immaginiamo che il comportamento dipenda da caratteristiche stabili dell’individuo; facciamo un’attribuzione esterna (o situazionale) quando ne rintracciamo l’origine nella situazione contingente.\n\nStabilità (Stabile vs Occasionale): Se uniamo il locus alla stabilità, otteniamo combinazioni differenti. Se un passante ci urta e pensiamo a un fattore interno stabile, concluderemo che è un maleducato; se pensiamo a un fattore interno occasionale, penseremo semplicemente che fosse distratto. Sul piano esterno, una causa esterna stabile può essere imputata alle consuetudini rigide dell’ambiente circostante in quel preciso momento, mentre una causa esterna occasionale/saltuaria è legata a una condizione ambientale del tutto imprevedibile.\n\nI processi attribuzionali non sono un meccanismo imparziale. Tendiamo a preferire sistematicamente alcune spiegazioni rispetto ad altre, in particolare quelle che ci restituiscono una sensazione di prevedibilità del mondo sociale. Ciò si traduce in una sovrastima delle attribuzioni a fattori interni stabili, un fenomeno guidato da diverse forze:\n\nGli effetti non comuni: Sono le peculiarità del comportamento messo in atto rispetto ad altre condotte ugualmente plausibili nella medesima situazione. Più un comportamento produce effetti unici e non condivisi da altre opzioni, più è informativo sulle caratteristiche di chi lo compie.\n\nLa desiderabilità sociale: Riguarda il grado in cui un comportamento è apprezzato e valutato positivamente all'interno di una comunità. I comportamenti socialmente desiderabili sono poco informativi sulle caratteristiche personali (se qualcuno aiuta un anziano con le buste della spesa, può farlo sia per autentico altruismo, sia per adeguarsi alla norma sociale del soccorso). Al contrario, un’azione che viola le norme di desiderabilità sociale viene quasi sempre attribuita a caratteristiche interne.\n\nLa libertà di scelta: Riguarda la valutazione del fatto che un comportamento sia stato messo in atto deliberatamente o in seguito a condizionamenti esterni. Solo i comportamenti che riteniamo siano stati liberamente pianificati ci informano sulla reale personalità di chi li ha prodotti.\n\nLe aspettative di ruolo: Sono le azioni prescritte in funzione dei ruoli sociali ricoperti. I comportamenti conformi al ruolo risultano poco informativi poiché possono essere dettati dal semplice adeguamento normativo; una violazione delle aspettative di ruolo apre invece uno spiraglio sulle reali caratteristiche dell'attore."},{"title":"Il modello della covariazione di Kelley","content":"Harold Kelley ha proposto una concettualizzazione alternativa dei meccanismi attribuzionali basata sulla percezione della covariazione di tre distinti elementi informativi:\n\nTra questi elementi, la coerenza temporale è quello che assume il peso prevalente. Di conseguenza, i fenomeni che tendono a ripetersi nel tempo vengono tipicamente spiegati facendo riferimento a fattori disposizionali dell'individuo."},{"title":"Le distorsioni nei processi attribuzionali (Bias)","content":"Non ci limitiamo a cercare spiegazioni per il comportamento altrui, ma monitoriamo anche le nostre stesse azioni per trovare una ragione agli eventi che ci vedono protagonisti. Ricevere una telefonata da qualcuno che ci rinnova la propria stima, o un amico che improvvisamente ci toglie il saluto, sono eventi che ci portano a interrogarci su noi stessi.\n\nSelf-serving bias (Distorsione a servizio del sé): Siamo fortemente propensi ad attribuirci il merito degli eventi positivi della nostra vita (attribuzione interna), mentre cerchiamo di evitare la responsabilità di quelli negativi imputandoli al contesto (attribuzione esterna). Questa distorsione ha lo scopo di salvaguardare l’autostima.\n\nUn'altra asimmetria specifica è la discrepanza attore-osservatore: la tendenza sistematica a spiegare il comportamento altrui in termini disposizionali e a preferire spiegazioni situazionali per il proprio agire (\"Se sbagli tu è perché sei fatto così, se sbaglio io è perché è capitato\"). Questa discrepanza si verifica a causa della diversa accessibilità delle informazioni (conosciamo la nostra storia e i nostri vissuti meglio di quelli altrui) e risponde alla necessità psicologica di mantenere elevata l'autostima, preservando l'immagine del mondo come un ambiente prevedibile e controllabile."},{"title":"Il modello tridimensionale di Weiner","content":"Bernard Weiner ha sintetizzato queste strategie in un modello comprensivo basato su tre dimensioni indipendenti:\n\nLocus: L'origine interna o situazionale di un comportamento.\n\nStabilità: Se la causa è permanente o modificabile nel tempo.\n\nControllabilità: Se l'esito dell'azione era sotto il controllo volontario dell'individuo oppure no.\n\nQuesta classificazione determina il nostro comportamento futuro: se attribuiamo il fallimento a un esame universitario alla sfortuna (esterna, instabile, non controllabile), non prenderemo alcuna precauzione per il futuro; se invece lo attribuiamo al nostro scarso impegno (interno, instabile, controllabile), è probabile che la volta successiva cureremo meglio la preparazione."},{"title":"La profezia che si autoavvera","content":"Il modo in cui ci comportiamo nei confronti dei nostri interlocutori dipende dall’impressione di personalità che essi hanno suscitato in noi. Dal momento che ciascuno di noi deriva la conoscenza di sé anche dalle reazioni delle persone che lo circondano, rischiamo concretamente di conformarci all’idea che gli altri si sono fatti di noi.\n\nQuesto fenomeno è conosciuto come la profezia che si autoavvera, teorizzato da Robert K. Merton e strettamente legato al cosiddetto teorema di Thomas: \"Se gli uomini definiscono certe situazioni come reali, esse sono reali nelle loro conseguenze\".\n\nIl caso più noto e studiato riguarda gli ambiti scolastici e di apprendimento, dove le aspettative degli insegnanti sulle potenzialità degli allievi rischiano di influenzarne drammaticamente lo sviluppo cognitivo. I primi studi sistematici si devono a Robert Rosenthal: i bambini che erano stati contrassegnati (falsamente) come più intelligenti all'inizio dell'anno scolastico vennero trattati con particolare riguardo dai docenti, finendo per diventare realmente più competenti e intelligenti a fine anno. Esiste infatti una predilezione inconscia nel contatto e nell’interazione con soggetti a cui sono state attribuite caratteristiche positive, anche se queste non corrispondono al vero.\n\nIn sintesi, nel corso dell’interazione sociale costruiamo rappresentazioni dei nostri interlocutori che regolano il nostro comportamento nei loro confronti. Questo insieme di meccanismi è flessibile ed efficace, ma le euristiche che rendono possibile tale rapidità di giudizio comportano inevitabilmente una serie di rischi e distorsioni sistematiche."},{"title":"Capitolo tre: Psicologia sociale del Sé","content":"In psicologia, il primo a mostrare un interesse scientifico nei confronti del Sé è stato William James, il quale ha sottolineato come il concetto che si ha della propria persona (l’insieme delle conoscenze riguardo alle qualità individuali) sia estremamente complesso e sfaccettato. L'autore ne individua tre componenti principali:\n\nIl Sé materiale: Include gli aspetti fisici e corporei connessi alla persona, ma anche la famiglia, la casa, il lavoro e persino i vestiti che si indossano.\n\nIl Sé sociale: Riguarda le rappresentazioni della propria persona che traggono spunto dalle molteplici immagini che gli altri possiedono di noi. Secondo James, esistono tanti Sé sociali quanti sono gli individui che di noi possiedono un’immagine.\n\nIl Sé spirituale: Comprende le facoltà psicologiche, le motivazioni, le disposizioni interiori, nonché gli atteggiamenti e i tratti stabili di personalità.\n\nSuccessivamente, il sociologo Charles Cooley, partendo dal presupposto che la società e l’individuo siano inseparabili, afferma che lo sviluppo del Sé è strettamente connesso all’interazione sociale. Il suo principio del Sé rispecchiato mette in evidenza come il concetto di sé sia un riflesso delle idee relative alla propria persona che attribuiamo agli altri. In altre parole, la nostra capacità immaginativa ci permette di cogliere nella mente di un altro individuo un certo modo di considerare i nostri comportamenti, il nostro carattere o il nostro aspetto, e da tali considerazioni veniamo profondamente influenzati. Di conseguenza, i sentimenti di autostima dipendono fortemente da quanto le persone si sentano accettate dagli altri. \n\nErving Goffman si sofferma invece sulle esigenze espressive e di autopresentazione del Sé, affermando che il comportamento dell'individuo è quasi sempre dettato dal desiderio di lasciare un’impressione positiva nella mente di chi viene giudicato importante. Al pari di attori su un palcoscenico, gli individui sono continuamente impegnati a recitare dei ruoli, facendo attenzione a nascondere le proprie lacune per poter fare buona impressione sul pubblico.\n\nA partire dagli anni '60, l'avvento del cognitivismo conferisce piena dignità scientifica a tutti i costrutti interni precedentemente banditi dal comportamentismo, contribuendo in maniera determinante allo sviluppo di validi strumenti per la loro misurazione. Da quel momento, la ricerca psicosociale si è concentrata sulle modalità attraverso le quali si giunge a conoscere se stessi, sulle strategie utilizzate per la costruzione di un concetto di sé coerente, sugli effetti dell’autoconsapevolezza sul comportamento, sul ruolo della motivazione nell’acquisizione delle informazioni e sulle ragioni che spingono le persone a mostrare agli altri il proprio volto migliore.\n\nEcco la revisione completa del testo sull'Acquisizione del concetto di Sé e sui Motivi del Sé. Ho ripulito la sintassi dettata, rimosso i refusi evidenti (come \"il Kelly aiuta\" in il che aiuta, \"henzel Marcus\" in Hazel Markus, \"swan\" in Swann, \"SEP Domenico\" in Sé fenomenico) e formattato i modelli teorici ed empirici per renderli scannabili ed accademici."},{"title":"L'acquisizione del concetto di sé","content":"Le fonti più importanti per la conoscenza di sé sono l'autoriflessione, l'osservazione del proprio comportamento e il confronto con gli altri."},{"title":"1. L'autoriflessione","content":"Guardarsi dentro è fondamentale per capire se stessi, eppure non amiamo ricorrere all'introspezione. Secondo la teoria dell’autoconsapevolezza oggettiva (Duval e Wicklund), la ragione di questa riluttanza va ricercata nella particolare condizione psicologica in cui viene a trovarsi la persona quando il Sé diventa l'oggetto dell'attenzione. In questi casi, gli aspetti del Sé resi salienti dalla situazione vengono messi a confronto, in maniera pressoché automatica, con i canoni interiorizzati concernenti ciò che la persona aspira a essere.\n\nSe a volte questo confronto si rivela soddisfacente, molte altre volte crea un forte disagio psicologico dovuto alla sensazione di essere in difetto rispetto ai propri standard. L'obiettivo principale diventa allora quello di ridurre questa discrepanza.\n\nStrategia di evitamento: Una strategia semplice consiste nell'evitare gli stimoli che indirizzano l'attenzione verso noi stessi. Uno specchio, una videocamera puntata o l'ascolto della propria voce preregistrata sono gli stimoli tradizionalmente utilizzati dai ricercatori in laboratorio per indurre uno stato di autoconsapevolezza oggettiva.\n\nStrategie alternative ed effetti social: Un'alternativa efficace per focalizzarsi sulle proprie specificità consiste nel chiedere ai soggetti di scrivere le caratteristiche che li differenziano dagli altri. Anche il semplice aggiornamento del proprio profilo sui social network (come Facebook) tende a innalzare il livello di autoconsapevolezza, un aspetto che comporta però l'effetto collaterale di diminuire temporaneamente la capacità di assumere la prospettiva altrui.\n\nPoiché concentrarsi su se stessi conduce spesso a una spiacevole sensazione di inadeguatezza, le persone preferiscono di gran lunga rivolgere l'attenzione agli eventi dell'ambiente esterno. Rinunciando all'introspezione, tuttavia, ci lasciamo sfuggire una grande occasione per conoscere più a fondo le varie sfaccettature che ci caratterizzano."},{"title":"2. L'osservazione del proprio comportamento","content":"La teoria dell’autopercezione di Daryl Bem afferma che le persone, in determinate circostanze, giungono a conoscere i propri stati interni osservando i propri comportamenti, esattamente come farebbe un osservatore esterno. Questa inferenza comportamento-atteggiamento non ha luogo sempre in maniera automatica; affinché la persona compia questo passaggio psicologico è necessario che:\n\nIl proprio atteggiamento originario riguardo al tema in oggetto sia vago, ambiguo o poco chiaro.\n\nIl comportamento messo in atto sia stato liberamente scelto, senza minacce o pressioni esterne.\n\nEvidenza empirica: Un celebre esperimento condotto da Ito e colleghi all'Università di Chicago nel 2006 ha dimostrato l'efficacia di questo processo sul piano dell'attivazione embodied (corporea) degli atteggiamenti. [Nota: Il testo originale si interrompe qui sui dettagli del disegno sperimentale].\n\nI principi della teoria dell’autopercezione sono stati ampiamente utilizzati per spiegare le tecniche di vendita e di manipolazione comportamentale, come la tecnica del \"piede nella porta\" utilizzata dai professionisti della persuasione. Questa strategia consiste nel fare una richiesta iniziale molto piccola e poco costosa che quasi certamente verrà accettata, per poi avanzare una seconda richiesta molto più gravosa. La tecnica funziona perché le persone, avendo acconsentito alla prima richiesta, inferiscono dal proprio comportamento di essere individui che hanno a cuore quella determinata causa, e continuano ad accettare le richieste successive per rimanere coerenti con l'immagine di sé appena costruita."},{"title":"3. Il confronto con gli altri","content":"La teoria del confronto sociale di Leon Festinger stabilisce che, per valutare e conoscere le nostre abilità e opinioni, abbiamo il bisogno biologico di confrontarle con quelle degli altri. Gli altri ci fanno da parametro di riferimento e rappresentano una fonte inesauribile per la conoscenza del Sé.\n\nIl confronto ci fornisce informazioni preziose e accurate soprattutto se avviene con persone a noi simili o pari. Questa esigenza, tuttavia, si attenua man mano che le nostre abilità si perfezionano e diventiamo esperti in un settore. Ci spingiamo a confrontarci con gli altri in base alla rilevanza (salienza) che diamo a un particolare aspetto del Sé in quel momento. Un abuso del confronto sociale, specialmente in contesti iper-competitivi, può mettere a repentaglio la qualità della vita e il benessere psicologico. Il raffronto con le persone che ci circondano, in sintesi, ci dice chi siamo, quanto valiamo, se siamo nel giusto e in che misura ci distinguiamo dalla massa."},{"title":"I motivi del Sé e gli schemi cognitivi","content":"Recenti studi di neuroimaging dimostrano che le informazioni relative al Sé vengono elaborate e immagazzinate prevalentemente all'interno della corteccia prefrontale.\n\nSecondo la psicologa sociale Hazel Markus, le informazioni riguardanti la propria persona si organizzano in strutture cognitive chiamate schemi del Sé. Al loro interno troviamo sia rappresentazioni di eventi specifici vissuti dall'individuo, sia generalizzazioni più ampie frutto di valutazioni ripetute nel tempo sulla condotta personale.\n\nUn'importante funzione degli schemi del Sé è quella di guidare in modo selettivo la codifica e l'elaborazione delle informazioni: se un individuo si considera stabilmente una persona \"generosa\", tenderà a soffermarsi e a ricordare con facilità gli episodi in cui è emerso questo suo tratto, sorvolando o dimenticando gli episodi in cui si è dimostrato indifferente.\n\nGli individui vanno costantemente a caccia di informazioni nell'ambiente per soddisfare due differenti forze motivazionali:\n\nIl mantenimento della stima di sé (Autostima).\n\nIl mantenimento di un senso di coerenza e stabilità (Coerenza).\n\nLe ricerche condotte da Constantin Sedikides hanno dimostrato che, tra le due, la motivazione a mantenere una visione positiva di se stessi (autostima) è sperimentalmente la più forte e pervasiva."},{"title":"Mantenimento della stima di sé: strategie di autoinganno","content":"Sostenere un'immagine personale positiva porta enormi vantaggi in termini di benessere emotivo, salute fisica e adattamento sociale. Vedersi in una luce favorevole – a prescindere dall'obiettività reale delle valutazioni – consente di gestire al meglio le situazioni stressanti e di sviluppare un atteggiamento ottimista nei confronti della vita. Al contrario, valutazioni caute o negative di se stessi si associano spesso a disadattamento, depressione e difficoltà nelle relazioni interpersonali. Inoltre, elevati livelli di autostima sono connessi a una maggiore perseveranza nei compiti difficili, il che aumenta statisticamente la probabilità di raggiungere il successo.\n\nDato che la stragrande maggioranza delle persone sovrastima il proprio valore reale, nell'elaborare le informazioni gli individui si avvalgono di una serie di distorsioni cognitive sistematiche, definite dagli psicologi sociali strategie di autoinganno:\n\nAttribuzioni asimmetriche (Self-serving bias): Tendenza ad associare le proprie vittorie a caratteristiche personali interne (abilità, impegno) e i propri fallimenti a fattori esterni instabili (sfortuna, un esame ingiusto).\n\nAttenzione selettiva ai feedback: Soffermarsi a lungo sui feedback positivi, ignorando, minimizzando o svalutando l'attendibilità delle critiche e dei feedback negativi.\n\nRiflesso sociale (Brillare di luce riflessa): Descritta nella teoria del mantenimento del giudizio di sé di Abraham Tesser, questa strategia permette di sfruttare i risultati conseguiti dalle persone a noi vicine per accrescere la nostra autostima (es. se un nostro amico gioca in una squadra di basket di serie A, il semplice fatto di conoscerlo ci rende orgogliosi e ci fa brillare di luce riflessa). Questa strategia viene impiegata solo se la dimensione in oggetto (il basket, nell'esempio) conta poco nella definizione del nostro Sé personale; se l'ambito fosse centrale anche per noi, scatterebbe una dolorosa gelosia o un confronto sociale frustrante.\n\nConfronto sociale al ribasso (Downward comparison): Tendenza deliberata a confrontarsi con persone che possiedono abilità inferiori o condizioni peggiori delle nostre per sentirsi rassicurati.\n\nDistorsione delle affinità (Opinioni vs Abilità): Le persone distorcono la percezione degli altri in modo differenziato a seconda che si parli di opinioni o di competenze:\n\nRelativamente alle opinioni: Si sovrastima il grado in cui gli altri sono simili a noi (effetto del falso consenso), il che aiuta a confermare l'idea di essere nel giusto.\n\nRelativamente alle abilità: Si sottostimano le affinità tra sé e gli altri (effetto della falsa unicità), sottolineando in modo indiretto l'unicità e l'eccellenza delle competenze possedute.\n\nQuando queste strategie falliscono, intervengono processi di compensazione più strutturati:\n\nTeoria del completamento del Sé (Wicklund e Gollwitzer): Quando un fallimento rischia di minacciare un aspetto centrale dell'identità di una persona, il senso di inferiorità temporaneo viene attivamente compensato attraverso l'acquisizione e l'esibizione di nuovi simboli esterni di competenza in quell'ambito (es. l'acquisto di uno status symbol o l'ostentazione di un titolo).\n\nTeoria dell'autoaffermazione (Sherman e Cohen): Simile alla precedente, evidenzia come le informazioni che mettono a repentaglio l’autostima in un campo specifico possano essere neutralizzate ed energeticamente compensate enfatizzando la propria competenza e il proprio valore in un ambito completamente diverso e non correlato (es. \"Ho fallito il compito di matematica, ma sono un eccellente musicista\")."},{"title":"Mantenimento di un senso di sé coerente","content":"Le persone mostrano una spiccata tendenza a preservare le opinioni circa se stesse e sono estremamente resistenti al cambiamento. Possedere un concetto di sé stabile e coerente è fondamentale sul piano psicologico per poter mantenere una sensazione di controllo sull’ambiente sociale. Sapere di essere fatti in un certo modo ci permette di selezionare le attività lavorative o relazionali più adatte a noi, massimizzando le probabilità di successo."},{"title":"La metafora informatica: Sé fenomenico vs Memoria a lungo termine","content":"Alcune informazioni del Sé diventano disponibili alla coscienza solo in determinate circostanze. Questo limite è funzionale: un carico eccessivo di informazioni in contesti in cui sono inutili comporterebbe un enorme dispendio di energia cognitiva.\n\nPer comprendere questo meccanismo si può utilizzare una metafora informatica:\n\nHard Disk (Memoria a lungo termine): Contiene l'immensa totalità delle informazioni e dei ricordi storici associati a se stessi, anche contraddittori tra loro.\n\nRAM (Sé fenomenico): Rappresenta il Sé in contesto, ovvero quella piccola porzione di informazioni che riaffiora ed è accessibile alla coscienza in una determinata situazione contingente.\n\nSolo il Sé fenomenico (la RAM) ha il compito di essere internamente coerente in un dato momento. La molteplicità di informazioni possedute nell'hard disk permette a un individuo di considerarsi sia introverso che estroverso a seconda del contesto in cui si trova, senza percepire una dolorosa contraddizione interna."},{"title":"La discrepanza attore-osservatore e le ragioni del bias situazionale","content":"L'altro meccanismo che permette all'individuo di mantenere un senso di sé coerente ha a che fare con i processi attribuzionali, in particolare con la tendenza ad attribuire il proprio comportamento a fattori situazionali, mentre gli osservatori esterni spiegano le medesime azioni in termini disposizionali. I motivi di questa asimmetria strutturale sono tre:\n\nLa salienza percettiva: Quando osserviamo il comportamento di un'altra persona, la sua figura risalta vividamente contro lo sfondo, diventando il centro della nostra attenzione (attribuzione interna). Quando siamo noi ad agire, invece, la nostra attenzione visiva è catturata dalle persone, dagli ostacoli e dagli oggetti che ci circondano; di conseguenza, il nostro comportamento passa in secondo piano e viene attribuito un peso maggiore alle pressioni situazionali esterne.\n\nLa quantità di informazioni: Chi compie l'azione possiede una quantità di informazioni storiche su di sé immensamente superiore rispetto a un osservatore esterno. Il soggetto sa benissimo se il suo comportamento attuale è una costante della sua vita o se è un'eccezione dettata da fattori contingenti che stanno condizionando il momento.\n\nFattori linguistici e semantici: Gli studi di Gün Semin e Klaus Fiedler hanno dimostrato che gli individui spiegano i comportamenti personali utilizzando un linguaggio molto concreto e situazionale, mentre descrivono i comportamenti altrui ricorrendo a un registro linguistico decisamente più astratto e disposizionale (tratti di personalità)."},{"title":"Il conflitto tra Autostima e Coerenza: la verifica del Sé","content":"Le persone cercano attivamente conferma delle proprie credenze, anche qualora queste siano fortemente negative. Questo fenomeno è stato isolato dalla teoria della verifica del Sé di William Swann. Si è scoperto sperimentalmente che gli individui aventi una concezione negativa della propria persona preferivano interagire con valutatori che li avevano giudicati in termini negativi, poiché ciò confermava le loro aspettative e manteneva stabile il loro senso di coerenza interna.\n\nLa spinta alla coerenza e quella connessa al mantenimento dell'autostima nella maggior parte dei casi coincidono: dato che la maggior parte delle persone ha una visione di sé positiva, la ricerca di feedback positivi soddisferà simultaneamente entrambi i bisogni.\n\nLa questione si complica quando i soggetti nutrono seri dubbi o concezioni negative riguardo a se stessi. In questo caso si genera un conflitto di motivazioni:\n\nIl bisogno di autostima li spinge ad andare a caccia di stimoli e feedback positivi per migliorare l'immagine di sé.\n\nIl bisogno di coerenza li spinge a ricercare feedback negativi che confermino le concezioni personali stabilizzate, evitando la destabilizzazione cognitiva.\n\nIl bisogno di coerenza (verifica del Sé) prende il sopravvento sull'autostima principalmente in due condizioni:\n\nQuando il soggetto è radicato e profondamente convinto di valere poco in un determinato ambito.\n\nQuando l'individuo interagisce frequentemente con persone intime o significative (es. partner, familiari) dalle quali desidera essere conosciuto e capito per quello che è realmente, senza finzioni.\n\nNegli altri contesti sociali più superficiali o occasionali, anche chi ha una visione negativa di sé metterà da parte la coerenza e cercherà attivamente feedback positivi che consentano di ripristinare e proteggere l'autostima.\n\nEcco la revisione accademica e formale dell'ultima parte del capitolo sul Sé, incentrata sulle strategie interpersonali e sul costrutto dell'Autoefficacia di Albert Bandura. Come per le sezioni precedenti, il testo è stato ripulito dai refusi di dettatura (es. \"Berglass and Jones\" in Berglas e Jones, \"un sé ricco\" in un Sé ideale, \"esperisce\" in sperimenta, \"SEP\" e incongruenze sintattiche), mantenendo un linguaggio scannabile, fluido e rigoroso."},{"title":"Il Sé nelle relazioni interpersonali","content":"L'interazione con l'ambiente sociale non è mai casuale, ma è orientata al raggiungimento di obiettivi specifici, tra i quali spicca la necessità di veicolare una precisa immagine di sé agli altri. Per gestire questa dinamica, le persone ricorrono principalmente a due tipi di condotte: le strategie autolesive e le strategie di autopresentazione."},{"title":"1. Le strategie autolesive (Self-handicapping)","content":"Le strategie autolesive consistono nella deliberata ricerca o costruzione di ostacoli, handicap o scuse prima di una prestazione importante. In questo modo, l'individuo si garantisce in anticipo una giustificazione esterna e plausibile a cui imputare un eventuale fallimento.\n\nTarget e motivazioni: Questa strategia viene messa in atto soprattutto da chi nutre una forte paura di sbagliare o da chi manifesta un'elevata sensibilità psicologica nei confronti degli eventi negativi e delle critiche.\n\nLo studio pionieristico: Edward Berglas e Edward Jones (1978) dimostrarono sperimentalmente questo fenomeno. Nel loro esperimento, ai partecipanti veniva somministrato un test descritto come una prova di intelligenza. Un gruppo di partecipanti riceveva un feedback di successo meritato (avevano risolto problemi facili), mentre un altro gruppo riceveva un feedback di successo del tutto fortuito (i problemi erano insolubili, ma i ricercatori dicevano loro che erano andati benissimo, i cosiddetti \"fortunati\"). Posti di fronte alla scelta tra due farmaci prima di un secondo test – uno che avrebbe migliorato la performance e uno che l'avrebbe peggiorata – la maggior parte dei soggetti del gruppo dei \"fortunati\" scelse il farmaco debilitante. Il motivo risiedeva nella paura di non riuscire a confermare le aspettative elevate e nel bisogno di garantirsi una scusa pronta in caso di fallimento.\n\nLe strategie autolesive agiscono come un sofisticato scudo psicologico che offre un doppio vantaggio:\n\nIn caso di fallimento: La reputazione e l'autostima della persona sono preservate, poiché la colpa viene interamente attribuita all'ostacolo esterno (il farmaco, la stanchezza, la mancanza di sonno) e non alla mancanza di abilità interne. Tuttavia, le ricerche dimostrano che chi trova una buona giustificazione per un fallimento si mostra meno motivato a fare meglio nelle prove successive, proprio perché l'autostima è già al sicuro.\n\nIn caso di successo: Se la performance dovesse andare bene nonostante l'ostacolo, le abilità personali dell'individuo verrebbero amplificate agli occhi degli altri (\"È riuscito a superare l'esame pur non avendo dormito tutta la notte\"), potenziando ulteriormente l'autostima."},{"title":"2. L'autopresentazione (Self-presentation)","content":"L'autopresentazione è la tendenza a esprimersi e a comportarsi in modo da indurre negli altri l'impressione di sé che si desidera suscitare.\n\nIn passato, la psicologia sociale considerava questa condotta come una strategia subdola, manipolatoria e superficiale, volta unicamente a soddisfare il bisogno di approvazione sociale a discapito dell'autenticità dell'individuo. Oggi la prospettiva è mutata: l'autopresentazione viene intesa come una componente normale, pervasiva e intrinseca del comportamento sociale, che può operare sia in modo consapevole e strategico, sia in modo del tutto automatico e inconscio.\n\nSpesso le persone finiscono per credere alla propria stessa messinscena, giudicando il proprio comportamento attuale come uno specchio fedele del Sé genuino, senza rendersi conto che esso riflette, in realtà, un adattamento flessibile volto a plasmare positivamente le impressioni altrui. È frequente, ad esempio, che gli individui modifichino e conformino i propri atteggiamenti personali a quelli espressi da un pubblico ritenuto particolarmente saliente, attraente o autorevole.\n\nLe ragioni fondamentali che spingono le persone a investire energie nell'autopresentazione sono due:\n\nScopo strumentale: Consiste nel voler influenzare gli altri per ottenere ricompense materiali o sociali (es. apparire competenti a un colloquio di lavoro per essere assunti).\n\nRivendicazione dell'identità personale: L'autopresentazione serve a strutturare e consolidare l'identità del soggetto. Ciascuno possiede un'immagine ideale del tipo di persona che vorrebbe essere (Sé ideale); tuttavia, finché tale immagine non viene attivamente riconosciuta e convalidata dal contesto sociale circostante, l'individuo non riuscirà a percepirsi pienamente come tale. In questi casi, l'autopresentazione è guidata da ideali talmente personali che può persino spingere il soggetto a esibire comportamenti contrari a ciò che il pubblico di riferimento approva o gradisce."},{"title":"L'autopresentazione nell'ambiente digitale (Web e Social Media)","content":"Il fenomeno dell'autopresentazione ha trovato un terreno ideale di diffusione all'interno del web. Sulle piattaforme digitali, gli utenti tendono a selezionare accuratamente immagini e contenuti per costruire profili fortemente attraenti, proiettando online un Sé ideale ricco di tutte quelle caratteristiche che hanno sempre desiderato possedere nella vita reale. Le evidenze empiriche mostrano che i soggetti più inclini a esasperare questa forma di autopresentazione artificiale online sono proprio coloro che presentano, nei test psicologici, i più bassi livelli di autostima e di autenticità percepita."},{"title":"L'autoefficacia (Self-efficacy)","content":"Teorizzata da Albert Bandura all'interno della cornice della teoria cognitivo-sociale, l'autoefficacia consiste nel giudizio – riferito a un contesto specifico – relativo alla propria capacità di organizzare ed eseguire una serie di azioni adeguate a raggiungere livelli di prestazione prefissati. In termini semplici, è la convinzione profonda di \"saper fare\" qualcosa con successo.\n\nL'autoefficacia guida le scelte di vita: un soggetto tenderà a cimentarsi attivamente in quegli ambiti in cui sa di possedere abilità consolidate o migliorabili, mentre eviterà sistematicamente tutte quelle attività che percepisce come minacce per il proprio Sé."},{"title":"Caratteristiche fondamentali del costrutto","content":"Natura ontogenetica: L'autoefficacia non è una dote innata o una disposizione della personalità presente a priori. Si tratta di una capacità autoregolativa complessa che si sviluppa nel corso dell'ontogenesi (lo sviluppo biologico e psicologico dell'individuo) attraverso i continui scambi transazionali tra la persona e l'ambiente. Proprio per questo, è un costrutto flessibile, dinamico e modificabile nel tempo se si interviene sugli elementi che lo costituiscono.\n\nSpecificità del contesto: La caratteristica cruciale dell'autoefficacia è la sua specificità situazionale. Possedere un elevato senso di efficacia in un determinato campo (es. nello studio della psicologia o nello sport) non si accompagna automaticamente a un analogo senso di efficacia in un ambito differente (es. nel parlare in pubblico o nelle relazioni sentimentali)."},{"title":"Le quattro fonti dell'autoefficacia","content":"Le convinzioni delle persone circa la propria efficacia personale traggono origine da quattro fonti informative principali, qui disposte in ordine decrescente di impatto:\n\n[1. Esperienza Diretta] ──> Massimo impatto: Successi reali consolidano la fiducia\n\n[2. Esperienza Vicaria] ──> Osservazione di modelli simili (Se ce la fa lui, ce la posso fare io)\n\n[3. Persuasione Verbale] ──> Incoraggiamento esterno che alimenta l'impegno prolungato\n\n[4. Stati Fisiologici]   ──> Interpretazione cognitiva di ansia, stress e fatica corporea"},{"title":"1. L'esperienza diretta di gestione efficace","content":"È in assoluto la fonte più potente e solida. Aver affrontato con successo una prova in passato comporta l'acquisizione di strumenti cognitivi, comportamentali e di autoregolazione idonei a progettare ed eseguire la sequenza di azioni appropriata per gestire circostanze future analoghe. I successi ripetuti costruiscono una fiducia robusta, mentre i fallimenti precoci la indeboliscono (a meno che non vengano attribuiti a uno scarso impegno temporaneo)."},{"title":"2. L'esperienza vicaria fornita dai modelli","content":"Si basa sull'osservazione degli altri. Vedere una persona percepita come simile a sé che raggiunge determinati obiettivi attraverso l'impegno e l'azione incrementa nell'osservatore la fiducia di possedere le capacità necessarie per riuscire in situazioni analoghe (\"Se ce la fa lui/lei, posso farcela anche io\"). Di contro, osservare un modello simile che fallisce miseramente nonostante gli sforzi produce l'effetto opposto, abbassando il senso di efficacia dell'osservatore."},{"title":"3. La persuasione verbale","content":"È il condizionamento esercitato dall'ambiente sociale tramite l'incoraggiamento. Le persone che vengono persuase verbalmente delle loro capacità da figure autorevoli o significative tendono ad attivare un impegno maggiore e più prolungato di fronte alle difficoltà rispetto a coloro che affrontano il compito nutrendo dubbi su di sé. Questa spinta sostiene l'azione il tempo necessario per sperimentare un successo concreto."},{"title":"4. Il controllo delle emozioni e degli stati fisiologici","content":"Nel valutare le proprie capacità, le persone si basano in parte anche sui segnali corporei ed emotivi. Reazioni fisiologiche come l'accelerazione cardiaca, il tremore o la tensione muscolare vengono spesso interpretate erroneamente come segnali premonitori di una cattiva prestazione (ansia debilitante). Nelle prove che richiedono forza o resistenza, la stanchezza e il dolore vengono letti come indicatori di debolezza fisica.\n\nBandura sottolinea che non è l'intensità intrinseca delle reazioni fisiche o emotive a fare la differenza, quanto piuttosto il modo in cui esse vengono percepite e interpretate cognitivamente dal soggetto: chi ha un'alta autoefficacia interpreterà l'attivazione fisiologica (arousal) come una naturale scarica di energia utile per il compito; chi ha una bassa autoefficacia la leggerà come la prova del proprio imminente fallimento."},{"title":"Il ruolo del contesto e l'autoefficacia collettiva","content":"I sentimenti di autoefficacia variano sensibilmente in relazione all'età e alle concrete occasioni che l'ambiente ha offerto al soggetto per mettersi alla prova e trarre motivi di soddisfazione. Un ruolo fondamentale è svolto dalla famiglia nei primi anni di vita, seguita dalle esperienze vissute all'interno dell'ambiente scolastico e nel gruppo dei pari.\n\nUn'estensione cruciale del modello è il costrutto di autoefficacia collettiva: la convinzione condivisa da un gruppo (un team di lavoro, una squadra sportiva, una comunità) di poter realizzare un obiettivo comune attraverso un'azione sinergica.\n\nSecondo Albert Bandura, le barriere psicologiche generate all'interno di un gruppo da un ridotto senso di efficacia collettiva sono decisamente più debilitanti, paralizzanti e demoralizzanti degli ostacoli materiali o economici che il gruppo può incontrare lungo il suo cammino."},{"title":"Gli effetti dell'autoefficacia sui processi psicologici","content":"Possedere elevati livelli di autoefficacia influenza profondamente il funzionamento umano attraverso diverse modalità:\n\nIn ultima analisi, le persone sono in parte il prodotto dell'ambiente in cui vivono, ma la teoria cognitivo-sociale ribadisce una visione profondamente attiva dell'essere umano (human agency): ognuno si fa artefice del proprio destino nel momento stesso in cui, guidato dalle proprie convinzioni di autoefficacia, sceglie deliberatamente il tipo di ambiente, di studi o di sfide ritenuti adatti a coltivare le proprie potenzialità e i propri stili di vita."},{"title":"Capitolo 4 – Gli atteggiamenti sociali","content":"L’atteggiamento è un costrutto teorico comune a buona parte delle scienze sociali.\nAlice Eagly e Shelly Chaiken lo descrivono come una tendenza psicologica che viene espressa valutando una particolare entità con favore o disfavore.\n\nQuindi l’atteggiamento è l’orientamento nei confronti di qualcosa, che sia un comportamento, un evento o un oggetto, secondo l’asse piacere/dispiacere. Attiva la tendenza a esprimersi pro o contro.\n\nLa disposizione nei confronti di un oggetto è determinata da tre diverse tipologie di informazioni collegate tra loro:\n\nconoscenze;\n\naffetti;\n\ncomportamenti.\n\nLe valutazioni riguardanti un certo oggetto possono essere:\n\nrisposte cognitive;\n\nrisposte affettive;\n\nrisposte comportamentali.\n\nLe risposte cognitive si riferiscono a un insieme di conoscenze e opinioni cumulate su un oggetto nel corso del processo di socializzazione e, per lo più, sono dichiarazioni di credenze e pensieri.\n\nLe risposte affettive esprimono sentimenti ed emozioni vissuti in relazione a uno specifico oggetto.\n\nLe risposte comportamentali sono sia le azioni messe in atto in merito all’oggetto sia le dichiarazioni concernenti le intenzioni comportamentali."},{"title":"Prospettiva unidimensionale e bidimensionale degli atteggiamenti","content":"La prospettiva unidimensionale degli atteggiamenti ci dice che le valutazioni positive e negative sono depositate nella memoria ai poli opposti di una singola dimensione e gli individui si situano lungo il continuum a un polo o all’altro oppure in un punto intermedio della dimensione.\n\nDiversamente, la prospettiva bidimensionale degli atteggiamenti propone che la valutazione positiva e negativa siano depositate in memoria lungo due dimensioni indipendenti tra loro.\n\nL’ambivalenza attitudinale si riferisce al fatto che le persone possono avere, nei confronti di un determinato oggetto, atteggiamenti sia favorevoli sia sfavorevoli."},{"title":"L’approccio funzionalista","content":"Secondo l’approccio funzionalista gli atteggiamenti assolvono importanti funzioni psicologiche.\nDaniel Katz individua quattro teorie diverse associate a quattro differenti prospettive psicologiche:\n\nfunzione conoscitiva;\n\nfunzione egodifensiva;\n\nfunzione di espressione dei valori;\n\nfunzione strumentale di adattamento sociale."},{"title":"La funzione conoscitiva","content":"La funzione conoscitiva è una funzione fondamentale svolta da tutti gli atteggiamenti.\n\nAttraverso la funzione conoscitiva gli atteggiamenti guidano l’elaborazione delle informazioni in ingresso e, in un certo senso, organizzano un mondo altrimenti caotico.\n\nCategorizzando l’informazione in ingresso secondo dimensioni valutative prestabilite, gli atteggiamenti permettono agli individui di disporre di schemi di riferimento con cui interpretare e valutare il mondo circostante, garantendo così una pratica di semplificazione e una buona comprensione dell’ambiente sociale complesso."},{"title":"La teoria della dissonanza cognitiva","content":"La teoria della dissonanza cognitiva di Leon Festinger sostiene che le persone tendono a mantenere un equilibrio tra le proprie cognizioni e che, quando riscontrano eventuali discrepanze, sperimentano un’attivazione fisiologica negativa che funge da spinta motivazionale a ridurla e a ripristinare una situazione di equilibrio e coerenza tra gli elementi cognitivi.\n\nLe modalità con cui le persone cercano informazioni coerenti con le proprie cognizioni quando queste non sono ancora disponibili vengono definite:\n\nesposizione selettiva;\n\nattenzione selettiva.\n\nIl classico esempio che produce dissonanza è quello del fumatore che continua a fumare nonostante sappia che fa male.\n\nNei casi in cui non si riesca a eliminare un’informazione discrepante, l’individuo sarà portato perfino ad alterare le informazioni in ingresso al fine di renderle il più possibile coerenti con il contenuto dell’atteggiamento che possiede."},{"title":"Schemi sociali e memoria","content":"La funzione di conoscenza degli atteggiamenti potrebbe essere vista come un’attività di tipo schematico. Ricerche in proposito hanno evidenziato che gli schemi sociali guidano la modifica degli stimoli e il recupero delle informazioni immagazzinate in memoria.\n\nI soggetti infatti reagiscono più rapidamente alle informazioni coerenti con gli schemi e inoltre codificano e ricordano meglio questo tipo di informazioni.\n\nQuanto alla codifica delle informazioni, cioè ai processi percettivi e di valutazione di informazioni rilevanti per l’atteggiamento, la ricerca di John Cacioppo, Richard Petty e Sidera è anch’essa una conferma di tale ipotesi.\n\nGli autori hanno ipotizzato che, se un messaggio attivava schemi rilevanti per un soggetto, questo avrebbe aumentato la capacità di scorgere elementi a sostegno della comunicazione persuasiva.\n\nRiguardo l’influenza degli atteggiamenti sul recupero dell’informazione pertinente, i ricercatori presentano ai soggetti informazioni coerenti e non coerenti con l’atteggiamento iniziale e, dopo qualche tempo, li sollecitano a ricordare i dati contenuti nei messaggi.\n\nI risultati di tante ricerche sono incoerenti:\n\nda un lato si è dimostrata l’ipotesi secondo cui gli atteggiamenti guidano il recupero dell’informazione;\n\naltri studi però non sono riusciti a darne conferme inequivocabili.\n\nCharles Judd e Kulik pongon
