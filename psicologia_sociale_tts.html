 non può essere aiutata concretamente, o se il costo del soccorso è sproporzionato, l'individuo devia verso una strategia psicologica difensiva per salvaguardare la credenza nel mondo giusto: tende ad accusare, biasimare e colpevolizzare la vittima, convincendosi che la sfortuna sia meritata o l'esito di una sua colpa personale. Questo processo spiega perché le vittime di aggressioni, stupri o rapine vengano talvolta ingiustamente criticate per il loro abbigliamento o per essersi trovate nel \"posto sbagliato\"."},{"title":"4. La Norma della Responsabilità Sociale","content":"La norma della responsabilità sociale impone alle persone il dovere morale di aiutare qualcuno che dipende da noi e che non è in grado, in quel momento, di provvedere a sé stesso. Più è forte la percezione che l'altro si trovi in difficoltà e dipenda da noi (es. per via della diffusione di responsabilità assente nel contesto), più elevato sarà il livello di responsabilità personale e sociale che si attiverà nel testimone."},{"title":"Il limite della norma: L'Attribuzione di Responsabilità Causale","content":"Questa norma incontra un limite ferreo nel modo in cui il testimone interpreta la causa del bisogno. L'attivazione del soccorso dipende dall'attribuzione di colpa o di responsabilità personale circa la condizione in cui si trova la persona in difficoltà:\n\nAttribuzione a cause Interne e Controllabili (Colpa della vittima): Se si ritiene che il bisogno sia causato da negligenza, pigrizia o scelte deliberate del soggetto, si attiva un sentimento di biasimo, rabbia, disgusto o disistima che determina una negazione del soccorso.\n\nAttribuzione a cause Esterne e Incontrollabili (Sfortuna/Fatalità): Se la difficoltà è l'esito di una disgrazia o di una fatalità non controllabile dal soggetto, si attivano emozioni di commiserazione, partecipazione e tristezza che motivano e spingono a soccorrere la persona.\n\nEvidenze empiriche sulla salute (Weiner, Perry e Magnusson, 1988): Le persone si mostrano significativamente meno comprensive e meno inclini ad aiutare coloro che contraggono l'AIDS attraverso comportamenti giudicati sotto il proprio controllo consapevole (es. rapporti sessuali occasionali e non protetti), rispetto a individui che hanno contratto la medesima patologia a causa di fattori esterni e incontrollabili (es. una trasfusione di sangue ospedaliera). Allo stesso modo, i programmi di assistenza economica riscuotono meno successo popolare se i destinatari (\"i poveri\") vengono percepiti come responsabili della loro situazione di indigenza."},{"title":"3.2.1 Norme Sociali che Inibiscono l'Altruismo","content":"Accanto ai criteri che favoriscono l'altruismo, vi sono norme sociali che possono frenarlo o inibirlo a seconda del contesto relazionale:\n\nLa norma di autosufficienza: Prescrive che le persone hanno il dovere morale di badare a sé stesse. Chi si trova in difficoltà a causa della propria condotta negligente o pigra merita di rimanere nella propria condizione senza ricevere aiuto.\n\nLa norma della privacy familiare: Impone di evitare di intromettersi nelle questioni private altrui e di astenersi dal fornire aiuti non richiesti."},{"title":"L'Esperimento sul litigio di strada (Shotland e Straw, 1976)","content":"Due complici (un uomo e una donna) simulavano un violento litigio stradale in cui l'uomo inscenava l'intenzione di picchiare la donna. Venivano manipolate le grida d'aiuto della vittima:\n\nCondizione di estraneità: La donna urlava: «Vattene, non ti conosco». In questo caso, il 65% dei passanti interveniva in suo soccorso.\n\nCondizione di familiarità: La donna urlava: «Non so perché ti ho sposato». In questa situazione, la percentuale di intervento crollava al 19%, poiché i testimoni presupponevano un vincolo familiare e ritenevano normativamente corretto non intromettersi.\n\nQuesti dati evidenziano le profonde contraddizioni della società contemporanea: da un lato si promuove la solidarietà come valore, dall'altro si incita all'autosufficienza fin dall'infanzia; da un lato si segnala il dovere di aiutare i bisognosi, dall'altro si esorta a non interferire negli affari altrui."},{"title":"3.3 Emozioni e Altruismo","content":"Il comportamento prosociale è ampiamente influenzato da ciò che le persone provano emotivamente di fronte a un individuo in stato di bisogno. Si possono sperimentare diverse tipologie di emozioni:\n\nTurbamento e angoscia: Stati di forte disagio ed ansia provocati dall'attivazione improvvisa di fronte a una persona gravemente ferita o danneggiata.\n\nDisagio psicologico: Deriva dalla sensazione di ingiustizia nel vedere qualcuno soffrire ingiustamente.\n\nCompassione e tenerezza: Risposte tese alla cura, alla sentita partecipazione e al sostegno di una specifica persona."},{"title":"Determinanti dello Stato Emotivo: Natura e Interpretazione","content":"L'emozione specifica vissuta dal testimone è determinata da due fattori principali:\n\nLa natura dell'evento: L'intensità e la criticità immediata della situazione condizionano il livello di attivazione fisiologica iniziale.\n\nL'interpretazione cognitiva (Modello di Weiner, 1992): Le persone si interrogano sul perché il target si trovi in quella condizione, formulando attribuzioni causali:\n\nCause non controllabili (es. sfortuna, destino) $\\rightarrow$ Generano simpatia e comprensione, predisponendo all'aiuto.\n\nCause controllabili (es. mancanza di impegno) $\\rightarrow$ Generano rabbia e biasimo, inibendo il soccorso.\n\nIl principio guida: Le attribuzioni guidano i nostri sentimenti, ma le reazioni emotive costituiscono il vero motore e la direzione del comportamento."},{"title":"1. Il Senso di Colpa e l'Ipotesi della Riparazione dell'Immagine","content":"Il senso di colpa è un'emozione spiacevole che insorge quando le persone avvertono di aver violato un proprio standard morale, minacciando la propria autostima. Questo vissuto attiva l'ipotesi della riparazione dell'immagine: il soggetto è motivato a mettere in atto un comportamento sociale positivo (l'atto altruistico) come strategia per espiare la colpa, risanare l'autostima e apparire nuovamente come una persona corretta.\n\nL'impulso a fare del bene per cancellare il senso di colpa si manifesta anche verso terzi che non c'entrano nulla con l'azione negativa originaria, confermando che l'aiuto è volto alla salvaguardia del proprio Sé."},{"title":"3.3.1 Il Modello del Sollievo dallo Stato d'Animo Negativo (Cialdini)","content":"Robert Cialdini e colleghi [1973; 1982] hanno formulato una prospettiva puramente egoistica o autocentrata dell'altruismo, basata sul presupposto che le persone aiutino gli altri unicamente per ridurre le proprie sensazioni negative e migliorare il proprio tono dell'umore."},{"title":"I Tre Assunti Fondamentali del Modello","content":"Lo stato d'animo negativo può derivare da diverse fonti: da un'esperienza personale negativa (un fallimento, l'essere lasciati dal partner) o dalla semplice osservazione di una situazione sfortunata subita da un'altra persona (che provoca senso di colpa o tristezza).\n\nAttraverso il processo di socializzazione, gli individui apprendono che il comportamento prosociale funge da rinforzo secondario: prestare aiuto e soccorso è un comportamento strumentale idoneo a far sentire bene e a sollevare l'umore.\n\nIl dare aiuto è solo uno dei modi possibili per ripristinare il tono dell'umore. Se il soggetto intravede la possibilità di sollevarsi dal proprio stato d'animo negativo attraverso altre vie prima che gli si presenti l'opportunità di aiutare, la sua motivazione a prestare soccorso svanirà."},{"title":"La Verifica Sperimentale (Cialdini, Darby e Vincent, 1973)","content":"Un gruppo di studenti veniva indotto in uno stato d'animo negativo facendo loro credere di aver causato accidentalmente il rovesciamento di scatole piene di fogli e tesi di laurea di uno studente (un complice). Successivamente, i partecipanti venivano divisi in tre condizioni sperimentali prima di ricevere una richiesta d'aiuto (effettuare interviste telefoniche):\n\nCondizione di Controllo (Stato Negativo persistente): I soggetti rimanevano nella stanza senza subire altre manipolazioni. Di fronte alla richiesta, si mostravano molto collaborativi accettando di fare le telefonate pur di risollevare il proprio umore negativo.\n\nCondizione di Sollievo Sostitutivo (Premio in denaro): I soggetti ricevevano inaspettatamente una somma in denaro come ricompensa per un compito precedente. Il denaro era sufficiente a risollevare il loro umore; di conseguenza, di fronte alla successiva richiesta d'aiuto, non erano più motivati a collaborare e offrivano un livello di aiuto basso, pari ai soggetti con umore neutro.\n\nCondizione di Sollievo Sociale (Elogio): I soggetti ricevevano una lode esplicita per la qualità del loro operato, che ne risollevava l'umore. Anche in questo caso, la propensione a fare le telefonate calava vistosamente.\n\nQuesto esperimento dimostra la natura utilitaristica del modello: l'urgenza principale dell'individuo resta il miglioramento della propria situazione emotiva interna, interpretando l'aiuto al prossimo non come un fine sincero, ma come un mero strumento edonistico."},{"title":"3.3.1 Il Modello del Sollievo dallo Stato d'Animo Negativo (Conclusioni)","content":"Un secondo assunto centrale del modello di Cialdini evidenzia che il semplice prevedere che il proprio umore negativo sarà risollevato in altro modo è sufficiente per frenare la motivazione ad aiutare.\n\nEvidenze empiriche: Schaller e Cialdini [1988] hanno riscontrato che le persone che si sentivano tristi aiutavano meno se venivano semplicemente informate che avrebbero visto un film allegro e divertente, rispetto a quando venivano messe al corrente che avrebbero visionato una pellicola deprimente.\n\nInfine, il terzo assunto stabilisce che le persone con un umore negativo saranno motivate ad agire solo se hanno la profonda convinzione che il prestare soccorso migliorerà sostanzialmente il loro stato emotivo. Questo modello rimane un'ipotesi valida per spiegare i comportamenti d'aiuto spontanei o in risposta a richieste dirette quando le persone provano senso di colpa o tristezza."},{"title":"3.3.2 Il Modello Attivazione Costi-Benefici (Piliavin)","content":"Questo approccio teorico postula che l'attivazione fisiologica motivi il testimone di un evento ad agire, mentre l'analisi in termini di costi e benefici orienti l'effettiva direzione dell'azione."},{"title":"L'Attivazione Empatica e la Risposta Emotiva","content":"Si ipotizza che l'attivazione empatica sia generata dall'essere testimoni della sofferenza di un'altra persona. Quando tale attivazione viene attribuita proprio al disagio altrui, il testimone sperimenta un'emozione fastidiosa e spiacevole che sarà portato a ridurre. Anche se lo spettatore non prova l'esatta emozione di chi è nel bisogno, si sente ugualmente preoccupato e scombussolato. Un modo efficace per allentare questa tensione interna consiste nell'aiutare a ridurre la sofferenza del target.\n\nEvidenze biologiche: Sia gli adulti sia i bambini avvertono un'attivazione fisiologica alla vista del dolore altrui. Persino i neonati di 1 o 2 anni rispondono con il pianto al dolore di un altro bambino.\n\nVerifica neurofisiologica: In uno studio di Vaughan e Lanzetta [1980], i partecipanti osservavano una persona che mostrava sul volto un forte dolore a causa di ripetute scosse elettriche. I soggetti reagivano manifestando un'attivazione fisiologica speculare (riflettendo la sofferenza altrui) ed esibendo espressioni facciali simili a quelle di colui che riceveva le scosse.\n\nLa misurazione cardiaca: Gaertner e Dovidio [2000] hanno misurato i battiti cardiaci dei testimoni in una situazione di emergenza, confermando che le persone che registravano un'attivazione cardiaca maggiore al momento dell'allarme erano quelle più disponibili e rapide ad aiutare."},{"title":"Il Paradigma dell'Attribuzione Errata","content":"L'importanza dell'attribuzione della propria attivazione empatica alla sofferenza altrui è dimostrata dal «paradigma dell'attribuzione errata». Se lo spettatore crede che la propria attivazione sia dovuta a una causa diversa dal problema della vittima, l'attivazione non motiverà l'intervento, poiché il dare aiuto non sarebbe percepito come il rimedio idoneo a ridurre il malessere.\n\nL'Esperimento della pillola placebo (Gaertner e Dovidio, 1977): I partecipanti dovevano intercettare messaggi extrasensoriali e venivano informati che lo studio avrebbe esaminato gli effetti di una pillola (in realtà un placebo).\n\nAl primo gruppo venne detto che la pillola avrebbe generato uno stato di attivazione fisiologica.\n\nAl secondo gruppo venne detto che la pillola avrebbe causato effetti non di attivazione.\n\nSuccessivamente, entrambi i gruppi udivano un rumore che segnalava un'emergenza occorsa a un altro partecipante (un complice). I risultati confermarono il modello: le persone che potevano attribuire erroneamente la propria attivazione agli effetti della pillola aiutavano di meno (55%) rispetto a coloro che non avevano questa giustificazione e riconoscevano nell'evento la causa del proprio malessere (85%)."},{"title":"L'Interazione con i Costi e i Benefici","content":"Il modello attivazione costi-benefici prevede che l'attivazione condizioni il modo in care le persone valutano la situazione:\n\nL'aumento dell'attivazione circoscrive il focus dell'attenzione del soggetto verso gli aspetti cruciali della situazione di emergenza, allontanandola da elementi meno importanti.\n\nPoiché la vittima attira l'attenzione, se l'attivazione e i potenziali danni associati a un eventuale intervento sono superiori alla valutazione dello spettatore, i costi connessi a un intervento diretto possono spingere i soggetti ad agire impulsivamente senza considerare i rischi. Ciò si verifica soprattutto nelle situazioni di estremo pericolo o se la salienza dell'evento è altissima (Piliavin et al., 1981)."},{"title":"3.3.3 Differenze Cruciali tra i Due Modelli Egoistici","content":"Sia il modello del sollievo dallo stato d'animo negativo sia il modello attivazione costi-benefici considerano la motivazione all'aiuto come puramente egoistica, ma presentano due differenze sostanziali:\n\nIl ruolo dell'attivazione: Nel modello attivazione costi-benefici, l'attivazione è generata esclusivamente dalla vista della sofferenza altrui e la risposta d'aiuto è finalizzata ad alleviare la tensione provocata da quella specifica vista. Nel modello del sollievo, lo stato d'animo negativo può derivare da qualsiasi fonte (anche un'esperienza personale precedente).\n\nLe alternative di rimozione: Nel modello attivazione costi-benefici, la causa del disagio va eliminata (aiutando) o rimossa concretamente fuggendo dalla vista della sofferenza. Nel modello del sollievo, prestare soccorso è solo uno stratagemma edonistico: l'individuo può ripristinare l'umore positivo attraverso qualsiasi altra attività gratificante (es. ascoltare buona musica, ricevere denaro), che renderà l'aiuto non più necessario."},{"title":"3.3.4 L'Ipotesi Empatia-Altruismo (Daniel Batson)","content":"Daniel Batson [1987; 1991] è il principale esponente della corrente che ammette la possibilità di una genuina motivazione altruistica, il cui unico scopo è alleviare la sofferenza altrui.\n\nSecondo Batson [1991], assistere alla sofferenza di un individuo può elicitare nel testimone due risposte emotive distinte, che indirizzano a motivazioni differenti:\n\nIl dispiacere egoistico (personal distress): Include stati di turbamento o allarme e genera un desiderio egoistico volto a ridurre il proprio stress personale.\n\nL'empatia (empathic concern): Ha luogo quando percepiamo di condividere il dolore e la sofferenza dell'altro, immedesimandoci nella sua situazione. Suscita un desiderio genuinamente altruistico volto ad alleviare il disagio del prossimo.\n\n  [SOFFERENZA ALTRUI] ──► Dispiacere Egoistico ──► Motivazione Egoistica ──► Ridurre il PROPRIO stress\n\n                      ──► Empatia              ──► Motivazione Altruistica ──► Ridurre il DISAGIO ALTRUI"},{"title":"La Validazione Sperimentale del Modello","content":"Batson e colleghi [1988] hanno confrontato l'ipotesi empatia-altruismo con le spiegazioni egoistiche (riduzione dell'attivazione e l'evitamento della punizione sociale) creando una serie di compiti sperimentali ingegnosi.\n\nIl ragionamento di Batson è lineare: per escludere che un comportamento sia dettato dall'egoismo, è necessario creare una situazione sperimentale in cui le prospettive delineate dai modelli egoistici possano essere soddisfatte senza prestare aiuto. Se il soggetto sceglie comunque di aiutare, l'azione deve essere dettata dall'altruismo.\n\nIl confronto con il modello dei costi-benefici: Posti di fronte alla sofferenza di una vittima, ai partecipanti veniva offerta la possibilità di abbandonare facilmente il laboratorio anziché assistere all'evento (via di fuga).\n\nSe la motivazione fosse egoistica (legata solo al proprio disagio visivo), i soggetti sceglierebbero la fuga per non soffrire.\n\nI dati hanno dimostrato che i soggetti in cui l'attivazione empatica era elevata continuavano ad aiutare la vittima, rifiutando la comoda opzione di abbandonare il luogo e confermando l'esistenza di un altruismo autentico."},{"title":"3.3.5 La Validazione del Modello di Batson: Il Disegno Sperimentale $2 \\times 2$","content":"Come anticipato nelle pagine precedenti, per dimostrare l'esistenza di una motivazione autenticamente altruistica (mossa da pura empatia) rispetto a una egoistica (volta a ridurre il proprio fastidio visivo), Daniel Batson ha ideato un classico paradigma sperimentale."},{"title":"La Procedura Sperimentale di Base","content":"Il paradigma: I partecipanti osservano un collaboratore dello sperimentatore (un complice) ricevere delle dolorose scorse elettriche. A un certo punto, il complice dichiara di giudicare intollerabile il dolore. Viene quindi offerta ai partecipanti la possibilità di aiutare la vittima, accettando di sostituirsi a essa e ricevere le scosse al suo posto.\n\nVariabile 1: La Facilità di Fuga.\n\nFuga Facile: I soggetti vengono informati che, se decidono di non collaborare, non osserveranno più la vittima ricevere le scosse (vengono congedati dal laboratorio).\n\nFuga Difficile: I soggetti vengono informati che, se non collaboreranno, dovranno continuare a osservare la vittima per tutto il resto dell'esperimento.\n\nVariabile 2: Il Livello di Empatia. Viene manipolato somministrando un finto questionario di personalità. A metà dei soggetti viene detto di essere estremamente simili alla vittima (condizione che elicita un'elevata empatia intuitiva), mentre all'altra metà viene comunicato di avere profonde differenze di personalità.\n\nIl disegno sperimentale incrociato $2 \\times 2$ produce due previsioni radicalmente diverse a seconda dei modelli teorici (mostrate sinteticamente nella Tabella 11.1):\n\nCon Basso Livello di Empatia: Sia il modello egoistico (sollievo/attivazione) sia quello altruistico prevedono la stessa condotta. I partecipanti scelgono l'altruismo (sostituirsi alla vittima) quasi solo nella condizione di fuga difficile, poiché costretti a guardare la sofferenza; nella fuga facile scelgono in massa l'evitamento per rimuovere il proprio stress.\n\nCon Alto Livello di Empatia: Qui si consuma il divario teorico. Il modello dell'attivazione costi-benefici prevede che la motivazione cali nella fuga facile. Al contrario, l'ipotesi empatia-altruismo postula che i soggetti con alta empatia aiuteranno e accetteranno di sostituirsi alla vittima anche quando la fuga risulta estremamente facile.\n\nIl Verdetto Empirico: La maggior parte degli esperimenti condotti da Batson ha confermato l'ipotesi empatia-altruismo. Anche avendo la comoda opportunità di allontanarsi dalla scena e rimuovere il proprio disagio, i soggetti ad alta empatia accettano il sacrificio pur di porre fine al dolore altrui."},{"title":"Il Confronto con il Modello dell'Evitamento della Punizione (Empathy-Specific Punishment)","content":"Batson ha testato il suo modello contro un'ulteriore alternativa egoistica di matrice comportamentale: la teoria della punizione specifica dell'empatia. Secondo questa prospettiva, le persone hanno appreso durante la socializzazione che quando provano empatia verso qualcuno in difficoltà sorge un dovere morale d'aiuto; non farlo comporterebbe una punizione sociale o un conseguente senso di colpa e vergogna di fronte a sé stessi. Chi aiuta, dunque, lo farebbe solo per evitare questo malessere interiore.\n\nLa contromandipolazione della Giustificazione: Per scardinare questa ipotesi, la procedura sperimentale viene modificata offrendo ai partecipanti una valida giustificazione per il rifiuto d'aiuto (mostrata nella Tabella 11.2). Veniva fatto credere ai soggetti che quasi nessuno in passato avesse accettato di aiutare, offrendo così una scusa sociale (\"lo fanno tutti\") idonea ad azzerare il rischio di vergogna o punizione interna.\n\nI Risultati: Anche in presenza di un'ampia e comoda giustificazione per l'abbandono della situazione, i soggetti in condizione di elevata empatia continuavano ad accettare la sostituzione con la vittima, confermando che il movente profondo è l'alleviamento della sofferenza altrui e non la fuga dalla censura sociale o personale."},{"title":"3.4 Correlati Neuroscientifici e Specificità Cerebrali","content":"Negli ultimi anni, la ricerca contemporanea si è posta l'obiettivo di mappare le differenze strutturali nel cervello umano per distinguere le azioni altruistiche pure (ispirate dall'empatia) da quelle mosse da un sentimento egoistico di reciprocità (Hein, Morishima, Leiberg, Sul e Fehr, 2016)."},{"title":"Le Aree Cerebrali Coinvolte","content":"Attraverso studi di risonanza magnetica funzionale (fMRI) e l'analisi dei modelli dinamici causali di connettività (DCM), i ricercatori della facoltà di Zurigo hanno dimostrato che in presenza di scenari prosociali e cooperativi si attivano stabilmente tre aree cerebrali cardine:\n\nLa corteccia cingolata anteriore (ACC)\n\nL'insula anteriore (AI)\n\nLo striato ventrale (VS)"},{"title":"La Direzione dei Flussi di Informazione","content":"La vera scoperta risiede nel fatto che le differenze non emergono dall'attivazione isolata delle aree (che si accendono in entrambi i casi), bensì dal modo in cui queste aree interagiscono e si connettono tra loro (la direzione del flusso di informazioni):\n\n  [MOTIVAZIONE EMPATICA (Altruismo Puro)]  ──► Flusso: Striato Ventrale (VS) ──► Corteccia Cingolata Anteriore (ACC)\n\n  [MOTIVAZIONE ALLA RECIPROCITÀ (Egoismo)] ──► Flusso: Corteccia Cingolata Anteriore (ACC) ──► Insula Anteriore (AI)\n\nNell'azione altruistica basata sull'empatia: Il flusso di informazioni viaggia prevalentemente dallo striato ventrale (VS) alla corteccia cingolata anteriore (ACC).\n\nNell'azione basata sulla reciprocità di scambio: Il flusso si muove in senso inverso, dall'ACC all'insula anteriore (AI).\n\nInoltre, indagini filogenetiche suggeriscono che l'altruismo su base empatica sia biologicamente più antico e comune rispetto ai più complessi e recenti meccanismi cognitivi legati alla reciprocità sociale. Stimolare i sentimenti di reciprocità o di empatia permette di incrementare l'atteggiamento altruistico di un gruppo, agendo su reti cerebrali distinte ma interconnesse."},{"title":"Conclusioni del Capitolo 11","content":"In ultima analisi, sebbene la storia della psicologia sociale sia stata a lungo dominata dai principi dell'egoismo e dell'edonismo (considerando l'aiuto come un mero strumento per stare bene o evitare sanzioni), le rigorose dimostrazioni sperimentali di Batson e le moderne scoperte neuroscientifiche offrono una concreta dimostrazione contraria. Quando i ricercatori escludono i motivi ambigui, il caso dell'esistenza di un comportamento d'aiuto veramente e autenticamente altruistico non può essere considerato chiuso. L'altruismo puro fa intrinsecamente parte della natura umana."}];

let currentSection = 0;
let isPlaying = false;
let isPaused = false;
let autoNext = true;
let rate = 0.95;
let pitch = 1.0;
let volume = 1.0;
let selectedVoice = null;
let synth = window.speechSynthesis;
let utterance = null;
let voices = [];
let filteredIndices = SECTIONS.map((_, i) => i);

if (!synth) {
  document.getElementById('text-display').innerHTML = '<div class="no-support">⚠️ Il tuo browser non supporta la sintesi vocale (Web Speech API).<br>Prova Chrome, Edge o Safari.</div>';
}

function loadVoices() {
  voices = synth.getVoices();
  const sel = document.getElementById('voice-select');
  const itVoices = voices.filter(v => v.lang.startsWith('it'));
  const allVoices = [...itVoices, ...voices.filter(v => !v.lang.startsWith('it'))];
  sel.innerHTML = allVoices.map((v, i) =>
    `<option value="${voices.indexOf(v)}">${v.name} (${v.lang})</option>`
  ).join('');
  // Default: first Italian voice
  if (itVoices.length > 0) {
    selectedVoice = itVoices[0];
    const idx = voices.indexOf(itVoices[0]);
    sel.value = idx;
  }
}

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}
setTimeout(loadVoices, 500);

function changeVoice(idx) {
  selectedVoice = voices[parseInt(idx)];
  if (isPlaying) { stopReading(); startReading(); }
}

function renderSectionList() {
  const list = document.getElementById('section-list');
  list.innerHTML = filteredIndices.map(i => {
    const s = SECTIONS[i];
    return `<div class="section-item${i === currentSection ? ' active' : ''}" onclick="goToSection(${i})">
      <span class="section-num">${i+1}</span>${s.title}
    </div>`;
  }).join('');
  document.getElementById('sec-count').textContent = filteredIndices.length;
}

function filterSections(query) {
  const q = query.toLowerCase().trim();
  if (!q) {
    filteredIndices = SECTIONS.map((_, i) => i);
  } else {
    filteredIndices = SECTIONS.map((s, i) => ({ s, i }))
      .filter(({ s }) => s.title.toLowerCase().includes(q) || s.content.toLowerCase().includes(q))
      .map(({ i }) => i);
  }
  renderSectionList();
}

function showSection(idx) {
  currentSection = idx;
  const s = SECTIONS[idx];
  document.getElementById('section-title').textContent = s.title;
  
  const paragraphs = s.content.split('\n').filter(p => p.trim());
  document.getElementById('text-content').innerHTML = paragraphs
    .map((p, pi) => `<p class="text-paragraph" id="para-${pi}">${p}</p>`)
    .join('');
  
  document.getElementById('text-display').scrollTop = 0;
  updateProgress();
  renderSectionList();
  
  const activeEl = document.querySelector('.section-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goToSection(idx) {
  const wasPlaying = isPlaying;
  if (synth) synth.cancel();
  isPlaying = false; isPaused = false;
  showSection(idx);
  if (wasPlaying) startReading();
}

function buildTextForSection(idx) {
  const s = SECTIONS[idx];
  return s.title + '. ' + s.content;
}

function startReading() {
  if (!synth) return;
  const text = buildTextForSection(currentSection);
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = rate;
  utterance.pitch = pitch;
  utterance.volume = volume;
  utterance.lang = 'it-IT';
  if (selectedVoice) utterance.voice = selectedVoice;
  
  const paragraphs = SECTIONS[currentSection].content.split('\n').filter(p => p.trim());
  
  utterance.onboundary = function(event) {
    if (event.name === 'sentence') {
      const charIdx = event.charIndex;
      let cumLen = SECTIONS[currentSection].title.length + 2;
      for (let pi = 0; pi < paragraphs.length; pi++) {
        const pLen = paragraphs[pi].length + 1;
        if (charIdx < cumLen + pLen) {
          document.querySelectorAll('.text-paragraph').forEach((el, i) => {
            el.classList.toggle('highlight', i === pi);
          });
          const el = document.getElementById('para-' + pi);
          if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          break;
        }
        cumLen += pLen;
      }
    }
  };
  
  utterance.onend = function() {
    if (autoNext && currentSection < SECTIONS.length - 1) {
      currentSection++;
      showSection(currentSection);
      startReading();
    } else {
      isPlaying = false; isPaused = false;
      updateUI();
      document.querySelectorAll('.text-paragraph').forEach(el => el.classList.remove('highlight'));
    }
  };
  
  utterance.onerror = function(e) {
    if (e.error !== 'canceled') {
      isPlaying = false; isPaused = false; updateUI();
    }
  };
  
  synth.speak(utterance);
  isPlaying = true; isPaused = false;
  updateUI();
}

function togglePlay() {
  if (!synth) return;
  if (isPlaying && !isPaused) {
    synth.pause();
    isPaused = true; isPlaying = false;
    updateUI();
  } else if (isPaused) {
    synth.resume();
    isPaused = false; isPlaying = true;
    updateUI();
  } else {
    if (SECTIONS[currentSection] === undefined) showSection(0);
    startReading();
  }
}

function stopReading() {
  if (synth) synth.cancel();
  isPlaying = false; isPaused = false;
  document.querySelectorAll('.text-paragraph').forEach(el => el.classList.remove('highlight'));
  updateUI();
}

function prevSection() {
  if (currentSection > 0) {
    const wasPlaying = isPlaying || isPaused;
    stopReading();
    showSection(currentSection - 1);
    if (wasPlaying) startReading();
  }
}

function nextSection() {
  if (currentSection < SECTIONS.length - 1) {
    const wasPlaying = isPlaying || isPaused;
    stopReading();
    showSection(currentSection + 1);
    if (wasPlaying) startReading();
  }
}

function toggleAutoNext() {
  autoNext = !autoNext;
  document.getElementById('btn-auto').classList.toggle('active', autoNext);
}

function updateRate(v) {
  rate = parseFloat(v);
  document.getElementById('rate-val').textContent = rate.toFixed(2) + '×';
  if (utterance) utterance.rate = rate;
}

function updatePitch(v) {
  pitch = parseFloat(v);
  document.getElementById('pitch-val').textContent = parseFloat(v).toFixed(2);
  if (utterance) utterance.pitch = pitch;
}

function updateVol(v) {
  volume = parseFloat(v);
  document.getElementById('vol-val').textContent = Math.round(v * 100) + '%';
  if (utterance) utterance.volume = volume;
}

function seekProgress(event) {
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const ratio = (event.clientX - rect.left) / rect.width;
  const targetIdx = Math.floor(ratio * SECTIONS.length);
  const wasPlaying = isPlaying;
  stopReading();
  showSection(Math.max(0, Math.min(SECTIONS.length - 1, targetIdx)));
  if (wasPlaying) startReading();
}

function updateProgress() {
  const pct = ((currentSection + 1) / SECTIONS.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (currentSection + 1) + ' / ' + SECTIONS.length;
}

function updateUI() {
  const btn = document.getElementById('btn-play');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  
  if (isPlaying) {
    btn.textContent = '⏸';
    dot.className = 'status-dot playing';
    txt.textContent = 'In riproduzione';
  } else if (isPaused) {
    btn.textContent = '▶';
    dot.className = 'status-dot paused';
    txt.textContent = 'In pausa';
  } else {
    btn.textContent = '▶';
    dot.className = 'status-dot';
    txt.textContent = 'Pronto';
  }
  
  document.getElementById('btn-auto').classList.toggle('active', autoNext);
}

// Init
showSection(0);
renderSectionList();
updateUI();
document.getElementById('btn-auto').classList.add('active');
</script>
</body>
</html>
