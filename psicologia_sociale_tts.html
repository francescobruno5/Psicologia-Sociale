ti ha obbedito). Questo dato è risultato quasi identico a una replica condotta ad Amsterdam (76%), dimostrando che l'esecuzione di ordini distruttivi è un processo trasversale alle diverse culture."},{"title":"Condizioni che aumentano la disobbedienza","content":"Lo studio di Palermo ha confermato che la disobbedienza aumenta in modo statisticamente significativo quando:\n\nAltri partecipanti si ribellano (presenza di complici disubbidienti).\n\nI costi morali dell'obbedienza crescono (consapevolezza di compiere un'azione ingiusta per l'incolumità altrui).\n\nI soggetti mostrano una ridotta aggressività verso il prossimo e una chiara comprensione delle proprie responsabilità morali."},{"title":"3. Influenza Sociale Minoritaria (Moscovici)","content":"Mentre la tradizione di Asch si è concentrata su come la maggioranza influenzi la minoranza, la ricerca europea guidata da Serge Moscovici ha ribaltato la prospettiva, studiando l'innovazione minoritaria. I cambiamenti nell'opinione pubblica sono quasi sempre originati dalla spinta intellettuale di un ristretto numero di persone capace di modificare gli orientamenti dei più (es. Copernico o Galileo).\n\nPer comprendere questo fenomeno, Moscovici contrappone due modelli teorici:"},{"title":"3.1 Condizioni di Efficacia della Minoranza","content":"Perché una minoranza riesca a esercitare influenza su una maggioranza, deve adottare precise strategie comunicative e relazionali:"},{"title":"1. Lo Stile di Comportamento: La Coerenza","content":"L'arma migliore di una minoranza è la coerenza, intesa in due direzioni distinte:\n\nCoerenza Diacronica: la tenacia, la compattezza e la ripetizione coerente di una stessa risposta nel corso del tempo.\n\nCoerenza Sincronica: l'accordo stabile, l'unanimità e la compattezza tra i diversi membri all'interno del gruppo minoritario.\n\nSintesi dell'esperimento di Moscovici, Lage e Naffrechoux [1969]: In un compito di percezione dei colori (diapositive blu), se due complici si mostravano compatti e irremovibili nel definire le diapositive \"verdi\" (coerenza diacronica e sincronica), riuscivano a influenzare e spostare il giudizio di una parte significativa dei partecipanti reali della maggioranza. Se la minoranza si mostrava incerta o tentennante, perdeva ogni potere di influenza."},{"title":"2. Lo Stile di Negoziato","content":"L'impatto della minoranza è regolato dal modo in cui presenta le proprie posizioni:\n\nNegoziato Intransigente: proporre le proprie idee in modo rigido e dogmatico, rifiutando ogni compromesso, riduce la capacità di influenzare la popolazione perché il gruppo viene percepito come estremista.\n\nNegoziato Flessibile: mostrare apertura, disponibilità e riconoscere qualche concessione alla maggioranza senza intensificare il conflitto aumenta la probabilità di esercitare influenza, poiché la minoranza viene avvertita come civile e ragionevole."},{"title":"3.2 Compiacenza vs Conversione: La Differenza Cruciale","content":"Gli esiti dei processi di influenza maggioritaria e minoritaria producono modificazioni psicologiche strutturalmente opposte:\n\nInfluenza Maggioritaria   Compiacenza (Acquiescenza): determina un cambiamento che si esplicita solo a livello manifesto e pubblico, ma senza determinare un'accettazione privata. Il soggetto si adegua per paura dell'esclusione, ma mantiene intime convinzioni contrarie.\n\nInfluenza Minoritaria   Conversione: una minoranza coerente e flessibile non ottiene un'adesione formale immediata, ma induce una profonda ristrutturazione cognitiva nel sistema di pensiero della maggioranza. Questo determina un cambiamento reale e duraturo soprattutto a livello privato e profondo.\n\nCAP. 7"},{"title":"1. La Categorizzazione Sociale","content":"La categorizzazione è la capacità umana di suddividere il mondo in categorie, raggruppando le persone sulla base della loro similarità rispetto a determinate caratteristiche (es. religione, professione, età, sesso).\n\nI criteri di raggruppamento variano di volta in volta in base alla salienza dello stimolo: la caratteristica fisica o situazionale che risalta maggiormente in un dato contesto (es. in un anziano turista che parla una lingua straniera, la caratteristica saliente sarà l'essere straniero se ci chiede indicazioni, mentre sarà l'età avanzata se lo incontriamo in un pub)."},{"title":"Funzioni della Categorizzazione","content":"Il processo risponde a due bisogni fondamentali dell'individuo:\n\nFunzione Cognitiva (Adattiva): riduce la complessità del mondo sociale consentendo un notevole risparmio di energia mentale (economia cognitiva). Permette un funzionamento più efficiente: basta osservare un elemento saliente (es. un'uniforme) per associare alla persona l'intera serie di caratteristiche proprie di quella categoria (es. militare).\n\nFunzione Motivazionale: la suddivisione del mondo in categorie è funzionale al mantenimento di una visione positiva di sé stessi (autostima), fortemente legata all'appartenenza di gruppo. Per percepire il proprio gruppo (ingroup) come migliore e più forte degli altri (outgroup), l'individuo ha bisogno di differenziarli, e la categorizzazione offre questa opportunità."},{"title":"L'Effetto di Omogeneità del Gruppo Esterno","content":"Riprendendo gli studi classici di Tajfel e Wilkes [1963] sulla percezione fisica, la categorizzazione produce una sovrastima delle somiglianze all'interno di una stessa categoria (accentuazione intracategoriale) e un'accentuazione delle differenze tra categorie diverse (accentuazione intercategoriale).\n\nIn ambito sociale questo fenomeno si traduce nell'effetto di omogeneità del gruppo esterno: la tendenza a considerare i membri dell'outgroup come tutti uguali e omogenei tra loro, mentre i membri dell'ingroup vengono percepiti come individui unici, differenti e differenziati.\n\nPer spiegare questo effetto sono state avanzate tre ipotesi:\n\nIpotesi della familiarità (Linville): la più approfondita conoscenza dei componenti dell'ingroup ci permette di vederli come un gruppo diversificato, mentre la scarsa conoscenza dell'outgroup conduce a una percezione globale e indifferenziata.\n\nCodifica categoriale (Park e Rothbart): i comportamenti dei membri dell'ingroup vengono codificati utilizzando informazioni specifiche e tratti unici, mentre i comportamenti dell'outgroup vengono registrati in termini di categorie astratte e generali.\n\nTeoria della categorizzazione del Sé (Turner): l'effetto di omogeneità varia in base alla situazione e al confronto automatico tra ingroup e outgroup. In contesti di forte contrapposizione (es. una partita di calcio o una guerra), l'effetto può riguardare anche l'ingroup: gli individui percepiscono temporaneamente sé stessi e i propri compagni come più simili tra loro di quanto non lo siano realmente, per rispondere alla necessità di percepirsi forti, compatti e distinti dagli altri."},{"title":"Il Favoritismo nei Confronti dell'Ingroup","content":"Un effetto cardine della categorizzazione è il fenomeno del favoritismo nei confronti dell'ingroup, ossia la tendenza sistematica a distorcere le informazioni in modo che risultino a favore del proprio gruppo (Tajfel e Turner, 1979).\n\nQuesto bias si manifesta nel giudizio quotidiano (es. in una partita di calcio si tenderà a notare solo i torti subiti dalla propria squadra e a minimizzare i falli commessi) e genera una marcata preferenza riscontrabile persino nei bambini di 5 anni."},{"title":"Il Linguistic Intergroup Bias (Maass)","content":"Il linguaggio funge da strategia per mantenere un'immagine positiva dell'ingroup e perpetuare gli stereotipi in modo sottile:\n\nI comportamenti positivi dell'ingroup e quelli negativi dell'outgroup vengono descritti in termini astratti e generali (es. \"siamo onesti\", \"loro sono violenti\"), suggerendo che si tratti di caratteristiche stabili e intrinseche del gruppo.\n\nI comportamenti negativi dell'ingroup e quelli positivi dell'outgroup vengono descritti in termini concreti e specifici (es. \"ha preso un oggetto non suo\", \"ha aiutato una vecchia ad attraversare\"), suggerendo che si tratti di eventi isolati e contingenti."},{"title":"3. Impatto sulla Stereotipizzazione e sulla Discriminazione","content":"La categorizzazione rappresenta il precursore fondamentale della stereotipizzazione, del pregiudizio e della discriminazione. Ogni volta che pensiamo in termini di categorie, associamo automaticamente a quel gruppo una serie di caratteristiche fisse positive o negative (es. \"i tedeschi sono precisi\", \"gli ingegneri sono razionali\").\n\nQueste generalizzazioni, una volta radicate, vengono investite di un forte colorito affettivo di favore o di ostilità, condizionando radicalmente le modalità di elaborazione delle informazioni, i giudizi sulle cause dei comportamenti altrui (Pettigrew, 1979) e la messa in atto di veri e informazioni e comportamenti discriminatori."},{"title":"2. La Formazione degli Stereotipi","content":"Uno stereotipo è una struttura cognitiva che contiene la conoscenza, le credenze e le aspettative possedute da un soggetto a proposito di un certo gruppo umano (Hamilton e Trolier, 1986). Questi contenuti possono essere positivi o negativi e si acquisiscono sia tramite esperienza personale sia attraverso processi di apprendimento sociale. Una volta consolidati, gli stereotipi si attivano in modo pressoché automatico ogni volta che si incontra un membro della categoria. I ricercatori si concentrano soprattutto sugli stereotipi negativi, poiché essi costituiscono la base per il pregiudizio e la discriminazione (messa in atto di comportamenti concreti negativi o positivi nei confronti di un gruppo)."},{"title":"1. L'Errore Fondamentale di Attribuzione (Heider, Ross)","content":"Consiste nella tendenza sistematica a spiegare i comportamenti altrui attribuendone le cause a disposizioni interne e tratti di personalità, sottostimando il peso dei fattori situazionali e del contesto.\n\nQuesto bias favorisce la nascita di stereotipi distorti, poiché i comportamenti imposti a un gruppo da vincoli economici o sociali vengono scambiati per caratteristiche intrinseche dei suoi membri:\n\nEsempio del contesto italiano: se gli immigrati occupano spesso posizioni lavorative precarie o marginali, l'errore fondamentale di attribuzione porta i membri della maggioranza a dimenticare le barriere contingenti e ad associare direttamente il gruppo a tratti come l'ignoranza o la pigrizia.\n\nDifferenze culturali: questo errore è profondamente radicato nei paesi occidentali, dove l'individuo è concepito come un agente indipendente. Al contrario, nelle culture orientali (es. Giappone) le persone mostrano una percezione olistica, tendendo a incorporare i fattori di sfondo e il contesto sociale all'interno dei propri giudizi individuali."},{"title":"È la tendenza a percepire un'associazione o un legame di causa-effetto tra due variabili che in realtà non sono correlate tra loro.","content":"Il fenomeno si basa su un principio percettivo: la mente umana presta particolare attenzione agli stimoli insoliti, infrequenti e distintivi. Quando si verificano simultaneamente due eventi rari, essi spiccano con forza (salienza combinata), portando all'errore cognitivo:\n\nMembro di un gruppo di minoranza (stimolo infrequente per l'osservatore).\n\nComportamento negativo o criminale (stimolo infrequente rispetto alla condotta civile ordinaria).\n\nSe un esponente di una minoranza compie un'azione negativa, l'episodio richiede una lunga elaborazione cognitiva e l'osservatore tende a:\n\nPercepire una connessione stabile tra il gruppo e la criminalità.\n\nRicordare l'episodio con molta facilità.\n\nGiudicare quel comportamento come tipico di tutti i membri di quel gruppo sociale.\n\nSecondo Risen e colleghi [2007], un singolo episodio insolito è sufficiente per creare una correlazione illusoria, a patto che l'azione sia compiuta da un componente di un gruppo con cui l'osservatore ha pochissima familiarità."},{"title":"Meccanismi Affettivi (Stephan e Stephan, 1985)","content":"Gli stereotipi si strutturano anche su base emotiva. Quando i contatti tra i membri di due gruppi sono rari, l'incontro ravvicinato genera ansia, irritazione e disagio. Dopo una serie di interazioni, queste emozioni negative vengono automaticamente trasferite e associate all'intero gruppo, integrandosi nel suo stereotipo."},{"title":"Apprendimento Sociale e Trasmissione Culturale","content":"Lo stereotipo non richiede necessariamente un'esperienza diretta; viene spesso appreso in modo indiretto fin dall'infanzia come un bagaglio culturale preconfezionato ed estremizzato attraverso due canali principali:"},{"title":"1. Socializzazione Familiare","content":"I bambini interiorizzano passivamente le credenze collettive e i pregiudizi dei genitori ascoltando etichette dispregiative, barzellette denigratorie o semplici reazioni di insofferenza. Già a 5 anni i bambini sviluppano idee e atteggiamenti chiarissimi (e speculari a quelli familiari) verso i diversi gruppi sociali."},{"title":"2. I Media e la Televisione","content":"I mezzi di comunicazione modellano a lungo termine i pensieri di chi riceve il messaggio, offrendo rappresentazioni che il pubblico tende a considerare come specchi fedeli della realtà. I programmi televisivi e i messaggi pubblicitari perpetuano sistematicamente gli stereotipi tradizionali:\n\nI maschi vengono ritratti come aggressivi, forti e inseriti in ruoli prestigiosi.\n\nLe donne vengono spesso confinate in ruoli subordinati, casalinghi o rappresentate come oggetti sessuali.\n\nSintesi dello studio di Geis e colleghi [1984]: Sottoponendo un gruppo di studentesse alla visione di pubblicità televisive, i ricercatori hanno dimostrato che le ragazze esposte a spot con donne in ruoli tradizionali-subordinati manifestavano una percezione di sé e delle proprie aspirazioni nettamente inferiore e più limitata rispetto alle ragazze esposte a spot con donne in ruoli non tradizionali-dominanti."},{"title":"3. I Vantaggi della Stereotipizzazione","content":"Sebbene l'uso degli stereotipi possa comportare costi sociali (come valutazioni aziendali distorte o pregiudizi), essi si rivelano potenti strumenti cognitivi che operano per ottimizzare il funzionamento psichico attraverso funzioni specifiche:"},{"title":"1. Colmare le Lacune Informativie","content":"Gli stereotipi permettono di fornire informazioni supplementari tutte le volte che ne abbiamo bisogno, arricchendo il dato grezzo in contesti poveri di informazioni (Oakes e Turner, 1990).\n\nEsempio: Identificare uno sconosciuto come appartenente alla categoria dei \"professori\" permette di inferire in una frazione di secondo una serie di tratti associati (es. essere colto), senza dover svolgere un esame analitico e dispendioso della persona."},{"title":"2. Semplificare l'Elaborazione delle Informazioni","content":"Gli stereotipi agiscono come filtri che semplificano la realtà complessa, garantendo un notevole risparmio di energia mentale.\n\nSintesi dello studio di Macrae, Milne e Bodenhausen [1994]: I partecipanti dovevano eseguire simultaneamente due compiti: formarsi un'impressione su quattro individui e ascoltare una registrazione sull'economia dell'Indonesia. I soggetti a cui era stata fornita un'etichetta stereotipica (es. \"dottore\", \"skinhead\") come informazione supplementare ricordavano molte più informazioni sulla registrazione rispetto agli altri. Lo stereotipo ha funzionato da guida cognitiva, liberando risorse mentali da impiegare nel secondo compito più complesso."},{"title":"3. Vantaggi per il Sé e Funzioni Motivazionali","content":"Difendere il Sé dagli attacchi esterni: lo stereotipo protegge l'immagine personale e l'autostima in caso di minaccia. Se un individuo subisce un calo transitorio di autostima (es. dopo il fallimento in un test), tende a ricorrere alla stereotipizzazione negativa di un target esterno (outgroup) come modalità indiretta per riaffermare il proprio valore personale.\n\nFavorire l'accettazione sociale: l'uso di stereotipi condivisi facilita l'integrazione e l'accettazione all'interno del proprio ingroup, rispondendo al bisogno di vicinanza e coesione con la propria struttura sociale (Turner, 1987).\n\nGiustificazione logica delle disuguaglianze: per chi appartiene a gruppi dominanti o di elevato status, lo stereotipo offre una razionalizzazione delle asimmetrie sociali ed economiche, facendo apparire le disuguaglianze come naturali, giuste e inevitabili (Kluegel e Smith, 1986)."},{"title":"4. È Possibile Sopprimere gli Stereotipi?","content":"Dati gli effetti deleteri degli stereotipi, la ricerca si è chiesta se sia possibile contrastarli consciamente. Daniel Wegner [1994] ha descritto i processi cognitivi che si attivano quando decidiamo di ribellarci a un pensiero stereotipico, individuando un meccanismo composto da due fasi sequenziali:"},{"title":"Il Modello Duale di Controllo Mentale (Wegner)","content":"[Decisione di sopprimere lo stereotipo]\n\n                 │\n\n                 ▼\n\nPROCESSO DI MONITORAGGIO (Inconscio, automatico, economico)\n\n  ↳ Ispeziona la mente alla ricerca di pensieri stereotipici.\n\n                 │\n\n                 ▼ [Se viene rilevato uno stereotipo]\n\nFASE OPERATIVA (Consapevole, richiede energia cognitiva)\n\n  ↳ Attiva \"distrattori mentali\" per rimuovere il pensiero indesiderato.\n\nIl Processo di Monitoraggio: è una fase inconscia e quasi del tutto automatica che richiede pochissime risorse cognitive. Il suo compito è ispezionare costantemente il contenuto dei propri pensieri alla ricerca di qualsiasi traccia riconducibile allo stereotipo da censurare.\n\nLa Fase Operativa: si innesca solo se il monitoraggio rileva un pensiero indesiderato. Ha il compito di rimuovere attivamente lo stereotipo focalizzando l'attenzione su distrattori mentali alternativi. Questo processo è consapevole, intenzionale e richiede una notevole quantità di energia cognitiva per funzionare efficacemente."},{"title":"Limiti situazionali del controllo","content":"Poiché la fase operativa dipende dal pieno carico delle risorse cognitive, il sistema fallisce se il soggetto si trova in presenza di fattori contingenti come:\n\nForti stati emotivi o stress.\n\nStanchezza fisica o mentale.\n\nContemporaneo svolgimento di compiti cognitivi difficili.\n\nPressione temporale.\n\nIn queste situazioni stressanti, il processo di monitoraggio (che è automatico) continua a funzionare segnalando lo stereotipo, mentre la fase operativa (che è priva di energia) si blocca."},{"title":"L'Effetto Rimbalzo (Rebound Effect)","content":"Il fallimento del controllo mentale determina un paradosso cognitivo noto come effetto rimbalzo: quando lo sforzo di soppressione viene interrotto o fallisce per sovraccarico, i pensieri indesiderati si riaffacciano alla mente con un'intensità e una frequenza di molto superiori rispetto a quelle che avrebbero avuto se non fossero mai stati censurati in precedenza.\n\nSintesi dello studio di Macrae e colleghi [1994]: Inizialmente invitati a descrivere la giornata tipo di uno skinhead sforzandosi di evitare espressioni stereotipiche, i soggetti del primo gruppo riuscirono nell'intento. Successivamente, lasciati in assoluta libertà di scrivere la giornata tipo di un secondo skinhead, questi stessi soggetti utilizzarono un numero di espressioni stereotipiche drasticamente superiore rispetto ai soggetti del gruppo di controllo che non avevano subito alcuna inibizione iniziale."},{"title":"Una via d'uscita: l'allenamento continuo","content":"Wegner [1994] suggerisce che l'effetto rimbalzo non è inevitabile. Attraverso un esercizio prolungato e costante, l'allenamento alla soppressione può far sì che anche la fase operativa (il controllo dei pensieri indesiderati) si automatizzi, diventando efficiente anche in situazioni di forte stress.\n\nEcco il riassunto strutturato dell'ultima sezione del capitolo, ridotto all'essenziale (circa il 25% del testo originario) e incentrato sulle strategie di controllo indiretto e sulla prospettiva di chi subisce la stereotipizzazione."},{"title":"4.1 Strategie di Controllo Indiretto degli Stereotipi","content":"Oltre alla soppressione conscia (soggetta all'effetto rimbalzo), la ricerca ha individuato vie alternative e più efficaci per inibire l'attivazione degli stereotipi senza consumare risorse cognitive:\n\nAssunzione della Prospettiva (Perspective-taking): consiste nel calarsi intenzionalmente nei panni di una persona target, provando a vedere il mondo dal suo punto di vista (Galinsky e Moskowitz, 2000). Questa strategia azzera l'effetto rimbalzo e riduce sensibilmente il favoritismo verso il proprio gruppo.\n\nL'Assetto Mentale Creativo (Mindset): attivare una modalità di pensiero basata sul concetto del \"pensa differente\" (Sassenberg e Moskowitz, 2005). Spingere le persone a rievocare situazioni in cui hanno agito in modo creativo previene l'innesco automatico degli stereotipi. Si tratta di una strategia di controllo indiretto efficace a prescindere dal gruppo sociale di riferimento o dalla situazione."},{"title":"5. Lo Stereotipo dal Punto di Vista di Chi lo Subisce","content":"La ricerca psicosociale contemporanea si concentra sulle pesanti implicazioni psicologiche connesse all'appartenenza a un gruppo sociale vittima di stereotipi negativi."},{"title":"La Teoria della Minaccia Indotta dallo Stereotipo (Stereotype Threat)","content":"Sviluppata da Steele e Aronson [1995], la minaccia indotta dallo stereotipo è il timore o l'ansia sperimentati da un individuo di confermare, attraverso la propria prestazione, uno stereotipo negativo associato al proprio gruppo di appartenenza.\n\nIl meccanismo: la consapevolezza dello stereotipo genera una forte pressione mentale e un'inefficienza elaborativa che finisce per compromettere la reale prestazione della persona, indipendentemente dalle sue effettive capacità.\n\nSintesi degli studi classici (Steele e Aronson, 1995): Sottoponendo studenti afroamericani e bianchi a un test verbale, i ricercatori riscontrarono un netto calo prestazionale degli studenti neri solo nella condizione sperimentale in cui la prova veniva esplicitamente presentata come un \"test diagnostico delle abilità intellettive\" (condizione che attivava la minaccia dello stereotipo). Quando il medesimo test veniva descritto come un semplice esercizio di problem-solving non diagnostico, le prestazioni tra bianchi e neri risultavano equivalenti."},{"title":"I tre processi psicologici del calo prestazionale","content":"La minaccia indotta dallo stereotipo distrae la persona dal compito e danneggia il comportamento attraverso tre meccanismi fisiologici e cognitivi interrelati (Schmader, Johns e Forbes, 2008):\n\nUna risposta fisiologica immediata di stress che compromette l'elaborazione della corteccia prefrontale.\n\nUna tendenza a monitorare continuamente la propria prestazione con ansia, sottraendo attenzione al compito.\n\nUno sforzo cosciente volto a sopprimere le emozioni e i pensieri negativi, un'operazione dispendiosa che consuma l'energia mentale (memoria di lavoro) necessaria a svolgere la prova."},{"title":"Carattere Generale della Minaccia e Conseguenze a Lungo Termine","content":"A differenza di quanto ipotizzato inizialmente, la minaccia dallo stereotipo è un fenomeno di carattere generale e non è limitato ai gruppi storicamente svantaggiati o con bassa autostima. Chiunque può subirne gli effetti se si trova in una condizione di pressione (es. studenti bianchi eccellenti in matematica mostrano un calo prestazionale se messi in finto confronto con studenti asiatici; campioni di golf bianchi falliscono se la prova attiva lo stereotipo sulle superiori abilità atletiche dei neri)."},{"title":"Il Processo di Disidentificazione","content":"Mentre i membri dei gruppi a status elevato subiscono la minaccia in forma lieve e transitoria, chi appartiene a gruppi sistematicamente stigmatizzati convive stabilmente con questo peso. A lungo termine, ciò può indurre le persone a mettere in atto la disidentificazione: difendere la propria autostima smettendo di identificarsi con quel preciso dominio (es. la scuola o lo sport).\n\nL'arma a doppio taglio: se da un lato protegge il Sé dal pregiudizio, dall'altro influisce negativamente sulla motivazione e sul rendimento, precludendo ai soggetti la possibilità di raggiungere importanti obiettivi scolastici e professionali.\n\nEffetti collaterali collaterali: la ripetuta sottomissione alla minaccia intacca le capacità personali di autocontrollo nella vita quotidiana, aumentando la probabilità di prendere decisioni rischiose, assumere condotte aggressive o manifestare disturbi dell'alimentazione immediatamente dopo l'esposizione allo stereotipo."},{"title":"La Spinta da Stereotipo (Stereotype Lift)","content":"In modo speculare, lo stereotipo può produrre un effetto positivo sui gruppi non penalizzati. La spinta da stereotipo è il miglioramento delle prestazioni e della performance generato dall'attivazione di uno stereotipo positivo riguardante il proprio gruppo (Shih, Pittinsky e Ho, 2012).\n\nQuesto fenomeno si basa sul meccanismo psicologico del confronto sociale al ribasso: l'individuo accresce la propria autostima e sicurezza confrontandosi con un gruppo stereotipicamente considerato deficitario in quel determinato settore (es. i maschi ottengono punteggi più elevati nei compiti di matematica solo se la prova viene presentata menzionando la presenza di differenze di genere tradizionali a svantaggio delle femmine)."},{"title":"Come Difendersi dalla Minaccia","content":"La ricerca recente ha individuato due principali strategie cliniche e scolastiche per ridurre e contrastare gli effetti deleteri della minaccia:\n\nLa conoscenza del fenomeno (Johns, 2005): fornire in anticipo ai partecipanti informazioni esplicite sulla minaccia indotta dallo stereotipo e sui suoi meccanismi ansiogeni azzera il calo prestazionale, permettendo ai soggetti di isolare l'ansia e svolgere la prova al meglio delle proprie potenzialità.\n\nFocalizzazione sulle somiglianze intergruppi (Rosenthal e Crisp, 2006): indurre i soggetti (es. le studentesse prima di un test di matematica) a riflettere sulle somiglianze e sui punti di contatto con l'altro sesso anziché sulle differenze. Spostare l'accento sulla comune identità umana riduce l'impatto degli stereotipi di genere in ambito scolastico e formativo.\n\nEcco il riassunto strutturato dell'ultima sezione del testo, ridotto all'essenziale (circa il 25% della lunghezza originale) e focalizzato sulle strategie educative e sulle metodologie di misurazione degli stereotipi."},{"title":"5.1 Strategie di Contrasto nei Contesti Educativi","content":"La ricerca suggerisce ulteriori interventi pratici che gli insegnanti possono adottare per disinnescare la minaccia indotta dallo stereotipo:\n\nEvitare le etichette categoriali: i docenti dovrebbero eliminare espressioni che dividono la classe in base al genere (es. \"prima le bambine, poi i bambini\"), poiché queste focalizzano l'attenzione sulle differenze e aumentano il ricorso automatico agli stereotipi (Patterson e Bigler, 2006). È preferibile creare gruppi fluidi basati su caratteristiche trasversali e cambiarli frequentemente.\n\nFornire modelli di successo (Role Models): far interagire gli studenti con donne o membri di minoranze competenti in domini tradizionalmente colpiti da stereotipi negativi (es. discipline scientifiche) ne intacca la credibilità e migliora le prestazioni di chi subisce la minaccia (Marx e Roman, 2002).\n\nAutoaffermazione preventiva: chiedere ai partecipanti, prima di una prova, di riflettere e soffermarsi su una propria caratteristica personale positiva funge da potente scudo protettivo per l'autostima (Cohen et al., 2006)."},{"title":"6. Come si Misurano gli Stereotipi?","content":"Nel corso del tempo, la psicologia sociale ha sviluppato due principali approcci metodologici per rilevare e quantificare le credenze stereotipiche: i metodi diretti e i metodi indiretti."},{"title":"1. Metodi Diretti (Self-Report)","content":"Consistono nel chiedere esplicitamente ai partecipanti di indicare su un foglio i tratti associati a un gruppo o di esprimere il proprio grado di accordo verso una lista di affermazioni.\n\nSintesi dello studio classico di Katz e Braly [1933]: Pionieri in questo campo, chiesero ai soggetti di scegliere da un elenco di 84 aggettivi quelli che meglio descrivevano vari gruppi etnici e religiosi (es. italiani, tedeschi, ebrei). I tratti selezionati con le frequenze più alte andavano a definire gli elementi primari dello stereotipo."},{"title":"Limiti dei metodi diretti","content":"I dati raccolti tramite self-report rischiano di essere fortemente distorti a causa di due fattori:\n\nFattori socioculturali: a partire dagli anni Sessanta, la nascita di società multiculturali e la diffusione di norme di uguaglianza hanno reso socialmente inaccettabile l'espressione esplicita del pregiudizio.\n\nAutopresentazione: la motivazione delle persone a creare negli altri un'impressione di sé positiva e desiderabile, nascondendo i propri aspetti negativi o i propri stereotipi per non apparire intolleranti agli occhi del ricercatore (Jones e Pittman, 1982)."},{"title":"2. Metodi Indiretti","content":"Nati per superare i limiti dell'autopresentazione, questi strumenti valutano gli stereotipi in modo implicito, senza che il soggetto si renda conto di cosa venga realmente misurato. I principali metodi sono la Bogus pipeline, il priming semantico e, soprattutto, l'Implicit Association Test (IAT)."},{"title":"L'Implicit Association Test (IAT)","content":"Sviluppato da Greenwald, McGhee e Schwartz [1998], lo IAT è lo strumento di maggiore successo grazie alla sua capacità di rilevare anche minime variazioni cognitive inconsce.\n\nCome funziona: Il compito viene eseguito al computer e consiste nel classificare il più rapidamente possibile parole o immagini che compaiono sullo schermo premendo solo due tasti preimpostati. Il test incrocia quattro categorie, divise a coppie: due concetti sociali (es. Bianchi vs Neri) e due attributi valutativi (es. Dinamico vs Pigro o Piacevole vs Sgradevole).\n\nLa logica sottostante: Il sistema si basa sui tempi di reazione. I soggetti rispondono molto più rapidamente nei casi in cui due categorie fortemente associate nella loro mente condividono lo stesso tasto di risposta. Se nella struttura cognitiva del soggetto esiste uno stereotipo che associa i Neri alla Pigrizia, il tempo di risposta sarà minimo quando queste due categorie saranno accoppiate sullo stesso tasto.\n\nEvidenze empiriche: Gli studi dimostrano che i campioni di soggetti bianchi mostrano una latenza di risposta significativamente minore (sono più veloci) quando la categoria \"Bianchi\" è associata a parole \"Piacevoli\" rispetto alla condizione \"Neri + Piacevole\". Lo stesso meccanismo regola gli stereotipi religiosi (es. associazioni più rapide per \"Cristiano + Piacevole\" rispetto a \"Ebreo + Piacevole\", come rilevato da Rudman e colleghi, 1999).\n\nCAP 8"},{"title":"Definizione di Pregiudizio","content":"L'etimologia (prae-judicium) richiama la nozione di euristica, intesa come una scorciatoia di pensiero per orientare il comportamento di fronte a informazioni frammentarie.\n\nIn psicologia sociale, il pregiudizio è definito come un atteggiamento, generalmente negativo, indirizzato a un gruppo o categoria sociale (o a chiunque ne faccia parte), basato su una valutazione generica che prescinde dalle caratteristiche individuali dei singoli membri."},{"title":"1. Il Pregiudizio come Caratteristica di Personalità","content":"I primi filoni di ricerca hanno cercato le determinanti del pregiudizio all'interno di strutture cognitive e psicologiche individuali stabili."},{"title":"Le tipologie di Allport [1954]","content":"In The Nature of Prejudice, Allport distingue tre modalità con cui le persone strutturano il pregiudizio:\n\nI fanatici: esprimono costantemente alti livelli di pregiudizio in modo libero.\n\nGli egalitari a oltranza: rifiutano attivamente le asimmetrie sociali.\n\nGli ambivalent: mostrano un pregiudizio con «compunction» (rimorso), caratterizzato da un'alternanza tra atteggiamenti anti e protarget. Questo vissuto deriva dal conflitto interiore tra un pregiudizio primario e affettivo e un sistema valoriale secondario di natura intellettuale e antirazzista."},{"title":"La Teoria della Personalità Autoritaria (Adorno et al., 1950)","content":"Sviluppata nel secondo dopoguerra per spiegare l'Olocausto, la teoria collega il pregiudizio a un preciso funzionamento psichico generato da una rigida storia familiare:\n\nLe cause infantili: un'educazione caratterizzata da severità, repressione costante e misure correttive rigide da parte dei genitori produce una forte frustrazione nel bambino. Non potendo dirigere la rabbia verso le figure genitoriali per paura delle conseguenze, l'individuo la canalizza verso bersagli alternativi e più deboli (prevaricazione ed emarginazione delle minoranze).\n\nIl profilo adulto: si traduce in un atteggiamento fortemente sottomesso nei confronti dell'autorità, unito a uno stile cognitivo ipersemplificato, rigido e propenso a ideologie etnocentriche e razziste."},{"title":"La Teoria sulla Personalità Dogmatica (Rokeach, 1960)","content":"A differenza di Adorno, l'analisi di Rokeach si sposta sul modo in cui le credenze vengono organizzate a livello cognitivo. Le persone inclini al pregiudizio e alla discriminazione presentano una struttura mentale rigida che organizza i sistemi di credenze in modo isolato, impedendo alle informazioni incoerenti di entrare in contatto tra loro.\n\nIl pregiudizio e il rifiuto delle opinioni altrui vengono protetti dalle contraddizioni concettuali facendo appello al «principio d'autorità», utilizzato come criterio cardine di giustificazione delle proprie convinzioni.\n\nSviluppi moderni: Gli approcci contemporanei allo studio della personalità includono costrutti come l'autoritarismo di destra (Altemeyer) e l'orientamento alla dominanza sociale (Sidanius e Pratto). Tuttavia, la ricerca moderna suggerisce che la personalità stessa non sia un fattore isolato, ma vada considerata come l'effetto di variabili socioculturali, processi motivazionali e dinamiche legate alla categorizzazione sociale."},{"title":"2. L'Appartenenza ai Gruppi e la Categorizzazione Sociale","content":"I modelli successivi hanno integrato l'approccio individualista spostando il focus sulle dinamiche intergruppi."},{"title":"La Teoria dell'Identità Sociale - SIT (Tajfel e Turner)","content":"La SIT costituisce il paradigma fondamentale per spiegare come il pregiudizio possa nascere dalla semplice interazione sociale, mossa dal bisogno innato di sviluppare e mantenere un'identità positiva."},{"title":"L'identità sociale è quella parte del concetto di sé che deriva dalla consapevolezza della propria appartenenza a uno o più gruppi sociali, unita al significato emotivo e valutativo associato a tale appartenenza (Tajfel e Turner, 1986).","content":"All'interno dell'identità sociale si distinguono tre elementi costitutivi:"},{"title":"Dinamiche intergruppi secondo la SIT","content":"La teoria sostiene che dietro i comportamenti intergruppi si celi la motivazione a mantenere un'identità sociale positiva e soddisfacente. Questa spinta si amplifica e si traduce in pregiudizio o ostilità ogni volta che l'outgroup viene percepito come una minaccia diretta alla stabilità, alla stima o all'esistenza stessa dell'identità sociale dell'ingroup.\n\nEcco il riassunto strutturato delle nuove pagine del capitolo sul pregiudizio, ridotto al nucleo essenziale (circa il 25% del testo originale) e focalizzato sui modelli di categorizzazione e sulle teorie bifattoriali."},{"title":"2.1 La Teoria dell'Autocategorizzazione - SCT (Turner)","content":"La SCT rappresenta un'estensione della teoria dell'identità sociale e analizza come gli individui categorizzino sé stessi all'interno del mondo sociale. Secondo Turner, l'autocategorizzazione definisce il soggetto sia sulla base delle somiglianze che condivide con l'ingroup, sia sulla base delle differenze che presenta rispetto all'outgroup."},{"title":"I Tre Livelli di Astrazione del Sé","content":"Il processo di autocategorizzazione si struttura su una gerarchia a tre livelli:\n\nLivello Sovraordinato (Human Identity): la percezione di sé come essere umano, basata sulle somiglianze con l'intera specie rispetto ad altre forme di vita.\n\nLivello Intermedio (Social Identity): la percezione di sé come membro di un gruppo sociale in rapporto e confronto con membri di un altro gruppo (ingroup vs outgroup).\n\nLivello Subordinato (Personal Identity): la percezione di sé come individuo unico e differenziato rispetto agli altri membri del proprio stesso ingroup."},{"title":"Il Processo di Depersonalizzazione","content":"Quando il livello di identificazione sociale diventa saliente (livello intermedio), si innesca la depersonalizzazione. Il soggetto smette di percepirsi come un individuo unico e si considera un elemento intercambiabile della propria categoria sociale. Questo fenomeno non ha una valenza negativa (non è una perdita di identità): rappresenta semplicemente uno spostamento del focus dall'identità personale all'identità sociale."},{"title":"2.2 Dinamiche Cognitive dell'Outgroup e Infraumandizzazione","content":"L'identificazione con l'ingroup attiva filtri percettivi e linguistici che alimentano il pregiudizio e svalutano sistematicamente il gruppo esterno:\n\nL'effetto di metacontrasto: la categorizzazione sociale massimizza le somiglianze intracategoriali e accentua le differenze intercategoriali (es. percepire gli islamici come tutti uguali tra loro e nettamente opposti ai cattolici).\n\nLinguistic Intergroup Bias: l'outgroup viene descritto utilizzando termini molto astratti quando compie azioni negative (tratti stabili) e termini concreti quando compie azioni positive (eventi isolati).\n\nL'Infraumandizzazione dell'Outgroup (Leyens et al., 2001): è la tendenza etnocentrica e inconscia ad attribuire una maggiore umanità all'ingroup rispetto a quella riconosciuta all'outgroup. Questo meccanismo si basa sulla distinzione tra emozioni:\n\nEmozioni primarie (rabbia, paura): riconoscibili anche negli animali, vengono attribuite a entrambi i gruppi.\n\nEmozioni secondarie (amore, speranza, disprezzo): considerate unicamente umane, vengono associate prevalentemente o esclusivamente ai membri del proprio ingroup, mentre l'outgroup ne viene ritenuto parzialmente privo."},{"title":"3. Le Teorie Bifattoriali del Pregiudizio","content":"Sviluppate da Crandall e Eshleman [2003], le teorie bifattoriali spiegano le forme moderne di pregiudizio partendo dal presupposto che l'espressione degli atteggiamenti discriminatori sia il risultato del conflitto tra due componenti opposte e compresenti:\n\n ┌───────────────────────────┐       ┌───────────────────────────┐\n\n │   PREGIUDIZIO RAZZIALE    │  vs   │ MOTIVAZIONE A SOPPRIMERE  │\n\n │ (Primitivo, automatico)   │       │   (Norme, egalitarismo)   │\n\n └─────────────┬─────────────┘       └─────────────┬─────────────┘\n\n               └───────────────┬───────────────────┘\n\n                               ▼\n\n                    [EMOZIONI AMBIVALENTI]\n\n                    [INSTABILITÀ COMPORTAMENTALE]\n\nIl Pregiudizio Razziale Genuino: è una componente primitiva, basilare, potente e precoce. Si attiva in modo automatico e richiede pochissime risorse cognitive. Corrisponde a un orientamento affettivo chiaramente negativo e non conscio (es. il pregiudizio implicito rilevato nei bianchi americani verso i neri).\n\nLa Motivazione a Sopprimere: è la spinta dettata da norme sociali e istituzionali (egalitarismo, liberalismo, valori umanitari) radicate nella popolazione, che censurano l'intolleranza. Gli individui controllano le proprie risposte per timore del biasimo sociale o per mantenere un'immagine di sé non pregiudiziale.\n\nQuesto conflitto produce emozioni ambivalenti, instabilità nei comportamenti e inconsistenza cognitiva."},{"title":"Modelli Bifattoriali della Letteratura","content":"La tensione tra la tendenza a manifestare il pregiudizio e la spinta a sopprimerlo ha dato vita a tre principali modelli teorici:\n\nRegressive Racism (Rogers e Prentice-Dunn, 1981): il pregiudizio genuino viene mascherato dalle norme egalitarie nella vita quotidiana. Tuttavia, in condizioni di forte stress, rabbia, insulto o attivazione emotiva, il controllo cognitivo viene meno e si assiste a una regressione verso pattern primitivi di discriminazione manifesta.\n\nAversive Racism (Gaertner e Dovidio, 1986): tipico delle persone di matrice politica liberale ed egalitaria. Non è un pregiudizio apertamente ostile, ma si manifesta attraverso emozioni negative di disagio, sconforto, timore ed evitamento sistematico del contatto con la minoranza, protetti da una facciata di formale uguaglianza.\n\nSymbolic Racism (Kinder e Sears, 1981): definisce il pregiudizio come una struttura coerente di credenze politiche tipica degli ambienti conservatori e individualisti. Si esprime attraverso quattro temi specifici:\n\nIl diniego dell'esistenza della discriminazione razziale.\n\nLa credenza che le difficoltà delle minoranze derivino dalla loro pigrizia o riluttanza a lavorare sodo.\n\nIl considerare le minoranze eccessivamente esigenti.\n\nLa convinzione che i gruppi svantaggiati ricevano più favori sociali di quanti ne meritino realmente.\n\nEcco il riassunto strutturato dell'ultima sezione del capitolo sul pregiudizio, ridotto al nucleo essenziale (circa il 25% della lunghezza originale) e focalizzato sulle espressioni latenti e sulle basi neuroscientifiche."},{"title":"3.1 Altri Modelli Bifattoriali del Pregiudizio","content":"La letteratura approfondisce il conflitto tra spinte primitive e soppressione sociale attraverso ulteriori costrutti teorici:\n\nModern Racism (McConahay, 1983): descrive la metamorfosi del pregiudizio nelle società occidentali. Poiché le vecchie credenze razziste sono ormai considerate socialmente inaccettabili, il pregiudizio si esprime in modo più sottile, basandosi sul conflitto tra i valori egalitari astratti e un'intolleranza viscerale appresa precocemente.\n\nAmbivalent Racism (Katz, Wackenhut e Hass, 1986): postula che i bianchi americani vivano uno scontro intrapsichico tra sentimenti pro e anti-neri. Questo vissuto deriva dalla coesistenza di due sistemi di valori indipendenti: da un lato l'umanesimo e l'egalitarismo (che promuovono simpatia), dall'altro l'individualismo e l'etica del lavoro (Protestant work ethic), che alimentano sentimenti negativi e attribuiscono le difficoltà delle minoranze a una loro presunta mancanza di impegno.\n\nAttivazione Automatica di Stereotipi (Devine, 1989): sostiene che l'espressione del pregiudizio sia regolata sia da processi automatici sia da processi controllati. Le credenze stereotipiche vengono apprese precocemente e registrate nella memoria fin dall'infanzia, attivandosi in modo automatico. Tuttavia, la presenza di controvalori e obblighi personali consapevoli (risorse cognitive e motivazione) può intervenire in una fase successiva per sopprimere e bloccare la risposta discriminatoria esterna."},{"title":"Il Modello del Pregiudizio Manifesto e Latente (Pettigrew e Meertens, 1995)","content":"Sviluppato in Europa occidentale, il modello postula la compresenza di due componenti parzialmente indipendenti che definiscono il neorazzismo:\n\nPregiudizio Manifesto: è la forma diretta, esplicita, tradizionale e inequivocabile di intolleranza. Si caratterizza per il rifiuto netto dell'altro, la percezione dell'outgroup come una minaccia economica o culturale e la forte resistenza emozionale a contatti intimi o interpersonali con i suoi membri.\n\nPregiudizio Latente: è una forma indiretta, subdola e fredda di discriminazione, pienamente accettata dal punto di vista normativo e sociale. Si esprime attraverso tre modalità specifiche:\n\nLa strenua difesa dei valori tradizionali dell'ingroup.\n\nL'esagerazione delle differenze culturali esistenti tra i gruppi.\n\nIl diniego di qualsiasi emozione positiva nei confronti dei membri dell'outgroup (assenza di sentimenti di simpatia o ammirazione).\n\nSulla base dei punteggi ottenuti in queste scale, Pettigrew e Meertens isolano tre tipologie di individui:"},{"title":"4. Il Pregiudizio nelle Neuroscienze","content":"Le neuroscienze cognitive analizzano i processi cerebrali che sottendono il giudizio sociale. L'informazione valutativa (buono vs cattivo) viene elaborata in pochissimi millisecondi dopo la percezione dello stimolo per dirigere l'attenzione e preparare l'organismo a risposte immediate di tipo \"attacco-fuga\".\n\nI dati derivanti dalla risonanza magnetica funzionale (fMRI) dimostrano l'esistenza di una chiara distinzione anatomo-funzionale tra i processi di valutazione automatica e quelli controllati:\n\n                  [STIMOLO VISIVO: Volto Outgroup]\n\n                                 │\n\n            ┌────────────────────┴────────────────────┐\n\n            ▼                                         ▼\n\n[VALUTAZIONE AUTOMATICA]                   [PROCESSI VALUTATIVI CONTROLLATI]\n\nAmigdala (Attivazione emotiva)           • Area mediale della corteccia prefrontale\n\nArea BA 45 (Corteccia frontale)          • Zona ventrolaterale destra\n\nFissazioni oculari correlate             • Regolano e inibiscono la risposta\n\n                                               automatica iniziale"},{"title":"1. Processi di Valutazione Automatica","content":"Avvengono in modo preattentivo e indipendente dall'intenzione consapevole del soggetto. Le strutture cerebrali implicate sono:\n\nL'Amigdala: situata nel lobo temporale, è la centrale di elaborazione delle emozioni. Registra un'attivazione significativamente più alta di fronte a stimoli considerati minacciosi. Gli studi sui biases razziali (Phelps et al., 2000) dimostrano che nei soggetti bianchi l'esposizione subliminale a volti neri attiva l'amigdala in modo automatico, e l'intensità di questa attivazione correla direttamente con i punteggi di pregiudizio implicito ottenuti nei test di laboratorio.\n\nL'Area BA 45: posizionata nella porzione inferiore-destra della corteccia frontale, coadiuva la codifica immediata dello stimolo."},{"title":"2. Processi Valutativi Controllati","content":"Si attivano quando l'individuo effettua una valutazione controllata e riflessiva, richiedendo risorse cognitive coscienti per elaborare atteggiamenti complessi. Le aree implicate sono:\n\nL'Area Mediale della Corteccia Prefrontale\n\nLa Zona Ventrolaterale Destra della corteccia prefrontale\n\nQueste due aree cerebrali si mostrano particolarmente attive durante i giudizi controllati, interagendo con le strutture inferiori per modulare, inibire o correggere l'attivazione emotiva automatica prodotta dall'amigdala, garantendo un migliore adattamento in risposta alle richieste specifiche della situazione sociale.\n\nEcco il riassunto strutturato dell'ultima sezione del testo, ridotto all'essenziale (circa il 25% della lunghezza originale) e focalizzato sull'integrazione teorica del modello JSM e sui fattori costitutivi del pregiudizio."},{"title":"5. Una Visione Integrata dell'Espressione di Pregiudizio","content":"Tutte le teorie bifattoriali esaminate possono essere ridotte al conflitto fondamentale fra due istanze motivazionali: l'acquisizione precoce di un pregiudizio automatico verso l'outgroup e la successiva motivazione interna o esterna a sopprimerlo in virtù delle norme socioculturali.\n\nCrandall ed Eshleman [2003] integrano questi filoni nel Justification-Suppression Model (JSM), riassumibile in una semplice equazione psicologica:\n\n$$\\text{pregiudizio} + \\text{soppressione} = \\text{espressione}$$\n\nIl modello descrive l'espressione finale del pregiudizio non come una reazione puramente automatica, ma come il risultato di una complessa interazione a tre fattori, analizzati nel dettaglio:"},{"title":"5.1 Il Pregiudizio Genuino","content":"Il pregiudizio genuino è una componente affettiva, precoce e basilare di valutazione negativa dell'outgroup. Si caratterizza come una forza motivazionale primaria e potente che si attiva al di fuori della consapevolezza conscia.\n\nLe sue fonti principali si rintracciano in tre canali di sviluppo:\n\nApprendimento sociale precoce: i bambini interiorizzano gli atteggiamenti etnici direttamente dai genitori in modo precoce e radicale (trasmissione intergenerazionale del pregiudizio).\n\nSocializzazione dei mass media: i mezzi di comunicazione svolgono una forte funzione di condizionamento. L'esposizione ai media descrive spesso le minoranze in ruoli marginali o negativi, inducendo biases intergruppi negli adolescenti appartenenti alla maggioranza e intaccando l'autostima dei giovani delle minoranze.\n\nPercezione di minaccia e dinamiche intergruppi: il pregiudizio genuino si alimenta ogni volta che l'outgroup viene percepito come una minaccia imminente (economica, culturale o di sicurezza) o in situazioni di conflitto intergruppi per l'allocazione delle risorse."},{"title":"5.2 Fattori di Soppressione","content":"La soppressione è definita come una motivazione intenzionale (esterna o interna) volta a ridurre l'espressione o la consapevolezza conscia del proprio pregiudizio per aderire a canoni interiori o normativi.\n\nLe caratteristiche: la soppressione è un processo controllato e consapevole che richiede un'allocazione specifica di risorse cognitive e comporta un preciso costo emotivo e mentale.\n\nLe conseguenze: sebbene sia guidata da un diffuso sistema normativo di tipo egalitario, la soppressione può fallire o determinare fenomeni di «discriminazione inversa», ovvero situazioni in cui i soggetti sovra-correggono i propri biases automatici finendo per preferire o favorire l'outgroup rispetto all'ingroup per mostrare un'apparenza non pregiudiziale."},{"title":"5.3 Fattori di Giustificazione","content":"All'interno del modello JSM, i fattori di giustificazione rappresentano l'elemento chiave che permette di liberare l'espressione del pregiudizio aggirando la barriera della soppressione.\n\nDefinizione e funzione: La giustificazione è una credenza, ideologia o norma sociale utilizzata per spiegare e legittimare l'esistenza di differenze di status o comportamenti discriminatori, proteggendo al contempo l'immagine di sé dell'individuo.\n\nIl meccanismo psicologico: Quando un'ideologia scientifica, religiosa o politica (es. il conservatorismo o l'individualismo) fornisce una giustificazione logica all'intolleranza, il pregiudizio genuino viene liberato in modo automatico. L'attenzione si sposta dalle cause interne ai correlati del pregiudizio, permettendo al soggetto di esprimere discriminazione senza subire il biasimo sociale o il senso di colpa interiore.\n\nEcco il riassunto strutturato delle ultime pagine del capitolo sul pregiudizio, incentrato sui fattori di giustificazione (JSM), l'effetto rimbalzo e l'influenza dell'orientamento politico (ridotto a circa il 25% del testo originale)."},{"title":"5.3 I Fattori di Giustificazione nel Modello JSM","content":"I fattori di giustificazione sono processi psicologici che legittimano l'espressione del pregiudizio genuino, permettendo all'individuo di discriminare senza violare i propri canoni interiori o le norme sociali di tolleranza. A differenza della soppressione, che richiede energia e controllo cognitivo, la giustificazione sblocca l'espressione del pregiudizio liberando l'energia mentale e alleviando il senso di colpa.\n\nCrandall ed Eshleman [2000] raggruppano i sistemi di giustificazione in macro-categorie ideologiche volte alla preservazione dello status quo:\n\nLa fallacia naturalistica: l'insieme di credenze sulla natura del mondo sociale usate per sostenere l'ordine esistente, basate sul principio che \"ciò che è, è buono\".\n\nLa credenza in un mondo giusto (Lerner, 1980): la radicata convinzione secondo cui il mondo sia un luogo intrinsecamente equo, dove ognuno ottiene dalla vita ciò che si merita. Chi adotta questa visione attribuisce la povertà o la marginalità delle minoranze a demeriti personali, giustificandone l'emarginazione.\n\nL'autoritarismo di destra (Altemeyer, 1994): un costrutto psicologico caratterizzato da una rigida sottomissione all'autorità e da un'aggressività mirata verso i gruppi minoritari. Porta a sviluppare forti correlazioni sia con il pregiudizio generalizzato sia con quello mirato a specifici outgroups.\n\nIl darwinismo sociale: l'applicazione delle leggi dell'evoluzione biologica alle dinamiche della società. Sostiene che l'ineguaglianza sociale sia naturale e inevitabile, poiché il successo socioeconomico è il frutto della sopravvivenza del più forte (Hawkins, 1997).\n\nIdeologie di matrice religiosa: l'utilizzo di specifiche stratificazioni gerarchiche (es. la teologia della prosperità derivante dal calvinismo) per interpretare la ricchezza terrena come una diretta testimonianza dell'amore di Dio, giustificando indirettamente lo svantaggio delle minoranze.\n\nIl conservatorismo socioeconomico: un orientamento politico-ideologico che difende la superiorità della classe dominante in quanto retaggio storico, considerando normali e legittime solo le categorie sociali destinate al successo (es. bianchi, eterosessuali, maschi)."},{"title":"5.4 La Soppressione del Pregiudizio e l'Effetto Rimbalzo","content":"Nel modello JSM (riassunto nella tabella 8.1), la soppressione e la giustificazione mostrano caratteristiche psicologiche strutturalmente opposte nell'allocazione delle risorse mentali:"},{"title":"L'Effetto Rimbalzo (Rebound Effect)","content":"Il tentativo conscio e intenzionale di sopprimere pensieri o sentimenti pregiudiziali richiede un monitoraggio costante. Se le risorse cognitive si riducono (a causa di stanchezza, emozioni intense o compiti simultanei), il controllo fallisce.\n\nQuesto innesca l'effetto rimbalzo: una volta terminato lo sforzo di censura, i pensieri stereotipici e il pregiudizio si riaffacciano alla mente con un'attivazione e una persistenza nettamente superiori rispetto a quelle registrate nei gruppi di controllo dove non era stato imposto alcun blocco iniziale (Macrae et al., 1994)."},{"title":"6. L'Appartenenza Politica come Lente di Giudizio","content":"L'orientamento politico ed ideologico agisce come un potente filtro nell'attribuzione causale dei fenomeni sociali (povertà, disoccupazione, criminalità), determinando il modo in cui il pregiudizio viene giustificato o soppresso:\n\nI Conservatori (Destra): tendono a biasimare e colpevolizzare i poveri e le minoranze svantaggiate, attribuendo le cause della loro condizione a fattori personali e controllabili (mancanza di intelligenza, scarsa motivazione, bassi standard morali). Di conseguenza, si oppongono all'aumento della spesa pubblica e ai programmi di assistenza sociale.\n\nI Democratici (Sinistra): tendono a considerare le minoranze come vittime di pratiche e sistemi sociali ingiusti (cause situazionali ed esterne). Sono favorevoli all'intervento statale e ai sussidi pubblici, mostrandosi più propensi a finanziare aiuti (es. interventi sanitari o ammortizzatori sociali) per chi ha perso il lavoro.\n\nSintesi delle differenze attribuzionali: Le ricerche transnazionali (tra cui lo studio italiano di Arcuri e Boca, 1996) confermano che le persone che si collocano a destra o adottano valori conservatori manifestano livelli di pregiudizio significativamente più elevati e manifesti verso gli immigrati e le minoranze rispetto alla controparte di sinistra, utilizzando spiegazioni individuali per legittimare le disuguaglianze.\n\nEcco il riassunto strutturato delle ultime tre pagine del capitolo, incentrato sulle ipotesi psicosociali che spiegano il legame tra orientamento politico, attribuzione causale e giudizio sociale (ridotto a circa il 25% del testo originale)."},{"title":"6.1 L'Orientamento Politico e il Giudizio Sociale: I Modelli Teorici","content":"In letteratura, il modo in cui l'appartenenza a uno schieramento politico modella la percezione e il giudizio sociale viene spiegato attraverso tre ipotesi principali, che si muovono lungo il continuum tra fattori di personalità stabili e influenze del contesto."},{"title":"1. L'Ipotesi Disposizionale (Dispositional Hypothesis)","content":"Questa prospettiva postula che l'orientamento politico e i fenomeni di pregiudizio a esso connessi siano il riflesso delle prime esperienze infantili, delle dinamiche familiari e di disposizioni di personalità stabili.\n\nLe matrici educative: la destra e la sinistra politica sarebbero collegate a precisi modelli familiari:\n\nL'orientamento di destra si sviluppa in contesti educativi di tipo autoritario-paternalistico.\n\nL'orientamento di sinistra si sviluppa all'interno di modelli di stampo educativo-egalitario.\n\nLa teoria degli script ideoaffettivi (Tomkins, 1963): sostiene che le disposizioni psicologiche di base plasmino sia la percezione del mondo sia l'attrazione verso una specifica ideologia. Gli individui di matrice umanista (sinistra) vedono l'umanità come fondamentalmente buona, mentre i normativisti (destra) la considerano intrinsecamente cattiva o bisognosa di rigide regole morali e di controllo."},{"title":"2. L'Ipotesi dello Script Ideologico (Ideological Script Hypothesis)","content":"Proposta da Skitka e colleghi [2002], questa ipotesi ribalta l'approccio disposizionale, sostenendo che l'identificazione con i democratici o con i conservatori sia responsabile dell'adozione di una specifica spiegazione dei problemi sociali.\n\nLa linea di partito: l'individuo apprende e interiorizza la corrispondente \"linea guida\" del proprio schieramento politico, utilizzandola come un pacchetto interpretativo predefinito (post hoc) per giustificare le posizioni del partito di riferimento di fronte a questioni come la criminalità o la povertà.\n\nLe evidenze empiriche: Zaller [1992] ha mostrato come le opinioni delle masse tendano a seguire l'élite politica dominante, registrando storicamente mutamenti e inversioni di rotta nel giudizio pubblico a seconda dei temi promossi dai leader e dai mass media nel dibattito politico ed elettorale."},{"title":"3. L'Ipotesi della Correzione Motivata (Motivated Correction Hypothesis)","content":"Questo recente filone di studi si propone come un modello integrativo che unisce e supera le due prospettive precedenti. L'ipotesi presuppone che sia i democratici sia i conservatori siano ugualmente inclini, in un primo stadio automatico, a formulare attribuzioni di tipo disposizionale (colpevolizzare l'individuo). La differenza tra i due schieramenti risiede esclusivamente nella fase secondaria di controllo e correzione cognitiva.\n\nIl processo si articola in due stadi sequenziali di elaborazione delle informazioni:\n\n                  [EVENTO SOCIALE: Povertà o Devianza]\n\n                                   │\n\n                                   ▼\n\nSTADIO PRIMARIO (Inconscio, automatico, biologico)\n\n        ↳ Attribuzione di responsabilità causale PERSONALE (Disposizionale).\n\n                                   │\n\n                                   ▼\n\nSTADIO SECONDARIO (Consapevole, mediato dai valori)\n\n        ↳ Interviene la motivazione a correggere la prima attribuzione.\n\n                 │                                   │\n\n                 ▼                                   ▼\n\n       [RICEVENTE DI SINISTRA]             [RICEVENTE DI DESTRA]\n\n   La spinta valoriale egalitaria       I valori conservatori ritengono\n\n   corregge il giudizio introducendo    la prima attribuzione corretta,\n\n   i parametri contestuali e sociali    validando la colpa personale\n\n   (es. mancanza di opportunità).       (es. pigrizia, scarso impegno).\n\nPrimo stadio (Automatico): di fronte a un evento (es. un reato o una condizione di indigenza), il sistema cognitivo di qualunque individuo effettua un'attribuzione automatica di responsabilità alla persona, commettendo l'errore fondamentale di attribuzione indipendente dal proprio orientamento politico.\n\nSecondo stadio (Controllato e Motivato): in base alla consapevolezza e ai propri sistemi valoriali, i soggetti decidono se correggere o meno questo giudizio iniziale in funzione dei parametri del contesto sociopolitico:\n\nI soggetti di sinistra, mossi da una spinta valoriale egalitaria, compiono uno sforzo cognitivo per effettuare un processo correttivo che introduce le cause situazionali (es. ingiustizie sociali, barriere economiche).\n\nI soggetti di destra, trovando la prima attribuzione automatica in perfetta linea con il proprio sistema ideologico e con i propri standard morali di responsabilità individuale, non attivano alcuna correzione, lasciando il giudizio focalizzato sulle colpe personali del target.\n\nLa motivated correction hypothesis si integra perfettamente con il modello di giustificazione-soppressione di Crandall ed Eshleman [2003], dimostrando che la personalità, gli script ideologici e i bisogni epistemici coesistono come forze interrelate nel determinare l'espressione finale del pregiudizio.\n\nCAP 9"},{"title":"Il conflitto","content":"Il conflitto tra gruppi nasce spesso dal bisogno degli individui di riconoscere la superiorità sociale e materiale del proprio gruppo rispetto agli altri. Due approcci spiegano questo fenomeno: la teoria del conflitto realistico e la teoria della deprivazione relativa."},{"title":"La teoria del conflitto realistico","content":"La teoria venne elaborata da Muzafer Sherif attraverso il celebre esperimento di Robbers Cave. Un gruppo di ragazzi fu diviso in due gruppi separati che, inizialmente, svilupparono forte coesione interna e identità di gruppo. Quando furono introdotte attività competitive con premi limitati, nacquero rapidamente ostilità, stereotipi negativi e aggressioni reciproche.\n\nI semplici tentativi di mettere i gruppi a contatto non ridussero il conflitto. Secondo l’ipotesi del contatto di Allport, infatti, per diminuire la tensione intergruppi servono condizioni precise:\n\ninterdipendenza reciproca per raggiungere uno scopo comune;\n\nstatus paritario tra i gruppi;\n\ninterazioni frequenti e significative;\n\nsostegno sociale favorevole alla cooperazione.\n\nSherif dimostrò che il conflitto diminuiva solo attraverso il raggiungimento di obiettivi superordinati, cioè mete importanti che potevano essere raggiunte esclusivamente tramite la collaborazione tra i gruppi. Situazioni problematiche create appositamente portarono così i ragazzi a cooperare, favorendo il superamento delle ostilità."},{"title":"Definizione della teoria","content":"La teoria del conflitto realistico sostiene che l’ostilità tra gruppi deriva dalla competizione per risorse materiali limitate e desiderate. Quando due gruppi percepiscono interessi incompatibili, si crea una relazione di interdipendenza negativa: il successo di uno viene visto come una perdita per l’altro.\n\nQuesta dinamica produce:\n\naumento di stereotipi e pregiudizi;\n\npercezione omogenea del gruppo esterno (effetto di omogeneità dell’outgroup);\n\ncrescita dell’ostilità e dei comportamenti discriminatori;\n\npossibile disumanizzazione del gruppo rivale.\n\nGli studi successivi confermarono che la competizione aumenta atteggiamenti negativi verso l’altro gruppo, mentre la cooperazione per obiettivi condivisi riduce il conflitto e favorisce relazioni positive."},{"title":"La teoria dell’identità sociale","content":"La teoria dell’identità sociale di Tajfel e Turner sostiene che il conflitto tra gruppi non nasce solo dalla competizione per risorse, ma anche da normali processi cognitivi e motivazionali. Gli individui tendono infatti a preferire il proprio gruppo (ingroup) e a valutare meno positivamente i gruppi esterni (outgroup) anche in assenza di veri interessi contrapposti.\n\nPer studiare questo fenomeno, Tajfel elaborò il paradigma dei gruppi minimi: persone divise casualmente in gruppi senza storia comune, regole o interazioni dirette mostravano comunque la tendenza a favorire il proprio gruppo nella distribuzione di ricompense. I partecipanti arrivavano persino a sacrificare un vantaggio maggiore pur di garantire al proprio gruppo una posizione relativamente migliore rispetto all’altro.\n\nQuesti risultati dimostrano il bias a favore dell’ingroup, cioè la tendenza a valorizzare il gruppo di appartenenza e a discriminare l’outgroup. Tale meccanismo contribuisce alla nascita di pregiudizi, ostilità e conflitti intergruppi.\n\nSecondo Tajfel e Turner, ciò dipende dall’identità sociale, ossia dagli aspetti del concetto di sé derivanti dall’appartenenza a gruppi sociali. Poiché le persone desiderano mantenere un’immagine positiva di sé, cercano di vedere il proprio gruppo in modo favorevole attraverso confronti sociali vantaggiosi. Il successo dell’ingroup viene quindi vissuto come un successo personale, mentre i fallimenti del gruppo possono essere percepiti come sconfitte individuali.\n\nLa teoria evidenzia anche il ruolo della categorizzazione sociale, processo cognitivo che accentua le differenze tra ingroup e outgroup e riduce le differenze interne ai gruppi. Questo facilita stereotipi e discriminazioni.\n\nUn fenomeno collegato è il black sheep effect (“effetto pecora nera”): i membri dell’ingroup che si comportano in modo negativo vengono giudicati molto severamente perché rischiano di danneggiare l’immagine del gruppo stesso.\n\nInfine, la teoria sottolinea che le persone possono cercare di migliorare la propria identità sociale attraverso la mobilità sociale, cioè passando a gruppi percepiti come di status superiore, quando i confini tra gruppi sono permeabili."},{"title":"La teoria della deprivazione relativa","content":"La teoria della deprivazione relativa sostiene che il conflitto nasce dal confronto con un gruppo esterno percepito come migliore o più privilegiato. Questo confronto produce una sensazione di insoddisfazione rispetto alla propria condizione, chiamata deprivazione relativa.\n\nPerché questo stato si sviluppi, devono essere presenti alcune condizioni:\n\nil gruppo esterno deve essere simile al proprio gruppo;\n\nil gruppo esterno deve possedere caratteristiche desiderate, come ricchezza o prestigio;\n\ntali vantaggi devono essere percepiti come meritati anche dal proprio gruppo;\n\nla mancanza di queste caratteristiche deve essere attribuita a fattori esterni più che a colpe interne.\n\nLa teoria distingue due forme di deprivazione:\n\ndeprivazione egoistica, quando il confronto avviene con membri del proprio gruppo;\n\ndeprivazione fraterna, quando il confronto riguarda un gruppo esterno.\n\nLe ricerche mostrano che soprattutto la deprivazione fraterna favorisce atteggiamenti negativi, pregiudizi e discriminazioni verso l’outgroup. Anche gruppi socialmente privilegiati possono sviluppare sentimenti di deprivazione relativa se percepiscono minacciata la propria posizione.\n\nTuttavia, la teoria non spiega completamente perché alcuni gruppi svantaggiati non reagiscano con proteste o conflitti. Una possibile spiegazione è la mancanza di autoefficacia collettiva, cioè la convinzione che il gruppo non sia capace di cambiare la situazione. In altri casi, fattori culturali o religiosi possono favorire l’accettazione passiva delle difficoltà."},{"title":"Intensificazione del conflitto","content":"Il conflitto può aggravarsi attraverso la polarizzazione di gruppo, fenomeno per cui le discussioni interne rendono le opinioni del gruppo sempre più estreme. Questo avviene per due motivi principali:\n\nogni membro aggiunge nuove argomentazioni che rafforzano la posizione comune;\n\nle persone tendono ad adeguarsi alla norma del gruppo per evitare esclusione o isolamento.\n\nLa polarizzazione può verificarsi anche nei social network e nelle discussioni online, dove il confronto con persone che condividono le stesse idee radicalizza ulteriormente le opinioni.\n\nUn altro elemento che alimenta il conflitto è la scarsa comunicazione tra i gruppi, spesso caratterizzata da minacce e sfiducia reciproca. In questo clima agisce la norma della reciprocità, secondo cui gli attacchi ricevuti devono essere restituiti: ciò può generare una spirale crescente di ostilità e vendetta."},{"title":"4. Soluzione del conflitto","content":"Gli psicologi sociali cercano strategie per ridurre:\n\npregiudizi\n\nostilità\n\nconflitti intergruppi\n\nLa base teorica principale è l’ipotesi del contatto di Allport (1954):\n\nil contatto tra membri di gruppi contrapposti, in condizioni adeguate, può diminuire ostilità e stereotipi.\n\nDa questa idea derivano tre strategie principali."},{"title":"Idea centrale","content":"Nel conflitto intergruppi la categoria sociale (“noi” vs “loro”) è molto saliente.\n\nLa decategorizzazione cerca quindi di:\n\nrendere meno importante l’appartenenza al gruppo\n\nvedere l’altro come individuo singolo\n\nfavorire rapporti personali\n\nIn pratica:\n\nnon “un arabo”, “un ebreo”, “uno straniero”\n\nma “Marco”, “Ahmed”, “Giulia”"},{"title":"Effetto","content":"Quando nasce un rapporto personale:\n\ngli stereotipi si indeboliscono\n\ndiminuisce il pregiudizio\n\ncala la discriminazione\n\nPerché?\nPerché la persona reale spesso contraddice lo stereotipo del gruppo."},{"title":"Studio di Levy e Guttlan (1976)","content":"Studiarono studenti ebrei e arabi a Gerusalemme.\n\nRisultato:\n\nchi aveva avuto molti contatti personali con arabi mostrava meno ostilità\n\nchi non aveva avuto contatti mostrava maggiore avversione\n\nConclusione:\n\nil contatto interpersonale riduce il conflitto."},{"title":"Studio di Bettencourt et al. (1992)","content":"Esperimento sui gruppi minimi.\n\nDue condizioni:"},{"title":"1. Interazione personale","content":"I membri dei gruppi parlavano tra loro come persone.\n\nRisultato:\n\nmeno favoritismo verso l’ingroup\n\nmeno discriminazione"},{"title":"2. Salienza categoriale","content":"I soggetti si concentravano solo sul gruppo.\n\nRisultato:\n\npiù divisione\n\npiù favoritismo interno\n\nConclusione:\n\nabbattere i confini categoriali crea un clima più disteso."},{"title":"Idea centrale","content":"Secondo Gaertner:\neliminare le categorie non basta.\n\nBisogna creare:"},{"title":"una categoria comune superiore","content":"Esempio:\n\nnon più “noi italiani” vs “loro francesi”\n\nma “noi europei”\n\nQuesta teoria è chiamata:"},{"title":"Obiettivo","content":"Trasformare:\n\n“loro”\nin\n\n“noi”\n\nCosì i membri dell’outgroup vengono percepiti come parte dello stesso gruppo."},{"title":"Esperimento di Gaertner et al. (1989)","content":"I partecipanti venivano divisi in gruppi.\n\nTre condizioni:"},{"title":"1. Condizione “gruppo unico”","content":"I membri dei due gruppi:\n\nsedevano mescolati\n\ncreavano un nome comune\n\nlavoravano insieme\n\nRisultato:\n\nminore ostilità\n\nmaggiore cooperazione"},{"title":"2. Condizione “due gruppi”","content":"Le differenze tra gruppi venivano rese evidenti:\n\ngruppi separati\n\nnomi distinti\n\ncompetizione\n\nRisultato:\n\nmaggiore conflitto"},{"title":"3. Condizione “individuale”","content":"Ogni persona lavorava singolarmente.\n\nRisultato:\n\nriduzione parziale delle dinamiche di gruppo"},{"title":"Decategorizzazione","content":"Riduce l’importanza delle categorie:\n\n“non siamo gruppi, siamo individui”"},{"title":"Ricategorizzazione","content":"Mantiene le categorie ma le ingloba:\n\n“siamo tutti parte dello stesso gruppo più grande”"},{"title":"Decategorizzazione","content":"contatto personale\n\nindividuo > gruppo\n\nriduzione stereotipi\n\nrelazioni interpersonali"},{"title":"Ricategorizzazione","content":"identità comune\n\nsupergruppo\n\ntrasformare “loro” in “noi”\n\ncooperazione intergruppi"},{"title":"Collegamento con ciò che hai studiato prima","content":"Queste strategie servono a contrastare:\n\npregiudizio\n\ndiscriminazione\n\npolarizzazione\n\nostilità intergruppi\n\nconflitto sociale\n\nSono quindi la risposta pratica ai problemi spiegati nella:\n\nteoria dell’identità sociale\n\nteoria della deprivazione relativa\n\npolarizzazione di gruppo."},{"title":"1. La Ricategorizzazione e le Rappresentazioni Categoriali","content":"I dati raccolti da Gaertner, Dovidio e altri studiosi dimostrano che lo sviluppo di atteggiamenti positivi intergruppi dipende dal cambiamento delle rappresentazioni categoriali, piuttosto che dalle semplici dinamiche di interazione. Attraverso la manipolazione sperimentale è possibile ridisegnare i confini delle categorie originarie, variando il livello di favoritismo verso l'ingroup:\n\nCondizione «due gruppi»: genera un marcato pregiudizio negativo nei confronti dei membri del gruppo esterno (outgroup).\n\nCondizione «gruppo unico»: riduce il favoritismo poiché aumenta l'attrazione verso i membri del gruppo esterno, portando a giudicare in egual modo (collaborativi, onesti, gradevoli) i componenti di entrambi gli schieramenti.\n\nCondizione «individuale»: azzera l'antagonismo ponendo l'accento sulle singole individualità anziché sulle appartenenze, determinando una diminuzione del grado di attrazione precedentemente suscitato dai membri dell'ingroup."},{"title":"2. Gli Obiettivi Superordinati e le loro Condizioni","content":"L'introduzione di un modello basato sulla cooperazione per il raggiungimento di un obiettivo superordinato costringe a ridisegnare i confini categoriali. Tuttavia, per sanare stabilmente un conflitto intergruppi (come nello storico studio del campo estivo di Robbers Cave), questa strategia richiede requisiti precisi:\n\nRipetitività nel tempo: i membri delle opposte fazioni devono cooperare ripetutamente in una serie di compiti; un singolo episodio isolato non basta a scardinare pregiudizi radicati.\n\nStato sociale paritetico: i due gruppi devono possedere uno status di pari livello. Se un gruppo riveste cariche di potere e l'altro ruoli di scarso prestigio, la cooperazione rischia di esacerbare le credenze negative preesistenti.\n\nSostegno istituzionale e normativo: la cooperazione deve essere supportata dalle istituzioni e dalle norme sociali (es. interventi congiunti di leader politici o dirigenti scolastici)."},{"title":"3. Applicazioni Pratiche: La Tecnica Didattica del Puzzle","content":"Una delle più celebri applicazioni degli obiettivi superordinati in ambito scolastico è la tecnica didattica del puzzle (Jigsaw Classroom), volta a ridurre l'antagonismo tra compagni di classe di etnie e razze differenti, migliorando l'autostima e riducendo gli stereotipi."},{"title":"Funzionamento del metodo","content":"Gli alunni vengono suddivisi in gruppi di sei persone, integrando diversi gruppi etnici e differenti livelli di rendimento scolastico.\n\nLa lezione del giorno viene divisa in sei parti; ogni studente riceve un'unica parte indipendente, che deve imparare e insegnare agli altri componenti del proprio gruppo.\n\nPoiché il contenuto globale è ignoto, ciascuno studente dipende strettamente dal materiale assegnato al resto del gruppo, costringendo a un'interazione profonda in cui chi è più abile impara a incoraggiare chi si trova in difficoltà.\n\nAgendo in condizioni di interdipendenza positiva, l'ambiente si trasforma in un clima di tolleranza reciproca. Inoltre, ogni componente dell'outgroup viene considerato un membro tipico della propria categoria: di conseguenza, l'eventuale cambiamento di atteggiamento positivo nei suoi confronti si generalizza automaticamente a tutto il gruppo esterno di appartenenza."},{"title":"4. L'Assunzione della Prospettiva (Perspective-Taking)","content":"Assumere la prospettiva altrui significa prendere in considerazione la situazione dal punto di vista di un'altra persona. Negli esperimenti di Galinsky e Moskowitz [2000], questa sovrapposizione cognitiva produce due effetti cruciali:\n\nEquiparazione dei giudizi: stimola una valutazione più positiva del membro dell'outgroup, le cui qualità positive vengono equiparate a quelle attribuite al proprio ingroup. Ciò avviene grazie alla creazione di una rappresentazione mentale dell'outgroup che si sovrappone a quella destinata a sé stessi.\n\nAnnullamento dell'effetto rimbalzo: a differenza dei compiti di pura soppressione intenzionale dello stereotipo, i soggetti che assumono la prospettiva del target mostrano una minore accessibilità spontanea ai contenuti stereotipici, bloccando l'innesco automatico dei biases.\n\nI fattori cardine che favoriscono questo processo psicologico sono la similarità percepita e l'abilità individuale di mettersi nei panni degli altri."},{"title":"5. Quale Strategia Adottare?","content":"Nella risoluzione dei conflitti intergruppi non esiste una \"strategia regina\" universale. L'approccio più efficace consiste nel combinare i presupposti teorici dei diversi modelli, manipolando sistematicamente le condizioni di contatto nei laboratori e sul campo. In ogni caso, il punto di partenza fondamentale risiede nello stabilire, fin dal primo impatto, delle relazioni di segno positivo tra i singoli individui, la cui piacevolezza iniziale favorisce il successo delle successive strategie di interdipendenza."},{"title":"5.1 Fasi per l'Integrazione e la Generalizzazione del Contatto","content":"Il testo descrive la sequenza ottimale per combinare le strategie di riduzione del conflitto, muovendosi dall'interazione individuale a quella di gruppo:\n\nFase Iniziale (Relazione Interpersonale): Stabilire contatti positivi sganciati dalle appartenenze categoriali serve a generare un'atmosfera rilassata e improntata all'apertura verso l'altro.\n\nFase Intermedia (Cooperazione): Al fine di accrescere le interazioni e la reciproca fiducia, si fanno cooperare i membri dei due gruppi originari per il raggiungimento di una meta comune. I soggetti vengono accomunati dal desiderio di conseguire un obiettivo importante per tutti, sentendosi parte di un'unica entità sovraordinata.\n\nFase Finale (Salienza Categoriale): Il passo conclusivo consiste nel rendere nuovamente saliente, seppur in maniera minima, l'appartenenza di gruppo dei soggetti."},{"title":"Il Vantaggio della Salienza Categoriale Finale","content":"Mantenere visibile l'appartenenza categoriale nell'ultima fase è fondamentale per la riuscita dell'intervento:\n\nRendendo saliente l'appartenenza, la condotta positiva di ciascun individuo sarà considerata come una caratteristica del gruppo a cui appartiene, e non come l'esito di un personale modo di essere. In questo modo, l'orientamento positivo sviluppato verso la singola persona potrà essere generalizzato al gruppo nell'insieme."},{"title":"Conclusioni","content":"Gli strumenti per sedare le lotte tra gruppi esistono e, sfruttando in sequenza questi piccoli accorgimenti, si incrementano le probabilità di successo finale. Poiché i conflitti difficilmente cesseranno di esistere, l'obiettivo della psicologia sociale è di vedere questi strumenti applicati sempre più spesso al di fuori dei laboratori, nei contesti reali della vita quotidiana.\n\nCAP 10"},{"title":"1. Definire il Comportamento Aggressivo","content":"In ambito psicosociale, l'aggressività è definita come il comportamento di un individuo diretto a provocare intenzionalmente un danno, fisico o psicologico, ad altri individui.\n\nRispetto all'uso quotidiano del termine, questa definizione si restringe attorno a due criteri fondamentali:\n\nLa nozione di danno: l'azione deve mirare a recare un nocumento reale.\n\nLa componente di intenzionalità: il danno deve essere deliberato. Un'azione involontaria che causa un danno non è considerata aggressione, mentre un tentativo intenzionale di colpire qualcuno descrive una condotta aggressiva anche se il danno non si realizza concretamente."},{"title":"Prospettive Teoriche sull'Origine dell'Aggressività","content":"Nella teorizzazione psicologica, le ipotesi di ricerca si dividono a seconda che l'aggressività venga intesa come un istinto, un comportamento appreso o u
