o che l’atteggiamento funzioni con uno schema bipolare che contiene rappresentazioni sia congruenti sia incongruenti rispetto a un tema.\n\nGli schemi attitudinali determinano l’elaborazione selettiva dell’informazione rilevante in maniera bipolare, facilitando la codifica e il ricordo delle informazioni coerenti con l’atteggiamento ma anche di quelle che lo contraddicono, mentre le informazioni neutre o insignificanti non vengono elaborate e quindi nemmeno adeguatamente recuperate dalla memoria.\n\nGli item di atteggiamento rispetto ai quali il soggetto si trovava d’accordo o in disaccordo venivano ricordati meglio di quelli giudicati intermedi nell’intensità di favore o sfavore espresso."},{"title":"Atteggiamenti unipolari e bipolari","content":"Anthony Pratkanis e Anthony Greenwald hanno studiato quegli atteggiamenti con struttura unipolare, ovvero atteggiamenti che presentano materiali di conferma ben strutturati in un senso ma senza particolari informazioni nell’altro senso.\n\nGli atteggiamenti di tipo unipolare riguardano quei temi che generalmente non creano alternative tanto diverse e non generano forti conflitti, come ad esempio lo sport o la musica.\n\nGli atteggiamenti bipolari invece sottendono tematiche più importanti, delicate e controverse.\n\nNegli atteggiamenti con forte struttura unipolare è evidente una forte correlazione positiva tra grado di favore dell’atteggiamento e numero di notizie avute e ricordate sugli argomenti presentati.\n\nSe il soggetto ha un atteggiamento positivo verso un argomento sarà più facile per lui immagazzinare informazioni a riguardo.\n\nNella struttura bipolare invece sia i soggetti favorevoli sia quelli contrari hanno tante informazioni su un determinato argomento e ricordano bene le informazioni coerenti con l’atteggiamento ma anche quelle che lo contraddicono."},{"title":"La funzione egodifensiva","content":"La funzione egodifensiva corrisponde al concetto di meccanismo di difesa che opera per proteggere l’individuo da conflitti interni o da verità spiacevoli.\n\nGli atteggiamenti possono adempiere a questa funzione proteggendo il soggetto dai sentimenti negativi rivolti a sé, consentendogli ad esempio di proiettare questi sentimenti su altre persone.\n\nL’atteggiamento, in questo senso, serve a ridurre l’ansia che insorge quando l’Io si sente minacciato da qualche pericolo.\n\nSecondo Katz, gli atteggiamenti di discriminazione di tipo etnico, religioso o nei confronti degli omosessuali rappresentano atteggiamenti egodifensivi prodotti da conflitti interni alla persona."},{"title":"La funzione di espressione dei valori","content":"Attraverso gli atteggiamenti le persone mettono in luce il loro vero sé.\n\nPer fare un esempio della funzione di espressione dei valori degli atteggiamenti, pensiamo a quanto potrebbe essere rilevante esprimere il disaccordo nei confronti delle centrali nucleari per gli ecologisti profondamente convinti del valore delle potenzialità delle fonti di energia alternative e rinnovabili."},{"title":"La funzione strumentale","content":"La funzione strumentale, direttamente sociale, contraddistingue gli atteggiamenti che consentono alle persone di raggiungere particolari obiettivi ed evitare risultati spiacevoli."},{"title":"La relazione tra atteggiamenti e comportamento","content":"Generalmente ciò che pensiamo influenza il nostro agire, ma non sempre il legame tra atteggiamento e comportamento è semplice e lineare.\n\nIn base al contesto sociale in cui ci troviamo, il comportamento può essere diverso dall’atteggiamento che abbiamo verso qualcosa.\n\nSi è trovata una debolezza degli atteggiamenti nel proporsi come predittori del comportamento, ma in realtà la questione è mal posta: anziché chiederci se gli atteggiamenti predicono il comportamento, dobbiamo realizzare quali sono i casi in cui è possibile riscontrare una buona correlazione tra atteggiamento e comportamento e soprattutto cosa modifica il valore di tale correlazione.\n\nMartin Fishbein e Icek Ajzen fanno notare come ci sia generalmente una differenza nel livello di generalità/specificità tra le misure di atteggiamento e comportamento.\n\nSpesso il comportamento che si vuole prevedere è altamente specifico, ma le condizioni da cui lo vogliamo prevedere sono altamente generiche.\n\nQuindi dobbiamo vedere le cose in un’ottica in cui:\n\nun comportamento specifico deve essere previsto in base a un atteggiamento specifico;\n\nun comportamento generale sarà predetto da un atteggiamento generale.\n\nGli stessi Fishbein e Ajzen hanno suggerito che le misure degli atteggiamenti e dei comportamenti debbano articolarsi in relazione a quattro dimensioni fondamentali:\n\nazione;\n\nbersaglio;\n\ncontesto;\n\ntempo."},{"title":"Azione","content":"Si riferisce al comportamento messo in atto che si vuole prevedere."},{"title":"Bersaglio","content":"Si riferisce al target del comportamento."},{"title":"Contesto","content":"È relativo all’occasione precisa in cui il comportamento viene messo in atto."},{"title":"Tempo","content":"Indica l’arco temporale durante il quale il comportamento viene messo in atto.\n\nSe vogliamo comprendere quanto un atteggiamento sia in grado di prevedere un comportamento, dobbiamo partire dall’analisi delle valutazioni specifiche che un individuo dà delle azioni che stiamo cercando di prevedere.\n\nAd esempio, quando chiediamo a qualcuno di esprimere una preferenza riguardo a un suo probabile comportamento, questa dichiarazione ha tanto più valore quanto più è sollecitata in riferimento a un comportamento specifico, in un particolare momento e in un determinato contesto.\n\nVia via che l’atteggiamento che viene misurato diventa più specifico, il comportamento della persona diventa più prevedibile.\n\nSeguendo lo stesso principio si può aumentare la correlazione tra atteggiamento e comportamento costruendo indici comportamentali che inglobano azioni più ampie.\n\nIn alcune circostanze gli atteggiamenti influenzano i comportamenti solo dopo una valutazione approfondita; in altre, invece, gli atteggiamenti avviano sequenze di azioni in maniera totalmente diretta, senza l’intervento del pensiero consapevole.\n\nDobbiamo quindi distinguere tra:\n\ncomportamento volontario e pianificato;\n\ncomportamento spontaneo e automatico."},{"title":"Intenzioni e comportamento","content":"Le dichiarazioni che possono essere ritenute predittori validi per un comportamento successivo sono le dichiarazioni di intenzioni comportamentali in circostanze specifiche.\n\nLe intenzioni fanno sì che inclinazioni e preferenze si trasformino in scelte.\n\nLa teoria più influente è la teoria dell’azione ragionata di Fishbein e Ajzen, che ipotizza che il comportamento sia determinato direttamente dall’intenzione di eseguirlo e quindi, per prevederlo, occorre considerare l’intenzione di agire in un certo modo.\n\nCiò che ci si propone di fare è la determinante principale di ciò che si fa.\n\nAffinché l’intenzione sia un predittore affidabile dobbiamo conoscere le varie determinanti.\n\nSecondo lo stesso modello, le principali determinanti dell’intenzione comportamentale sono:\n\nl’atteggiamento verso il comportamento, cioè una valutazione personale;\n\nla norma soggettiva, cioè le credenze su come gli altri giudicano quel comportamento.\n\nInfatti le preferenze espresse non sono sufficienti ad afferrare quello che una persona ha intenzione di fare.\n\nNella scelta di mettere in atto un comportamento pesa anche ciò che immaginiamo possa essere gradito alle persone a noi vicine e la percezione che maturiamo di come possa essere giudicato un nostro comportamento da persone che riteniamo di dover compiacere.\n\nLa norma soggettiva è dunque una pressione sociale percepita a eseguire o meno il comportamento.\n\nLa teoria dell’azione ragionata è stata applicata con risultati positivi a contesti in cui le azioni messe in atto sono sotto il controllo volitivo dell’individuo.\n\nQuesto avviene per la maggior parte dei nostri comportamenti, che sono di facile esecuzione e il cui esito dipende interamente dalla volontà.\n\nNel mettere in atto azioni dall’esito più incerto, invece, le persone possono scontrarsi con impedimenti e difficoltà difficilmente ponderabili, con interferenze di forze esterne: quindi il volere può non essere sufficiente."},{"title":"La teoria del comportamento pianificato","content":"Secondo Icek Ajzen, la maggior parte dei comportamenti dipende dalla volontà dell’individuo. Tuttavia, nei comportamenti complessi o dall’esito incerto, la sola volontà può non bastare perché intervengono ostacoli esterni e difficoltà imprevedibili.\n\nPer spiegare meglio questi casi, Ajzen amplia la teoria dell’azione ragionata formulando la teoria del comportamento pianificato.\nAggiunge il concetto di controllo comportamentale percepito, cioè la convinzione di una persona riguardo alla facilità o difficoltà di eseguire un comportamento.\n\nQuesto concetto è vicino all’idea di autoefficacia di Albert Bandura: la fiducia di essere capaci di portare a termine con successo un compito.\n\nL’assunto fondamentale è che una persona sviluppi l’intenzione di agire soprattutto quando ritiene di poter riuscire nell’azione. Al contrario, se percepisce di non avere capacità sufficienti o di incontrare ostacoli esterni, sarà meno propensa ad agire.\n\nIl controllo comportamentale percepito è stato studiato soprattutto nell’ambito della salute: molte persone non seguono diete, esercizio fisico o abitudini salutari perché pensano di non riuscire a mantenere tali comportamenti; allo stesso modo, comportamenti dannosi come fumo o abuso di alcol possono continuare per la percezione di non saper resistere alle tentazioni."},{"title":"La teoria del provare","content":"Richard Bagozzi e Paul Warshaw sviluppano la teoria del provare, che analizza i comportamenti orientati al raggiungimento di uno scopo.\n\nIn questa teoria, il comportamento viene sostituito dal concetto di provare, cioè lo sforzo concreto messo in atto per raggiungere un obiettivo.\nL’elemento centrale non è solo l’intenzione, ma il tentativo reale di raggiungere lo scopo.\n\nSecondo il modello:\n\nil provare dipende dall’intenzione di provare;\n\nl’intenzione di provare è influenzata da:\n\natteggiamento verso il successo;\n\natteggiamento verso il fallimento;\n\natteggiamento verso il processo;\n\nnorma sociale.\n\nGli atteggiamenti verso successo e fallimento producono effetti concreti solo se accompagnati da aspettative realistiche di successo o da basse probabilità percepite di fallimento."},{"title":"Il ruolo del comportamento passato","content":"La teoria del provare considera anche gli effetti del comportamento passato, in particolare:\n\nfrequenza passata del comportamento;\n\nrecenza passata, cioè quanto recentemente il comportamento è stato eseguito.\n\nLa frequenza passata può influenzare sia l’intenzione di provare sia il comportamento stesso, soprattutto quando le intenzioni future non sono ancora chiare. In questi casi, le persone tendono a prevedere il proprio comportamento basandosi sulle abitudini precedenti.\n\nIn sintesi, il modello mostra che il comportamento non dipende soltanto dalle intenzioni, ma anche dalla percezione delle proprie capacità, dallo sforzo messo in atto e dalle esperienze passate."},{"title":"3. L’accessibilità dell’atteggiamento","content":"Il modello MODE (Motivation and Opportunity as Determinants), elaborato da Russell Fazio, spiega come gli atteggiamenti influenzino il comportamento concentrandosi sull’attivazione automatica degli atteggiamenti in memoria.\n\nL’atteggiamento viene concepito come un’associazione presente in memoria tra un oggetto e la valutazione che una persona ne dà.\nAffinché un atteggiamento influenzi percezioni, giudizi e comportamenti, deve prima essere attivato in memoria.\n\nL’accessibilità dell’atteggiamento è definita come la forza dell’associazione tra oggetto e valutazione. Quanto più questa associazione è forte, tanto più rapidamente l’atteggiamento viene recuperato dalla memoria e tanto più influenza pensieri e comportamenti.\n\nUn atteggiamento è quindi altamente accessibile quando può essere richiamato automaticamente e senza sforzo alla comparsa dell’oggetto a cui si riferisce. La velocità con cui una persona esprime una valutazione viene infatti utilizzata per misurare il livello di accessibilità."},{"title":"Atteggiamenti forti e deboli","content":"Gli atteggiamenti non sono tutti uguali:\n\ngli atteggiamenti forti derivano da una forte associazione tra oggetto e valutazione e si attivano automaticamente;\n\ngli atteggiamenti deboli richiedono invece un recupero più controllato e intenzionale;\n\nil non atteggiamento indica l’assenza di una valutazione depositata in memoria.\n\nGli atteggiamenti accessibili hanno diverse conseguenze pratiche:\n\nguidano maggiormente la percezione dell’oggetto;\n\nfavoriscono giudizi coerenti con le informazioni già possedute;\n\nresistono meglio alle contraddizioni;\n\nrisultano più stabili e duraturi;\n\ninfluenzano il comportamento in modo più coerente."},{"title":"Il modello MODE","content":"Il modello MODE sostiene l’esistenza di due percorsi che collegano atteggiamenti e comportamento:\n\nun percorso volontario e intenzionale;\n\nun percorso spontaneo e automatico.\n\nNel percorso volontario l’individuo riflette consapevolmente sui costi e benefici dell’azione, valuta le conseguenze e costruisce intenzioni comportamentali. Questo processo richiede sforzo cognitivo ed è tipico dei modelli dell’azione ragionata e del comportamento pianificato.\n\nPerché avvenga questo tipo di elaborazione sono necessarie:\n\nmotivazione, cioè la volontà di riflettere accuratamente;\n\nopportunità, ossia la presenza di tempo e risorse cognitive sufficienti.\n\nFazio collega la motivazione soprattutto al timore dell’errore, cioè al desiderio di evitare conclusioni sbagliate o conseguenze negative. Questo comprende anche la necessità di non apparire guidati da pregiudizi o di adattarsi correttamente al contesto sociale.\n\nNel percorso spontaneo, invece, gli atteggiamenti guidano direttamente il comportamento senza riflessione consapevole. In questo caso l’azione deriva dall’attivazione automatica dell’atteggiamento accessibile in memoria."},{"title":"Frequenza e recenza del comportamento passato","content":"La teoria del provare considera importante anche il ruolo del comportamento passato.\n\nLa frequenza passata di un comportamento può diventare un forte predittore delle azioni future, soprattutto quando le intenzioni dell’individuo non sono ancora chiare. In queste situazioni le persone tendono a basarsi sulle proprie abitudini precedenti.\n\nAnche la recenza del comportamento passato influisce sui giudizi e sulle aspettative future. Gli eventi recenti sono infatti più facilmente ricordati e possono essere sovrastimati nella valutazione delle probabilità di successo.\n\nQuesto fenomeno è collegato a due bias cognitivi:\n\neuristica della disponibilità, per cui si giudica più probabile ciò che viene ricordato più facilmente;\n\neuristica dell’ancoraggio, per cui le persone formulano giudizi partendo da un punto di riferimento iniziale.\n\nLa teoria del provare amplia quindi la teoria del comportamento pianificato introducendo il ruolo dello sforzo, delle esperienze passate e dei processi cognitivi automatici.\n\nIn generale, i modelli descritti condividono l’idea dell’individuo come soggetto razionale che prende decisioni e formula intenzioni; tuttavia, le ricerche più recenti mostrano che molti processi mentali coinvolti nel comportamento sociale avvengono anche in modo automatico e fuori dalla consapevolezza."},{"title":"1. Elaborazione spontanea","content":"Nel processo di elaborazione spontanea gli atteggiamenti vengono attivati automaticamente, senza sforzo cognitivo e senza riflessione consapevole. In questo caso l’accessibilità dell’atteggiamento diventa fondamentale."},{"title":"Idea centrale","content":"Più un atteggiamento è accessibile in memoria:\n\npiù facilmente viene attivato automaticamente;\n\npiù influenza il comportamento spontaneo;\n\npiù permette di prevedere il comportamento reale.\n\nSecondo Fazio, gli atteggiamenti altamente accessibili guidano il comportamento in modo diretto e immediato."},{"title":"2. Esempio di Freddie Mercury","content":"Se una persona ha un atteggiamento molto positivo verso Freddie Mercury:\n\nil giudizio positivo emerge immediatamente ascoltando la sua musica;\n\nemozioni e valutazioni vengono richiamate rapidamente;\n\nil comportamento sarà coerente con quell’atteggiamento.\n\nEsempio:\n\nse in macchina con un amico bisogna scegliere musica,\n\nl’atteggiamento positivo verso i Queen porta spontaneamente a scegliere un loro album,\n\nsenza una riflessione intenzionale.\n\nQuesto mostra come gli atteggiamenti accessibili influenzino direttamente le azioni quotidiane."},{"title":"3. Verifica sperimentale di Fazio e Williams (1986)","content":"Fazio e Williams studiarono il rapporto tra atteggiamenti e voto politico."},{"title":"Metodo","content":"Ai partecipanti veniva chiesto un giudizio su due candidati presidenziali.\n\nI ricercatori misuravano:\n\nil tipo di risposta;\n\nil tempo necessario per esprimerla."},{"title":"Risultato","content":"La rapidità della risposta indicava maggiore accessibilità dell’atteggiamento.\n\nDopo le elezioni:\n\nchi aveva espresso giudizi più rapidi mostrava maggiore coerenza tra atteggiamento e voto;\n\nchi impiegava più tempo mostrava minore coerenza."},{"title":"Conclusione","content":"La velocità con cui un atteggiamento viene recuperato dalla memoria è un forte predittore del comportamento."},{"title":"Differenze con i modelli aspettativa-valore","content":"I modelli aspettativa-valore sostengono che il comportamento dipenda:\n\ndalle intenzioni;\n\ndalle valutazioni razionali;\n\ndall’atteggiamento specifico verso il comportamento.\n\nIl modello MODE invece evidenzia che:\n\nspesso il comportamento nasce da processi automatici;\n\ngli atteggiamenti globali accessibili possono guidare direttamente l’azione;\n\nnon sempre avviene una riflessione deliberata."},{"title":"4. Riassunto del concetto di accessibilità","content":"L’atteggiamento è un’associazione in memoria tra:\n\nun oggetto;\n\nla sua valutazione.\n\nQuanto più questa associazione è forte:\n\ntanto più l’atteggiamento è accessibile;\n\ntanto più viene attivato automaticamente;\n\ntanto più influenza il comportamento.\n\nSolo gli atteggiamenti facilmente accessibili riescono a guidare il comportamento spontaneo."},{"title":"5. Quali atteggiamenti prevedono meglio il comportamento?","content":"Le ricerche mostrano che non tutti gli atteggiamenti prevedono il comportamento con la stessa efficacia."},{"title":"Atteggiamenti forti","content":"Gli atteggiamenti forti:\n\nsono stabili;\n\nsono importanti per la persona;\n\nsono collegati a convinzioni sicure;\n\nsono più accessibili;\n\ninfluenzano maggiormente il comportamento.\n\nLe incoerenze tra atteggiamento e comportamento avvengono spesso quando gli atteggiamenti sono:\n\ndeboli;\n\nambivalenti."},{"title":"Esperienza diretta","content":"Gli atteggiamenti formati tramite esperienza diretta:\n\nprevedono meglio il comportamento;\n\nsi basano su informazioni concrete;\n\ndiventano più accessibili in memoria.\n\nEsempio:\nuna persona che ha esperienza personale di un problema ambientale svilupperà atteggiamenti più forti e coerenti."},{"title":"Preparazione e conoscenza","content":"Gli atteggiamenti prevedono meglio il comportamento quando la persona:\n\nconosce bene l’argomento;\n\nha esperienza pratica;\n\nha riflettuto sul tema.\n\nEsempio:\nuna petizione contro un inceneritore sarà firmata più facilmente da persone:\n\ncontrarie all’inceneritore;\n\ninformate sulle questioni ambientali."},{"title":"Importanza personale","content":"Gli atteggiamenti legati:\n\nai valori personali;\n\nagli interessi;\n\nall’identità sociale;\nsono più forti e resistenti al cambiamento.\n\nQuesti atteggiamenti permettono di prevedere meglio il comportamento."},{"title":"6. Variabili personali: automonitoraggio","content":"L’automonitoraggio è la capacità di adattare il proprio comportamento alle situazioni sociali."},{"title":"Persone ad alto automonitoraggio","content":"modificano facilmente il comportamento;\n\nsi adattano al contesto sociale;\n\nmostrano minore coerenza tra atteggiamenti e comportamento."},{"title":"Persone a basso automonitoraggio","content":"agiscono in modo più coerente con i propri atteggiamenti;\n\ncambiano meno comportamento in base al contesto."},{"title":"Percorso volontario","content":"Quando ci sono:\n\nmotivazione;\n\ncapacità di elaborazione;\n\nl’individuo:\n\nriflette;\n\nvaluta conseguenze;\n\npianifica il comportamento.\n\n→ comportamento spiegato dalla teoria del comportamento pianificato."},{"title":"Percorso spontaneo","content":"Quando mancano:\n\nmotivazione;\n\ntempo;\n\nrisorse cognitive;\n\nil comportamento viene guidato automaticamente dagli atteggiamenti.\n\nSe gli atteggiamenti sono forti e accessibili:\n→ il comportamento sarà coerente con essi.\n\nSe gli atteggiamenti non sono accessibili:\n→ il comportamento non sarà collegato all’atteggiamento."},{"title":"Concetti chiave da ricordare","content":"Accessibilità dell’atteggiamento = facilità con cui viene richiamato dalla memoria.\n\nAtteggiamenti forti = più accessibili e più predittivi del comportamento.\n\nElaborazione spontanea = processo automatico e non intenzionale.\n\nEsperienza diretta = rende gli atteggiamenti più forti e concreti.\n\nAutomonitoraggio = capacità di adattare il comportamento al contesto sociale.\n\nModello MODE = due percorsi:\n\nvolontario/riflessivo;\n\nspontaneo/automatico."},{"title":"Automaticità e atteggiamenti impliciti","content":"La psicologia sociale moderna sostiene che molti comportamenti non derivano solo da ragionamenti coscienti, ma anche da processi automatici e spontanei.\n\nPer questo si distingue tra:\n\nAtteggiamenti espliciti → opinioni e valutazioni consapevoli e dichiarate apertamente.\n\nAtteggiamenti impliciti → valutazioni automatiche, inconsapevoli e spontanee che convivono con quelle esplicite.\n\nUna persona può quindi dichiarare consapevolmente un’opinione, ma avere allo stesso tempo associazioni automatiche differenti."},{"title":"Misurare gli atteggiamenti impliciti","content":"Le normali misure esplicite (questionari, interviste) sono influenzate da:\n\ndesiderabilità sociale,\n\nnorme culturali,\n\nvolontà di apparire coerenti o non discriminatori.\n\nLe misure implicite, invece, cercano di rilevare associazioni automatiche meno controllabili.\n\nTra le tecniche più importanti:\n\npriming affettivo\n\npriming semantico\n\nImplicit Approach Avoidance Task (IAAT)\n\nQueste tecniche si basano soprattutto sui:\n\ntempi di reazione,\n\nrapidità delle risposte,\n\nassociazioni cognitive automatiche."},{"title":"Cos’è","content":"Il priming affettivo studia come uno stimolo iniziale (prime) influenzi l’elaborazione dello stimolo successivo (target).\n\nFunziona così:\n\ncompare rapidamente uno stimolo iniziale (prime),\n\nsubito dopo appare una parola o immagine target,\n\nil soggetto deve valutarla positiva o negativa.\n\nL’idea centrale è:\n\nil prime attiva automaticamente associazioni emotive che influenzano la risposta successiva."},{"title":"Esempio","content":"Target: “morte”\n\nSe prima compare il prime “angoscia”, la risposta è più rapida perché i due stimoli sono coerenti negativamente.\n\nSe compare il prime “sorriso”, i tempi sono più lenti perché c’è incoerenza emotiva.\n\nQuesto dimostra che:\n\nil cervello attribuisce automaticamente una valenza positiva o negativa agli stimoli,\n\nil processo avviene in modo molto rapido e inconsapevole."},{"title":"Caratteristiche del processo implicito","content":"Anche se il soggetto vede il prime consciamente:\n\nnon è consapevole dell’effetto che esso produce,\n\nl’intervallo di tempo è troppo breve perché intervengano riflessioni intenzionali.\n\nQuindi:\n\nl’attivazione è automatica,\n\nspontanea,\n\nimmediata."},{"title":"RICERCHE SUGLI ATTEGGIAMENTI IMPLICITI","content":"Molte ricerche mostrano che:\n\npersone che negano esplicitamente pregiudizi\n\npossono comunque mostrare associazioni implicite negative automatiche.\n\nEsempio:\n\nvolti di persone nere possono facilitare risposte più rapide verso aggettivi negativi,\n\nvolti di persone bianche facilitano risposte verso aggettivi positivi.\n\nQuesto suggerisce l’esistenza di:\n\nun sistema esplicito e consapevole,\n\nun sistema implicito automatico."},{"title":"Atteggiamenti espliciti","content":"consapevoli,\n\ncontrollabili,\n\nlegati a riflessione e ragionamento,\n\nusati nelle risposte volontarie."},{"title":"Atteggiamenti impliciti","content":"automatici,\n\ninconsapevoli,\n\nveloci,\n\nbasati su associazioni mentali spontanee.\n\nLe tecniche implicite inizialmente servivano soprattutto per:\n\nsuperare i limiti dei questionari,\n\nevitare l’effetto della desiderabilità sociale.\n\nSuccessivamente si è capito che:\n\natteggiamenti espliciti e impliciti derivano da processi mentali diversi."},{"title":"Idea centrale","content":"Il modello APE distingue due tipi di processi mentali:"},{"title":"1. Processi associativi","content":"Base degli atteggiamenti impliciti.\n\nSono:\n\nautomatici,\n\nveloci,\n\nbasati su associazioni tra concetti.\n\nEsempio:\nvedere un gruppo sociale → attivazione immediata di emozioni o stereotipi associati."},{"title":"2. Processi proposizionali","content":"Base degli atteggiamenti espliciti.\n\nSono:\n\nriflessivi,\n\nlogici,\n\nconsapevoli,\n\nfondati sulla valutazione della verità delle informazioni.\n\nEsempio:\n“Non è giusto discriminare” → valutazione razionale e controllata."},{"title":"Idea fondamentale del modello","content":"Gli atteggiamenti impliciti ed espliciti:\n\npossono coesistere,\n\nnon sempre coincidono,\n\nderivano da sistemi cognitivi differenti.\n\nQuindi una persona può:\n\navere associazioni automatiche negative,\n\nma rifiutarle consciamente a livello razionale."},{"title":"Atteggiamenti impliciti","content":"automatici\n\ninconsapevoli\n\nrapidi\n\nassociativi"},{"title":"Misure implicite","content":"priming affettivo\n\ntempi di reazione\n\nIAAT"},{"title":"Priming affettivo","content":"il prime influenza il target\n\neffetto automatico\n\nattivazione emotiva immediata"},{"title":"Modello APE","content":"processi associativi → impliciti\n\nprocessi proposizionali → espliciti"},{"title":"Schema super sintetico","content":"ATTEGGIAMENTI\n\n├── Espliciti\n\n│   ├─ consapevoli\n\n│   ├─ controllati\n\n│   └─ razionali\n\n│\n\n└── Impliciti\n\n    ├─ automatici\n\n    ├─ inconsapevoli\n\n    ├─ rapidi\n\n    └─ associativi\n\n↓\n\nMODELLO APE\n\nAssociativo → implicito\n\nProposizionale → esplicito"},{"title":"1. Processi Associativi e Proposizionali (Modello APE)","content":"La valutazione degli atteggiamenti si basa su due tipi di processi mentali:\n\nProcessi associativi (Atteggiamenti impliciti): Sono costituiti da reazioni affettive e automatiche che si attivano quando si incontra uno stimolo pertinente. Non richiedono capacità cognitiva né intenzionalità, e si attivano a prescindere dal fatto che il soggetto consideri tale valutazione vera o falsa. L'attivazione dipende da caratteristiche di somiglianza e contiguità spazio-temporale.\n\nPattern di attivazione: Si riferisce al fatto che l'attivazione di specifiche associazioni in memoria è determinata dalla combinazione tra una struttura preesistente di associazioni e una configurazione di stimoli in input (il contesto specifico può quindi attivare pattern differenti dello stesso oggetto).\n\nProcessi proposizionali (Atteggiamenti espliciti): Derivano da un'elaborazione strategica e sono caratterizzati da giudizi valutativi basati su inferenze sillogistiche derivate da informazioni ritenute pertinenti. A differenza dei processi associativi, le proposizioni hanno bisogno di una conferma delle valutazioni e delle credenze e sono soggette a criteri di validità soggettiva (vero/falso)."},{"title":"Interazione tra i processi","content":"Il modello APE (Gawronski e Bodenhausen) evidenzia che le persone usano generalmente le reazioni affettive automatiche come base predefinita per esprimere giudizi valutativi (es. trasformando la reazione automatica nella proposizione «X mi piace»).\n\nLa validità percepita di una proposizione dipende dalla coerenza tra questa e le altre proposizioni considerate pertinenti:\n\nSe la deduzione è coerente con le altre proposizioni, viene considerata valida e serve come base per il giudizio esplicito.\n\nSe è incoerente, la valutazione implicita può essere rifiutata e considerata non valida se in contraddizione con altre informazioni ritenute valide.\n\nLe valutazioni esplicite vengono in genere misurate tramite tecniche tradizionali self-report, mentre quelle implicite tramite tecniche di misura implicita."},{"title":"2. Il Modello RIM (Riflessivo-Impulsivo)","content":"Strack e Deutsch propongono il modello riflessivo-impulsivo (RIM) per spiegare la regolazione del comportamento sociale, incentrato su due sistemi interagenti che elaborano le informazioni in modo sinergico o contrapposto:\n\nIl sistema impulsivo: È costituito da associazioni automatiche e disposizioni motivazionali che generano comportamenti in assenza di una riflessione consapevole. È un processo rapido, economico dal punto di vista cognitivo, non intenzionale e basato sull'attivazione diffusa della rete associativa. Determina gli atteggiamenti impliciti.\n\nIl sistema riflessivo: Orienta il comportamento attraverso una riflessione ponderata dei dati e delle conoscenze disponibili. È un processo lento, costoso in termini di risorse cognitive e intenzionale, l'esito di processi decisionali consapevoli. Determina gli atteggiamenti espliciti."},{"title":"Funzionamento e comportamento","content":"La percezione di un oggetto attiva immediatamente il sistema impulsivo. Se si presta maggiore attenzione allo stimolo, si può attivare anche il sistema riflessivo. Entrambi i sistemi influenzano il comportamento attivando schemi comportamentali quando l'attivazione supera una certa soglia. Se i due sistemi producono schemi discordanti, uno dei due si impone sull'altro a seconda del contesto situazionale.\n\nIn conclusione, i processi cognitivi espliciti si esprimono nell'intenzione comportamentale, ma anche l'atteggiamento implicito incide direttamente sul comportamento finale.\n\nCAPITOLO 5"},{"title":"Il Cambiamento di Atteggiamento e la Persuasione","content":"Il cambiamento di atteggiamento è lo strumento principale per influenzare il comportamento umano, modificando il modo in cui le persone agiscono. La persuasione è il processo intenzionale con cui si inducono gli altri a modificare i propri atteggiamenti, e la ricerca psicologica studia i processi cognitivi che mediano questo effetto."},{"title":"Il Paradigma dell'Elaborazione dell'Informazione (McGuire)","content":"McGuire descrive la persuasione come un processo sequenziale composto da sei fasi distinte:\n\nEsposizione al messaggio\n\nAttenzione\n\nComprensione dei contenuti\n\nAccettazione dei contenuti\n\nRitenzione del nuovo atteggiamento\n\nTraduzione dell'atteggiamento in comportamento.\n\nIn questo modello, la persuasione è legata alla ricezione e all'accettazione del messaggio. Tuttavia, gli studi successivi hanno evidenziato un limite fondamentale: non vi è una correlazione significativa tra il ricordo dei contenuti di un messaggio e il reale cambiamento di atteggiamento."},{"title":"Il Modello della Risposta Cognitiva (Greenwald)","content":"Per superare il limite di McGuire, Greenwald postula che il cambiamento di atteggiamento non dipenda dalla ricezione del messaggio, ma dalle risposte cognitive, ossia dai pensieri favorevoli, sfavorevoli o neutri che il ricevente genera spontaneamente quando ascolta una comunicazione persuasiva.\n\nMessaggi con pensieri prevalentemente favorevoli determinano un cambiamento nella direzione suggerita dal messaggio.\n\nMessaggi con pensieri prevalentemente sfavorevoli determinano un cambiamento in direzione opposta.\n\nQuesto modello spiega perché non serve ricordare i dettagli di un messaggio per essere persuasi: ciò che conta è l'impatto dei pensieri personali stimolati dal messaggio stesso. Per misurare tali risposte, i ricercatori utilizzano la tecnica dell'elenco dei pensieri."},{"title":"Il Ruolo della Distrazione","content":"Secondo questo modello, la distrazione riduce la capacità di produrre risposte cognitive, generando due effetti opposti:\n\nIndebolisce la persuasione se il messaggio avrebbe originariamente prodotto pensieri favorevoli (perché ne ostacola la generazione).\n\nRinforza la persuasione se il messaggio avrebbe prodotto pensieri sfavorevoli o contro-argomentazioni (poiché impedisce al soggetto di criticare il messaggio)."},{"title":"2. I Modelli Duali di Cambiamento di Atteggiamento","content":"Le teorie più recenti, come il Modello della Probabilità dell'Elaborazione (ELM) di Petty e Cacioppo e il modello euristico-sistematico di Chaiken, integrano i modelli precedenti. Questi presuppongono che un'elaborazione approfondita dei contenuti avvenga solo in presenza di due condizioni: motivazione ad elaborare e risorse cognitive sufficienti.\n\nIn particolare, l'ELM sostiene che il cambiamento di atteggiamento possa avvenire attraverso due percorsi distinti e separati: un percorso centrale (elaborazione attenta e analitica) o un percorso periferico (basato su elementi superficiali)."},{"title":"I Modelli Duali della Persuasione","content":"I modelli duali spiegano come la persuasione possa avvenire sia attraverso un'analisi approfondita sia tramite elementi superficiali, a seconda delle risorse del ricevente."},{"title":"1. Il Modello della Probabilità dell'Elaborazione (ELM)","content":"Sviluppato da Petty e Cacioppo, l'ELM prevede che il cambiamento di atteggiamento avvenga attraverso due percorsi alternativi:\n\nPercorso Centrale: viene attivato quando il ricevente possiede motivazione (rilevanza personale del tema) e abilità cognitive. Consiste in un'elaborazione accurata e analitica dei contenuti del messaggio. La persuasione dipende dalla qualità delle argomentazioni (argomenti forti vs deboli).\n\nPercorso Periferico: viene attivato in caso di assenza di motivazione o di risorse cognitive. Il soggetto non analizza i pro e i contro ma si affida a elementi di contorno, definiti indici periferici."},{"title":"Tipologie di Indici Periferici","content":"Indici della fonte: la competenza percepita di chi parla, il suo aspetto fisico (attrattiva) e la congruenza del messaggio con il sistema di credenze del ricevente (credibilità).\n\nIndici del messaggio: elementi superficiali come il numero di argomentazioni (messaggi più lunghi o ricchi di grafici e formule sembrano più credibili a prescindere dal contenuto).\n\nSintesi dell'esperimento di Petty, Cacioppo e Goldman (1981): Manipolando la rilevanza personale (motivazione), l'autorevolezza della fonte e la qualità degli argomenti, i ricercatori hanno confermato che i soggetti motivati cambiano atteggiamento solo di fronte ad argomenti forti (percorso centrale), mentre i soggetti non motivati vengono influenzati esclusivamente dall'autorevolezza della fonte (percorso periferico)."},{"title":"2. Il Modello Euristico-Sistematico","content":"Proposto da Chaiken, questo modello individua due modalità di elaborazione simili a quelle dell'ELM:\n\nPercorso Sistematico: coincide con l'elaborazione approfondita del percorso centrale.\n\nPercorso Euristico: è più circoscritto rispetto al percorso periferico e si basa sull'uso di euristiche, definite come «scorciatoie di pensiero». Si tratta di semplici regole di decisione apprese nel tempo (es. \"le affermazioni delle persone esperte sono vere\" o \"i messaggi lunghi contengono più informazioni\") che permettono di valutare il messaggio senza analizzarlo."},{"title":"Differenza cruciale tra ELM e Modello Euristico-Sistematico","content":"Mentre l'ELM considera i due percorsi come alternativi ed escludenti, il modello euristico-sistematico postula che le due modalità di elaborazione possano coesistere e interagire se sono presenti motivazione e risorse sufficienti.\n\nDall'interazione tra elaborazione sistematica ed euristica derivano due tipi di effetti:\n\nEffetti indipendenti (Ipotesi additiva): quando le due modalità portano a conclusioni congruenti (es. argomenti forti presentati da una fonte attraente), il giudizio finale è la somma dei due effetti.\n\nEffetti interdipendenti: quando l'elaborazione sistematica contraddice l'euristica. In questo caso l'elaborazione approfondita può attenuare l'effetto dell'euristica (ipotesi dell'attenuazione), oppure, se il messaggio è ambiguo, l'euristica può distorcere l'interpretazione del contenuto (ipotesi della distorsione)."},{"title":"1.3 Il Modello Unimodale (Kruganski, Thompson e Spiegel)","content":"Il modello unimodale propone un'alternativa ai modelli duali (ELM e euristico-sistematico), sostenendo che la persuasione non segua due vie separate, ma sia un unico processo di verifica delle ipotesi.\n\nIl principio atomico: Qualsiasi informazione (sia un'argomentazione complessa sia un indice periferico come l'autorevolezza della fonte) costituisce un pezzo di evidenza funzionalmente equivalente.\n\nIl ragionamento sillogistico: Tutti i processi di persuasione seguono le stesse regole logiche di un ragionamento del tipo \"se-allora\", in cui il ricevente collega le informazioni del messaggio a credenze che ha già in memoria per arrivare a una conclusione."},{"title":"Fattori che determinano la persuasione","content":"A differenza dei modelli duali, la distinzione non è tra tipo di informazione (centrale vs periferica), ma dipende da:\n\nLunghezza e complessità dell'informazione\n\nOrdine di presentazione\n\nLivello di coinvolgimento del soggetto: I soggetti molto motivati elaborano in modo approfondito qualunque informazione ritengano rilevante per il giudizio finale, inclusi gli indici della fonte (es. l'esperto), qualora richiedano uno sforzo cognitivo per essere analizzati."},{"title":"2. Gli Effetti dell'Umore sulla Persuasione","content":"L'umore non ha un effetto diretto sulla persuasione, ma influenza il tipo di elaborazione a cui il messaggio viene sottoposto:\n\nUmore positivo: Tende a ridurre l'elaborazione approfondita, spingendo il soggetto verso la via periferica e l'uso di euristiche.\n\nUmore neutro: Indirizza i soggetti verso un'elaborazione più attenta, sistematica e focalizzata sulla forza delle argomentazioni.\n\nSintesi dell'esperimento di Worth e Mackie (1987): I soggetti in un tono di umore positivo modificavano il proprio atteggiamento sia di fronte ad argomenti forti che deboli (se presentati da una fonte autorevole). Al contrario, i soggetti con umore neutro cambiavano atteggiamento esclusivamente in presenza di argomentazioni forti."},{"title":"Spiegazioni teoriche dell'effetto dell'umore","content":"Per comprendere questo fenomeno sono state formulate due ipotesi principali:"},{"title":"1. Ipotesi della Capacità Cognitiva (Mackie e Worth)","content":"Quando una persona si trova in uno stato di umore positivo (o molto negativo), la sua memoria di lavoro è occupata da pensieri ed elementi congruenti con il proprio stato d'animo. Questo materiale occupa spazio cognitivo disponibile, funzionando da effetto distraente. Di conseguenza, non rimangono risorse sufficienti per l'elaborazione sistematica e il soggetto ricorre alle euristiche."},{"title":"2. Ipotesi Motivazionale","content":"Questa prospettiva suggerisce che l'umore agisca direttamente sulla motivazione ad elaborare:\n\nL'umore positivo riduce la motivazione a impegnarsi in uno sforzo cognitivo, poiché si tende a preservare lo stato di benessere psicologico del momento.\n\nL'umore negativo può, al contrario, aumentare la motivazione a elaborare sistematicamente l'informazione nel tentativo di risolvere i problemi che causano il disagio.\n\nEcco il riassunto strutturato dell'ultima sezione del testo, ridotto all'essenziale (circa il 25% della lunghezza originale) e focalizzato sulla definizione dei meccanismi psicologici descritti."},{"title":"Sviluppi sulle teorie dell'umore","content":"Oltre alle ipotesi sulla capacità cognitiva, esistono due modelli legati alle motivazioni personali del soggetto:\n\nTeoria del mantenimento dell'umore: chi si trova in uno stato d'animo positivo tende a bloccare l'elaborazione di messaggi che potrebbero rovinare il suo stato di benessere (soprattutto se i messaggi sono contro-attitudinali).\n\nIpotesi della contingenza edonica: amplia la teoria precedente. I soggetti di buon umore scelgono di elaborare un messaggio solo se intuiscono che i suoi contenuti possono mantenere o migliorare il loro buon umore. Al contrario, le persone di cattivo umore tendono ad elaborare qualsiasi messaggio perché ogni stimolo è potenzialmente migliore del loro stato attuale."},{"title":"Gli effetti della paura sulla persuasione","content":"La ricerca dimostra che l'efficacia dei messaggi che fanno leva sull'attivazione della paura segue dinamiche precise:\n\nPaura moderata: aumenta la motivazione e la capacità cognitiva, indirizzando il ricevente verso un'elaborazione sistematica nel tentativo di trovare una soluzione per ridurre lo stato di tensione. Le campagne sociali basate sulla paura funzionano però solo se contengono informazioni specifiche e rassicuranti su come evitare il pericolo.\n\nPaura esagerata: produce un evitamento difensivo. Il soggetto tende a sminuire, contraddire o ignorare l'informazione per proteggersi dall'ansia eccessiva."},{"title":"3. Resistere alla Persuasione","content":"La psicologia sociale individua tre meccanismi principali che permettono alle persone di opporsi e resistere ai tentativi di persuasione esterni:"},{"title":"1. Reattanza Psicologica (Brehm)","content":"La reattanza è una controrazione emotiva e motivazionale che l'individuo mette in atto quando sente che la propria libertà personale viene limitata o ristretta. Quando una persona percepisce un tentativo di persuasione troppo diretto come una costrizione, si attiva in lei la motivazione a ribellarsi per ripristinare la propria libertà di scelta, portandola spesso a manifestare il comportamento opposto a quello desiderato (effetto boomerang)."},{"title":"2. Preavvertimento","content":"Quando una persona sa in anticipo che sarà l'obiettivo di un tentativo di persuasione, la sua resistenza aumenta drasticamente. Il preavvertimento incrementa la capacità di controargomentare, poiché concede al soggetto il tempo necessario per recuperare dalla memoria a lungo termine tesi e difese a sostegno della propria posizione prima ancora di ricevere il messaggio."},{"title":"3. Immunizzazione (McGuire)","content":"Ispirata al principio biologico della vaccinazione, l'immunizzazione consiste nel fortificare le credenze di un individuo esponendolo preventivamente a forme deboli di messaggi contrari, spingendolo a sviluppare \"anticorpi cognitivi\".\n\nSecondo McGuire, questa difesa basata sull'immunizzazione è molto più efficace rispetto a una difesa passiva (basata solo sul sostegno delle proprie tesi) per due motivi:\n\nRende meno credibili e depotenzia tutti gli attacchi persuasivi futuri.\n\nSpinge attivamente il bersaglio a generare autonomamente un maggior numero di argomentazioni in difesa del proprio atteggiamento."},{"title":"4. Gli Effetti del Comportamento sugli Atteggiamenti","content":"Il cambiamento di atteggiamento non deriva solo da comunicazioni esterne, ma può essere un processo autogenerato dalle azioni stesse dell'individuo.\n\nLa persuasione autogenerata e il Role-playing: la ricerca dimostra che una delle tecniche più efficaci per modificare gli orientamenti interni è il role-playing (interpretazione di un ruolo). Quando le persone interpretano una situazione immaginaria comportandosi in modo coerente con il ruolo assegnato, giungono a modificare i propri atteggiamenti per il semplice fatto di aver recitato quel ruolo. I soggetti vengono infatti persuasi in misura molto maggiore dai messaggi e dalle argomentazioni che essi stessi hanno pronunciato rispetto a quelli ascoltati da fonti esterne."},{"title":"4. Gli Effetti del Comportamento sugli Atteggiamenti","content":"Mentre il role-playing evidenzia la capacità del soggetto di autopersuadersi focalizzando l'attenzione sui pensieri a favore del ruolo recitato, la ricerca psicologica si è concentrata su due grandi modelli interpretativi dell'influenza del comportamento sull'atteggiamento: la teoria della dissonanza cognitiva (di matrice motivazionale) e la teoria dell'autopercezione (di matrice cognitiva)."},{"title":"4.1 L'Equilibrio Cognitivo (Heider)","content":"La teoria di Festinger si ispira al concetto di equilibrio cognitivo di Heider, secondo cui le relazioni tra le persone e i loro comportamenti necessitano di consonanza. Heider rappresenta le situazioni sociali attraverso strutture triadiche composte da:\n\nUn soggetto P\n\nUn'altra persona X\n\nUn oggetto di interesse comune O\n\nQuesti elementi sono uniti da rapporti di unità (somiglianza, causalità) e di sentimento (valutazione positiva o negativa).\n\nTriade equilibrata: si ha quando convivono sentimenti e unità percepiti senza conflitto. Avviene quando tutti e tre i rapporti sono positivi, oppure quando uno è positivo e due sono negativi (es. due persone che si simpatizzano concordano sul giudizio verso un oggetto, oppure due persone che si detestano disaccordano).\n\nTriade squilibrata: si ha quando due rapporti sono positivi e uno è negativo. Questa condizione genera un disagio psicologico instabile che produce una spinta motivazionale a riequilibrare la struttura modificando l'atteggiamento o il comportamento laddove è meno gravoso per l'individuo."},{"title":"4.2 La Teoria della Dissonanza Cognitiva (Festinger)","content":"Festinger postula che le persone tendano a conservare una forma di armonia e coerenza tra le proprie cognizioni (atteggiamenti, pensieri, convinzioni). Quando l'individuo riscontra un'incoerenza tra le proprie convinzioni personali e un comportamento messo in atto, sperimenta un'attivazione fisiologica negativa detta dissonanza cognitiva.\n\nCome evidenziato da Aronson, la teoria dimostra che gli esseri umani non sono tanto motivati a essere nel giusto, quanto a credere di esserlo, agendo come esseri razionalizzanti piuttosto che puramente razionali."},{"title":"Il ruolo dell'attivazione fisiologica","content":"La dissonanza provoca uno stato di arousal negativo (malessere emotivo). La spinta motivazionale al cambiamento avviene solo se il soggetto attribuisce tale malessere direttamente all'incoerenza del proprio comportamento. Se l'attivazione viene attribuita a cause esterne, lo stato di dissonanza non si manifeste."},{"title":"Strategie per ridurre la dissonanza","content":"La consonanza può essere ristabilita preferibilmente modificando le proprie cognizioni (poiché il comportamento è già stato condotto a termine) seguendo il principio del minimo sforzo attraverso tre strategie:\n\nRidurre l'importanza di uno degli elementi dissonanti: sminuire il valore della convinzione originaria.\n\nAggiungere elementi cognitivi consonanti: inserire nuove informazioni che giustifichino il comportamento (es. il fumatore che non riesce a smettere e si convince che fumare in fondo lo rilassi).\n\nModificare uno degli elementi dissonanti: cambiare radicalmente l'atteggiamento per renderlo coerente con l'azione."},{"title":"La giustificazione degli sforzi","content":"Questo bisogno fondamentale di coerenza spiega anche il fenomeno della giustificazione dello sforzo: un individuo che si impegna a fondo e fatica per raggiungere un obiettivo tenderà a valutare l'obiettivo stesso in modo molto più positivo rispetto a chi lo ottiene con minore impegno, così da giustificare l'investimento di energie profuso."},{"title":"4.3 Tipi di Giustificazione e Cambiamento di Atteggiamento","content":"Lo stato di dissonanza può essere mediato o risolto in base alla presenza o meno di elementi situazionali esterni. Si distinguono due scenari principali:\n\nGiustificazione Esterna: avviene quando il comportamento incoerente è determinato e spiegato dalla situazione specifica (es. mentire per non ferire un'amica). Se la giustificazione esterna è forte, la dissonanza non viene vissuta e l'atteggiamento personale rimane invariato.\n\nGiustificazione Insufficiente: si verifica quando facciamo qualcosa di incoerente con i nostri valori senza avere una motivazione esterna (sociale o economica) abbastanza forte da spiegarlo. In questo caso, per ridurre il malessere, l'individuo deve trovare una giustificazione interna, modificando il proprio atteggiamento originario."},{"title":"4.4 Il Paradigma dell'Acquiescenza Indotta","content":"Il paradigma dell'acquiescenza indotta dimostra che il cambiamento di atteggiamento duraturo è inversamente proporzionale all'entità della ricompensa ricevuta. * Se si offre una ricompensa bassa (incentivo minimo) per compiere un'azione contro-attitudinale, il soggetto non ha una giustificazione esterna sufficiente. Sperimenta quindi una forte dissonanza e si persuade che l'azione compiuta sia realmente corretta.\n\nSe si offre una ricompensa alta, il soggetto attribuisce il comportamento al guadagno (giustificazione esterna sufficiente), non vive alcuna dissonanza e non cambia le proprie convinzioni.\n\nSintesi dello studio classico di Festinger e Carlsmith (1959): Sottoposti a un compito molto noioso, i soggetti pagati soltanto 1 dollaro per mentire ai colleghi dicendo che il compito era divertente (bassa giustificazione esterna) cambiarono realmente atteggiamento, valutando l'attività come attraente. Al contrario, i soggetti pagati 20 dollari (alta giustificazione esterna) mentirono senza modificare la loro reale opinione sul compito. Questo fenomeno è noto come paradigma del «dire è credere»."},{"title":"4.5 Applicazioni Pedagogiche e Sociali della Giustificazione Insufficiente","content":"I medesimi processi psicologici regolano l'apprendimento, la gestione scolastica e l'educazione dei bambini attraverso lodi e punizioni."},{"title":"1. Il ruolo delle lodi nel contesto scolastico","content":"Concedere troppe ricompense o stimoli esterni inibisce l'interesse spontaneo. Per far aumentare negli alunni il livello di gradimento verso un compito, gli insegnanti dovrebbero fornire un incentivo minimo ma sufficiente a spingerli a svolgerlo, preparando così il terreno per lo sviluppo di una reale motivazione intrinseca."},{"title":"2. Lo sforzo e le lodi educative (Dweck)","content":"Le lodi dei genitori e degli insegnanti hanno un effetto positivo solo se formulate con moderazione. Come dimostrato da Dweck, le lodi sono efficaci se focalizzate sull'impegno profuso dal bambino piuttosto che sulla sua abilità o intelligenza innata. In questo modo, di fronte a compiti difficili, il bambino sarà motivato a impegnarsi a fondo anziché sentirsi impotente."},{"title":"3. Il principio della minaccia e delle punizioni","content":"Il meccanismo della giustificazione insufficiente si applica anche alle regole e ai divieti:\n\nMinaccia severa: costituisce una giustificazione esterna sufficiente. Il bambino obbedisce sul momento per evitare la punizione, ma non interiorizza la regola; il giocattolo vietato continuerà a piacergli.\n\nMinaccia lieve o moderata: non offre una giustificazione esterna sufficiente a spiegare l'obbedienza. Il bambino sperimenta una dissonanza interna e, per ridurla, si persuade che l'attività vietata non sia poi così piacevole, interiorizzando la norma (es. \"non gioco perché non mi piace\" anziché \"non gioco perché mio padre mi picchia\")."},{"title":"4.6 La Giustificazione della Crudeltà","content":"La mente umana utilizza la dissonanza cognitiva anche per proteggere l'immagine di sé di fronte ad azioni che provocano un danno ad altri. Se causiamo un danno ingiusto a una persona, la nostra cognizione di essere individui corretti entra in forte contrasto con l'azione compiuta. Per ridurre questo profondo stato di malessere emotivo, si attiva la tendenza a colpevolizzare la vittima, convincendosi che il bersaglio abbia una parte di colpa o abbia agito in modo negligente, razionalizzando così la propria condotta."},{"title":"4.2.1 La Dissonanza Postdecisionale e la Scelta tra Alternative","content":"Quando una persona si trova a dover scegliere tra due o più alternative ugualmente invitanti, sperimenta uno stato di dissonanza postdecisionale. Dopo aver preso la decisione, infatti, gli aspetti positivi dell'alternativa rifiutata e quelli negativi dell'alternativa scelta entrano in contrasto con l'azione compiuta.\n\nPer ridurre questo malessere si attiva un meccanismo di autogiustificazione:\n\nSi rivaluta positivamente l'alternativa scelta, aumentandone il livello di piacevolezza.\n\nSi sminuisce o sottovaluta l'alternativa rifiutata, riducendone l'attrattiva.\n\nNota scientifica: Questo fenomeno si applica sia ai beni di consumo (come dimostrato dallo studio di Brehm del 1956 sugli elettrodomestici) sia alle relazioni interpersonali. Nello studio di Simpson, Gangestad e Lerma (1990), le persone stabilmente fidanzate tendevano a considerare i membri del sesso opposto come molto meno attraenti rispetto ai single, ma solo se questi rappresentavano una reale \"minaccia\" alla stabilità della coppia (l'effetto svaniva se venivano mostrate foto di anziani o di persone dello stesso sesso)."},{"title":"4.3 Aspetti Cognitivi della Dissonanza","content":"Oltre alla componente motivazionale (legata al bisogno di ridurre l'arousal negativo), la teoria della dissonanza include dinamiche puramente cognitive. Per preservare l'armonia tra i propri pensieri e le proprie azioni ed evitare l'insorgere della dissonanza, gli individui attivano tre filtri sequenziali nell'elaborazione delle informazioni:"},{"title":"1. Esposizione Selettiva","content":"Consiste nella tendenza a cercare attivamente informazioni coerenti con i propri atteggiamenti preesistenti ed evitare quelle discordanti. Le persone tendono a frequentare ambienti, amici e media che consolidano le proprie posizioni. Lo stato di dissonanza preesistente aumenta la forza di questa selezione."},{"title":"2. Attenzione Selettiva","content":"Una volta che le informazioni si trovano nell'ambiente circostante, l'individuo non vi presta lo stesso livello di attenzione. Si tende a concentrare l'attenzione sulle informazioni coerenti rispetto a quelle incoerenti. * I \"repressori\" (persone con una spiccata tendenza a evitare stimoli minacciosi o ansiogeni) focalizzano lo sguardo esclusivamente sugli aspetti positivi delle proprie scelte, ignorando del tutto i dati incoerenti."},{"title":"3. Interpretazione Selettiva","content":"Se un'informazione non coerente riesce a superare i filtri dell'esposizione e dell'attenzione, subentra l'interpretazione. Le persone convertono e mediano le informazioni ambigue o incomplete affinché risultino coerenti con le proprie opinioni. Gli atteggiamenti personali fungono da filtro cognitivo rigido per proteggere la coerenza del proprio schema di sé (es. nei dibattiti politici ed elettorali o nei conflitti internazionali, le persone giudicano i medesimi dati in modo opposto per farli combaciare con le proprie idee di partenza)."},{"title":"4.4 Disagio o Autopercezione?","content":"L'esistenza di questi tre filtri (esposizione, attenzione e interpretazione selettiva) arricchisce la teoria classica della dissonanza dimostrando come i processi di pensiero strutturino l'azione. Al contempo, la focalizzazione su questi meccanismi di elaborazione dell'informazione apre il dibattito e mette in crisi l'idea che il cambiamento di atteggiamento dipenda esclusivamente da una spinta motivazionale e fisiologica (il malessere emotivo), introducendo interpretazioni alternative basate puramente sulla cognizione."},{"title":"4.4.1 La Teoria dell'Autopercezione (Bem) come Alternativa alla Dissonanza","content":"La spiegazione più riduzionista rispetto a quella di Festinger è la teoria dell'autopercezione di Bem. Secondo questa prospettiva, il cambiamento di atteggiamento non è guidato da un fattore motivazionale (il bisogno di eliminare un malessere interno), ma è un puro processo inferenziale.\n\nL'assunto di base: le persone non hanno un accesso diretto ai propri stati interni. Di conseguenza, esse giungono a inferire i propri atteggiamenti osservando il proprio comportamento passato, esattamente come farebbe un osservatore esterno.\n\nRilettura dell'esperimento di Festinger: i soggetti pagati 1 dollaro non cambiano idea per ridurre un disagio emotivo, ma semplicemente deducono: \"Se ho accettato di fare questa dichiarazione per una cifra così misera, significa che il compito dopotutto non mi dispiaceva\"."},{"title":"Integrazione e coesistenza dei due modelli (Fazio, Zanna e Cooper)","content":"Gli studi successivi (tra cui l'esperimento del placebo di Zanna e Cooper) hanno dimostrato che il disagio emotivo (arousal) esiste ed è il vero motore del cambiamento, smentendo l'approccio puramente cognitivo di Bem nei casi estremi. Tuttavia, i due modelli possono coesistere come strategie di pensiero alternative a seconda del livello di incongruenza:\n\nTeoria dell'Autopercezione (Bem): si applica quando il comportamento è lievemente incongruente rispetto all'atteggiamento originario (l'azione rientra nella zona di accettazione del soggetto). Il cambiamento avviene per inferenza logica.\n\nTeoria della Dissonanza Cognitiva (Festinger): si applica quando il comportamento è eccessivamente incongruente o in netta contraddizione con i propri valori (zona di rifiuto). Il cambiamento avviene per scaricare l'attivazione emotiva negativa (disagio)."},{"title":"4.5 La Natura Proposizionale della Coerenza Cognitiva","content":"Per spiegare come si strutturi la coerenza a livello esplicito e implicito, Gawronski e Bodenhausen hanno proposto il modello di valutazione associativa e proposizionale (APE):\n\nProcessi Associativi (Atteggiamenti Impliciti): sono semplici attivazioni automatiche di reazioni affettive guidate da strutture di memoria. Sono indipendenti dall'attribuzione di verità (es. l'attivazione automatica di uno stereotipo, anche se il soggetto sa che è falso).\n\nProcessi Proposizionali (Atteggiamenti Espliciti): rappresentano un sistema di ragionamento basato sulla conferma e sulla validità delle proposizioni e delle credenze. Richiedono un impiego più lento e consapevole di risorse cognitive, basandosi su inferenze sillogistiche."},{"title":"Applicazione alla Dissonanza Cognitiva","content":"Gawronski e Strack sostengono che la dissonanza emerge solo a livello proposizionale (atteggiamenti espliciti). L'incoerenza affiora quando due proposizioni distinte vengono ritenute entrambe vere dall'individuo, ma l'una è l'inverso dell'altra.\n\nPer risolvere questa incoerenza a livello proposizionale, i soggetti ricorrono a due strategie:\n\nNegazione della verità: rifiutare esplicitamente una delle proposizioni ritenendola falsa.\n\nAggiunta di una giustificazione: trovare una terza proposizione che spieghi l'incoerenza del comportamento contro-attitudinale (es. nel caso dell'acquiescenza indotta, i soggetti pagati 20 dollari risolvono la dissonanza introducendo la proposizione \"ho mentito perché la ricompensa era alta\")."},{"title":"4.6 Dissonanza Cognitiva e Concetto di Sé","content":"Molti teorici contemporanei sottolineano che alla base dei fenomeni di dissonanza vi sia, in realtà, un profondo bisogno di coerenza tra le cognizioni e il concetto di Sé che l'individuo possiede in quel momento."},{"title":"La Teoria della Coerenza del Sé (Aronson)","content":"Modificando l'impianto originario di Festinger, Aronson afferma che le cognizioni sul Sé agiscono come rigide aspettative sul proprio comportamento. In particolare, la maggior parte delle persone possiede un'aspettativa di Sé come individuo adeguato, competente e moralmente corretto.\n\nLa dissonanza non emerge quindi da una qualunque incoerenza logica, ma si manifesta quando un comportamento messo in atto minaccia questa auto-immagine positiva (es. se compio un'azione disonesta, la dissonanza scatta perché la mia azione contrasta con la cognizione \"sono una persona morale\")."},{"title":"4.6.1 Il Ruolo dell'Autostima nella Coerenza del Sé","content":"Secondo la teoria della coerenza del Sé (Aronson), l'attivazione della dissonanza è direttamente moderata dal livello di autostima del soggetto:\n\nElevata Autostima: gli individui hanno un'alta concezione di sé e non si aspettano di compiere azioni stupide o immorali. Di conseguenza, quando agiscono in modo discrepante, sperimentano una forte dissonanza e sono molto motivati a cercare autogiustificazioni.\n\nBassa Autostima: gli individui hanno una rappresentazione di sé mediocre e si aspettano la possibilità di sbagliare. Un comportamento immorale o stupido non crea in loro discrepanza, quindi non sperimentano il disagio della dissonanza e non cercano autogiustificazioni."},{"title":"4.6.2 La Teoria dell'Autoaffermazione (Steele)","content":"Proposta da Steele, questa prospettiva ridefinisce la motivazione che spinge a ridurre la dissonanza: l'obiettivo fondamentale non è la coerenza logica, ma la protezione dell'integrità globale e dell'immagine positiva del Sé.\n\nMeccanismo di riduzione alternativo: a differenza della teoria di Aronson, l'autoaffermazione postula che per ridurre il malessere non sia necessario reintegrare la specifica immagine minacciata dall'azione. L'individuo può ripristinare l'integrità del Sé evocando e mettendo in luce altri aspetti positivi personali in campi totalmente diversi (es. un fumatore in dissonanza può ridurre il disagio ricordando a se stesso di essere un genitore scrupoloso o un lavoratore attento, senza dover modificare il comportamento del fumo o le credenze sulla salute).\n\nLe persone con un'elevata autostima dispongono di molte più risorse interne (attributi positivi del Sé) da richiamare alla mente per proteggere la propria identità, risultando meno dipendenti da meccanismi di autogiustificazione diretta."},{"title":"4.6.3 La Teoria del New Look (Cooper e Fazio)","content":"Cooper e Fazio propongono una prospettiva radicale secondo cui i concetti legati al Sé e all'autostima sono del tutto irrilevanti per l'insorgenza della dissonanza. Nel modello del New Look, le persone avvertono dissonanza solo in presenza di due condizioni fondamentali:\n\nViolazione di norme sociali ed etiche: l'azione commessa deve determinare un evento avverso o un risvolto inaspettatamente negativo giudicato ingiusto dalla comunità.\n\nConcetto di responsabilità personale: il soggetto deve attribuire a se stesso la colpa dell'evento avverso. La responsabilità si manifesta quando vi è libertà di scelta nell'eseguire l'azione e quando le conseguenze negative erano prevedibili.\n\nRilettura dell'esperimento di Festinger: i soggetti provano dissonanza non perché hanno mentito contrastando l'immagine di sé, ma perché si sentono responsabili di aver deliberatamente ingannato un'altra persona (violazione etica)."},{"title":"4.7 Il Modello degli Standard del Sé (Stone e Cooper)","content":"Il Modello degli Standard del Sé (SSM) nasce per coniugare e integrare i contributi delle tre prospettive precedenti (coerenza del Sé, autoaffermazione e New Look), dimostrando che ognuna descrive una fase specifica dello stesso processo.\n\nIl modello postula che la valutazione del proprio comportamento avvenga in base a standard che variano a seconda delle condizioni situazionali:\n\nStandard Normativi (Modello New Look): si attivano quando il comportamento viene confrontato con le aspettative generali della società (es. \"cosa è culturalmente ritenuto giusto o sbagliato\").\n\nStandard Personali (Teoria della Coerenza del Sé): si attivano quando il comportamento viene confrontato con le credenze specifiche e i valori morali che l'individuo ha rispetto a se stesso (es. \"sono una persona onesta e competente\").\n\nL'attivazione dell'una o dell'altra modalità determina se il Sé fungerà da minaccia originaria (generando la dissonanza) o da risorsa difensiva (attraverso l'autoaffermazione) per far fronte al disagio psicologico."},{"title":"4.7 Il Modello degli Standard del Sé (Stone e Cooper)","content":"Il modello propone un processo a più stadi per spiegare come le persone valutano le proprie azioni rispetto a giudizi standard, evidenziando che il ruolo del Sé e dell'autostima dipende interamente dal tipo di attributi e standard accessibili in memoria al momento del comportamento."},{"title":"Gli Stadi del Processo","content":"Messa in atto del comportamento discrepante.\n\nIniziale valutazione del comportamento: l'individuo interpreta l'azione e si chiede se sia stata stupida, immorale o spiacevole sulla base di due possibili binari di valutazione:"},{"title":"Via 1: Standard Personali e Dissonanza Idiografica","content":"Se in memoria sono accessibili gli standard personali, l'azione viene confrontata con le aspettative individuali e con l'immagine che il soggetto ha di se stesso.\n\nIn questo scenario, le aspettative sono direttamente collegate all'autostima.\n\nPiù l'individuo ha un'elevata autostima, più percepirà il comportamento come stupido o immorale rispetto ai propri standard elevati, avvertendo una forte dissonanza.\n\nQuesta forma di attivazione è definita dissonanza idiografica ed è moderata da differenze individuali (come la conoscenza di sé e l'autostima)."},{"title":"Via 2: Standard Normativi e Dissonanza Nomotetica","content":"Se in memoria sono invece accessibili gli standard normativi, l'azione viene confrontata con i principi sociali ed etici approvati dalla comunità (norme socialmente percepite).\n\nIn questo caso, l'individuo avverte una dissonanza nomotetica, legata al timore di aver violato una regola comune.\n\nQuesta forma di dissonanza non è moderata dall'autostima del soggetto, poiché il giudizio si basa su criteri esterni e collettivi."},{"title":"La Fase di Riduzione della Dissonanza","content":"Una volta attivata la dissonanza (idiografica o nomotetica), le persone provano disagio e cercano di ridurlo. La strategia di riduzione dipende da quali cognizioni sul Sé si rendono accessibili subito dopo:\n\nAttributi del Sé positivi e PERTINENTI al comportamento: se il soggetto richiama qualità personali legate all'azione compiuta, le persone con alta autostima saranno più motivate a trovare giustificazioni per proteggere la propria coerenza (coerentemente con la Teoria della Coerenza del Sé). Negli standard normativi, invece, l'autostima resta ininfluente (Teoria del New Look).\n\nAttributi del Sé positivi ma NON PERTINENTI al comportamento: se il soggetto evoca qualità personali in settori completamente diversi dall'azione compiuta, queste fungono da risorsa. Le persone con alta autostima evocheranno questi aspetti per ridurre la dissonanza senza soffermarsi sulle cognizioni discrepanti, mostrando una minore vulnerabilità complessiva (coerentemente con la Teoria dell'Autoaffermazione).\n\nCAP 6"},{"title":"Si manifesta quando un individuo si trova in contesti ambigui, confusi o insoliti. Non disponendo di elementi certi, il soggetto assume il comportamento degli altri come una fonte di informazioni attendibile per uscire dall'impasse e capire come agire.","content":"Caratteristica cruciale: Questo tipo di influenza determina un'accettazione a livello privato: l'individuo interiorizza la norma del gruppo e continua a ritenerla valida anche quando si trova da solo.\n\nSituazioni di emergenza: L'influenza informazionale si acutizza nelle situazioni d'emergenza, dove la necessità di agire immediatamente riduce il tempo di riflessione e spinge a fare totale affidamento su ciò che fanno gli altri."},{"title":"Sherif ha studiato la genesi delle norme sociali (canoni condivisi a cui le persone si conformano) sfruttando l'illusione ottica del punto luminoso in una stanza buia (effetto autocinetico).","content":"Nelle sessioni individuali, i soggetti fornivano stime della distanza molto diverse tra loro.\n\nNelle sessioni di gruppo, l'interazione portava i soggetti ad abbandonare progressivamente le proprie valutazioni personali per far convergere le stime verso un valore intermedio condiviso (norma di gruppo).\n\nNelle prove successive svolte nuovamente da soli, i soggetti conservavano il valore elaborato in gruppo, confermando l'avvenuta interiorizzazione."},{"title":"Si attiva quando un individuo si trova in situazioni chiare e non ambigue, ma decide di conformarsi alle opinioni del gruppo per il bisogno di essere accettato, approvato ed evitare l'esclusione sociale.","content":"Caratteristica cruciale: A differenza di quella informazionale, l'influenza normativa produce un'acquiescenza pubblica, ma non un'accettazione privata. Il soggetto dichiara formalmente di approvare il gruppo per evitare disagi, ma continua a mantenere intime convinzioni opposte.\n\nCosto psicologico della devianza: Discostarsi dal giudizio unanime della maggioranza genera negli individui un forte stato di ansia, tensione e disagio emotivo causato dall'evidenza percettiva che contraddice la pressione sociale."},{"title":"1.1 Condizioni che Influiscono sul Conformismo","content":"Il livello di sottomissione alle pressioni della maggioranza non è costante, ma è modulato da variabili situazionali e individuali:\n\nUnanimità: il conformismo normativo si esprime al massimo se il gruppo è compatto. La presenza di un solo dissenziente riduce drasticamente il conformismo, anche se quest'ultimo esprime una valutazione a sua volta errata.\n\nImpegno (Commitment): l'influenza della maggioranza è minore se la persona ha già formalizzato un impegno rispetto al suo giudizio iniziale. Esprimere pubblicamente la propria opinione crea un vincolo che inibisce la successiva tendenza a conformarsi al gruppo.\n\nDover rendere conto (Accountability): una persona che sa di dover giustificare e rendere conto delle proprie decisioni davanti ai membri del gruppo mostra una tendenza ancora maggiore a uniformarsi alla posizione della maggioranza."},{"title":"Differenze Individuali e Culturali","content":"Autostima e genere: le persone con bassi livelli di autostima sono più vulnerabili all'influenza sociale. Riguardo al genere, alcune ricerche evidenziano una leggera predisposizione delle donne a conformarsi maggiormente rispetto agli uomini, una tendenza che tuttavia si attenua se si sperimenta in un ambito in cui si hanno forti competenze specifiche.\n\nVariabili culturali: l'analisi transculturale evidenzia che il fenomeno del conformismo è universale e stabile nel tempo. Tuttavia, si registra un maggiore conformismo nelle società collettiviste rispetto a quelle basate sull'individualismo.\n\nSintesi del paradigma sperimentale di Mori e Arai [2010]: Replicando lo studio di Asch tramite l'uso di speciali lenti polarizzate (evitando così l'impiego di complici), i ricercatori hanno introdotto una variabile fondamentale: i partecipanti si conoscevano tra loro. I risultati hanno mostrato livelli di conformismo inferiori rispetto ad Asch. Hodges e Geyer [2006] spiegano che tra amici la pressione conformista diminuisce poiché la solidità del legame permette di esprimersi con franchezza senza temere l'esclusione, mentre le teorie normative prevedono una pressione maggiore solo nei gruppi ad alta coesione identitaria."},{"title":"1.2 Effetto della Terza Persona e Percezione Asimmetrica del Conformismo","content":"Il rapporto psicologico che gli individui hanno con il conformismo è caratterizzato da una profonda asimmetria percettiva:\n\nL'effetto della terza persona: descrive la tendenza a sovrastimare gli effetti dei messaggi persuasivi dei mass media sulle altre persone e a sottostimare gli stessi effetti su di sé. Questo meccanismo è guidato dalla motivazione di promozione del Sé (self-enhancement), che spinge a percepire le proprie risposte come più autonome e appropriate rispetto a quelle della massa.\n\nNegare la pressione del gruppo: questa distorsione si applica anche alla pressione della maggioranza. Sebbene gli individui siano consapevoli del potere del conformismo nella società, sono incapaci di vedere la forza del conformismo in se stessi. Quando viene chiesto di valutare l'impatto dell'influenza sociale, le persone tendono a considerarsi come entità autonome, descrivendosi idealmente come «unici in mezzo a un gregge di pecore»."},{"title":"1.2.1 Processi Cognitivi e Illusione di Introspezione nel Conformismo","content":"La distorsione che porta le persone a considerarsi sistematicamente meno conformiste degli altri non dipende solo dal bisogno di autostima (self-enhancement), ma deriva da un processo strettamente cognitivo legato alla diversa ponderazione delle informazioni:\n\nL'illusione di introspezione: quando giudichiamo il nostro comportamento, rivolgiamo l'attenzione verso l'interno (osservazioni introspettive). Poiché la pressione sociale agisce in modo implicito e non lascia tracce coscienti nei nostri pensieri o intenzioni, deduciamo di aver agito in modo totalmente libero (es. \"ho comprato questo scooter solo perché piaceva a me\").\n\nIl giudizio sugli altri: quando valutiamo il comportamento altrui, rivolgiamo l'attenzione verso l'esterno (osservazioni comportamentali). Poiché non abbiamo accesso alla loro mente, deduciamo che se gli altri fanno ciò che fa la massa, lo fanno solo per conformarsi (es. \"ha comprato quell'auto perché ce l'hanno tutti\").\n\nSintesi: Tendiamo a usare i nostri stati interni e le nostre intenzioni come base per valutare noi stessi, mentre ci basiamo puramente sul comportamento visibile per inferire i tratti e le intenzioni degli altri."},{"title":"Conformismo e appartenenza politica (Cavazza e Mucchi Faina, 2008)","content":"La rappresentazione del conformismo varia in base all'orientamento politico:\n\nLe persone che si collocano a sinistra giudicano il conformismo in modo molto più negativo rispetto a chi si collocano al centro o a destra.\n\nI soggetti di sinistra operano una netta asimmetria percettiva: considerano il proprio ingroup politico come poco conformista e gli outgroups come decisamente conformisti. Questa distinzione sfuma man mano che l'orientamento si sposta verso destra."},{"title":"2. L'Obbedienza e le sue Norme","content":"L'autorità percepita in colui che si fa promotore di un'idea o di un comportamento è in grado di esercitare un'influenza formidabile sugli individui, definita norma dell'obbedienza all'autorità: la profonda convinzione secondo cui le persone sono tenute a obbedire a chi è dotato di autorità legittima."},{"title":"L'Esperimento di Milgram [1963]","content":"Milgram volle verificare fino a che punto si sarebbe spinta l'obbedienza di cittadini comuni di fronte a ordini distruttivi impartiti da uno sperimentatore in camice (autorità legittima).\n\nI partecipanti (nel ruolo di \"insegnanti\") dovevano somministrare scosse elettriche di intensità crescente (da 15 a 450 volt) a un complice dello sperimentatore (nel ruolo di \"allievo\" in un'altra stanza) a ogni risposta errata in un compito di memoria. Nonostante l'allievo fingesse di provare dolori lancinanti, urlasse e infine smettesse di rispondere battendo i pugni sulla parete, lo sperimentatore rimaneva inflessibile ordinando di continuare con la formula: «L'esperimento richiede che lei continui».\n\nI risultati inaspettati: Sebbene le previsioni degli esperti ipotizzassero che solo una quota minima di sadici (circa il 2%) sarebbe arrivata al termine, l'esperimento dimostrò che la stragrande maggioranza dei soggetti (il 68%) obbedì allo sperimentatore infliggendo la scossa massima di 450 volt.\n\nLa spiegazione psicologica: Questo comportamento cieco e distruttivo non derivava da crudeltà innata, ma dall'incapacità dei soggetti di contestare i desideri del \"capo\", abdicando alla propria responsabilità personale e seguendo la radicata norma sociale dell'obbedienza."},{"title":"Varianti alla procedura standard","content":"Negli studi successivi, Milgram dimostrò che modificando le condizioni del contesto l'obbedienza variava: ad esempio, se gli ordini venivano impartiti da una persona qualunque (anziché dallo scienziato in camice) o se l'allievo iniziava a protestare apertamente, i soggetti trovavano la forza di rifiutarsi di proseguire, riducendo drasticamente il tasso di sottomissione."},{"title":"2.1 Lo Stato d'Agente e le Varianti di Milgram","content":"Gli sviluppi degli studi di Milgram mettono in luce i meccanismi psicologici e situazionali che regolano l'obbedienza cieca e distruttiva:\n\nLo Stato d'Agente: si verifica quando l'individuo risolve il conflitto tra la propria coscienza e l'ordine distruttivo ridefinendo la propria identità. Nel momento in cui l'autorità si assume esplicitamente l'intera responsabilità della situazione, il soggetto cessa di sentirsi autonomo e si percepisce come un mero agente che esegue la volontà della figura autorevole.\n\nOrdini discordanti o assenza di autorità: se nel laboratorio sono presenti due ricercatori che danno ordini contrari (uno di continuare e uno di fermarsi), i soggetti interrompono la prova. Lo stesso avviene se gli ordini sono impartiti da un comune complice non dotato di autorità legittima."},{"title":"2.2 Le Condizioni Situazionali del Paradigma di Milgram","content":"La validità dei dati e la loro applicabilità a eventi reali (come i crimini dei regimi totalitari) dipendono da tre fattori situazionali precisi ricreati nel paradigma:"},{"title":"1. Livello di vicinanza della vittima","content":"L'obbedienza diminuisce all'aumentare della vicinanza fisica e visiva dell'allievo. Se posti nella stessa stanza, la sottomissione scende al 40%. Se l'insegnante deve forzare fisicamente il braccio della vittima su una piastra per trasmettere la scossa, scende al 30%. La vicinanza sollecita la norma della responsabilità sociale, che impone di aiutare chi si trova in evidente difficoltà."},{"title":"2. Procedura sequenziale e Dissonanza Cognitiva","content":"L'esperimento prevede un aumento progressivo e graduale delle scosse (piccoli passi). Avendo obbedito alle prime scariche lievi, i soggetti sperimentano una forte dissonanza cognitiva nel definirsi persone non spietate pur compiendo un atto nocivo.\n\nPer ridurre questo disagio, ricorrono alla giustificazione più comune: screditare e colpevolizzare la vittima, convincendosi che meriti la punizione (dinamica alimentata dalla credenza in un mondo giusto, secondo cui le persone ottengono ciò che meritano)."},{"title":"2.3 Repliche Moderne e Confronti Culturali","content":"Gli studi successivi hanno confermato la stabilità transculturale e temporale della sottomissione all'autorità, introducendo nuove variabili psicologiche:\n\nLa replica di Jerry Burger [2009]: interrompendo la prova alla soglia critica dei 150 volt (per preservare il benessere dei partecipanti), Burger ha riscontrato che il 75% dei soggetti esprimeva livelli di obbedienza analoghi a quelli di Milgram, senza alcuna differenza significativa tra uomini e donne.\n\nIl ruolo dell'empatia: Burger ha evidenziato che gli individui dotati di elevati livelli di empatia e di un forte desiderio di controllo personale mostrano una spiccata tendenza a disobbedire all'autorità, manifestando un comportamento altruista nei confronti della vittima."},{"title":"Lo Studio di Palermo (Bocchiaro e Zimbardo, 2017)","content":"Condotto presso l'Università di Palermo, lo studio ha confermato che l'obbedienza distruttiva a ordini immorali (scrivere un messaggio promozionale per un finto esperimento di deprivazione sensoriale altamente nocivo) è un fenomeno diffuso (il 79% dei partecipan
